blueprint:
  name: "(Vaillant) Lüftungs-Steuerung"
  description: |
    🪟 **Modul 3: Lüftungs-Assistent**

    Managt das Stoßlüften und schützt vor vergessenen Fenstern. Unabhängig von der Heizung.

    **Kern-Funktionen:**
    - 🌬️ Erinnerung zum Lüften (Zeit, CO2 oder Feuchte).
    - ⏱️ Close-Timer: Erinnert ans Schließen nach X Minuten.
    - 🚨 Eskalation: Nerviger Alarm, wenn Fenster offen bleiben.
    - ⏰ Snooze: Eskalation per Push-Button um 1h pausieren.
    - 🌧️ Sicherheits-Warnung bei Regen oder Verlassen des Hauses.
    - ❄️ Sommer-Kühlung: Benachrichtigung wenn Lüften die Wohnung kühlen kann.

    **Das Ökosystem:**
    Entwickelt für den Betrieb im Verbund mit:
    *   🌡️ `(Vaillant) Heizungs-Steuerung` (Zentrale Heizungslogik).
    *   📍 `(Vaillant) Geofencing` (Anwesenheit & Eco).
    *   ❤️ `(Vaillant) System-Diagnose` (Wartung & Batterien).

    **Info:**
    Dieses Modul sendet nur Nachrichten. Das "Core Heating" Modul erkennt die offenen Fenster separat und stoppt die Heizung automatisch.

    **Version:** 1.0 | **Autor:** BananaPower

  domain: automation
  source_url: https://raw.githubusercontent.com/howtobanana/vaillant-suite-blueprints/main/blueprints/vaillant_l%C3%BCftungs-steuerung.yaml
  author: "bananapower"

  input:
    section_global:
      name: "🌍 Global: Wetter, Away & Notifications"
      description: |
        Zentrale Konfiguration für Wetter, Away-Status, Reminder und Benachrichtigungen.
        Diese Werte gelten für alle Räume.
      collapsed: false
      input:
        weather_entity:
          name: "🌧️ Wetter-Entity"
          description: |
            Weather-Entity für Regenstatus und Regenprognose (z.B. weather.home).
          selector:
            entity:
              domain: weather
        people_home_entity:
          name: "🏠 Anwesenheits-Zone"
          description: |
            Zone-Entity die anzeigt wie viele Personen daheim sind (z.B. zone.home).
            Wenn der State '0' ist (niemand in der Zone) → KEINE Lüftungs-Notifications.
          selector:
            entity:
              domain: zone
        guest_mode_boolean:
          name: "🏡 Guest-Mode Helper (opt)"
          description: |
            Gleicher Gast-Schalter wie in der Heizungs-Steuerung.
            Wenn aktiv, werden Away-basierte Unterdrückungen ignoriert.
          default: ""
          selector:
            entity:
              domain: input_boolean

        enable_daily_reminder:
          name: "🔘 Tägliche Erinnerung aktiv"
          description: |
            Schalter: Erinnerung im Zeitfenster senden, wenn passend.
            Bedingungen: im Zeitfenster + jemand daheim + Heizung nicht aktiv + kein Regen.
          default: true
          selector:
            boolean:
        reminder_time_start:
          name: "🕐 Lüftungs-Zeitfenster: Start"
          description: |
            Beginn des Zeitfensters für die tägliche Erinnerung.
            Beispiel: 14:00 Uhr.
          default: "14:00:00"
          selector:
            time:
        reminder_time_end:
          name: "🕓 Lüftungs-Zeitfenster: Ende"
          description: |
            Ende des Zeitfensters. Erinnerung feuert nur dazwischen.
            Beispiel: 16:00 Uhr.
          default: "16:00:00"
          selector:
            time:
        reminder_schedule:
          name: "🗓️ Lüftungs-Zeitplan (opt, überschreibt Start/Ende)"
          description: |
            Optionaler Schedule-Helfer für komplexere Zeitfenster.
            Wenn gesetzt → ÜBERSCHREIBT die manuellen Start/Ende-Zeiten.
            State 'on' = Erinnerung erlaubt.
          default: ""
          selector:
            entity:
              domain: schedule
        heating_climate_entities:
          name: "🔥 Heizungs-Climate-Entities (opt)"
          description: |
            Optional: Climate-Entities zur Heizungs-Aktivitätsprüfung.
            Wenn eine davon aktuell heizt (hvac_action: heating/preheating)
            → KEINE Lüftungs-Erinnerung (Energie-Verschwendung vermeiden).
            Mehrere möglich. Leer lassen = keine Heizungs-Prüfung.
          default: []
          selector:
            entity:
              domain: climate
              multiple: true
        co2_sensor:
          name: "🫧 CO2 Sensor (opt)"
          description: |
            Optionaler CO2-Sensor für bedarfsbasierte Lüftungs-Reminder.
          default: ""
          selector:
            entity:
              domain: sensor
        co2_threshold:
          name: "🫧 CO2 Grenzwert (ppm)"
          description: |
            Reminder auslösen, wenn CO2 darüber liegt.
          default: 1200
          selector:
            number:
              min: 600
              max: 4000
              step: 50
              unit_of_measurement: "ppm"
        humidity_sensor:
          name: "💧 Luftfeuchte Sensor (opt)"
          description: |
            Optionaler Feuchtesensor für bedarfsbasierte Lüftungs-Reminder.
          default: ""
          selector:
            entity:
              domain: sensor
              device_class:
                - humidity
        humidity_threshold:
          name: "💧 Feuchte Grenzwert (%)"
          description: |
            Reminder auslösen, wenn Luftfeuchte darüber liegt.
          default: 60
          selector:
            number:
              min: 40
              max: 90
              step: 1
              unit_of_measurement: "%"

        airing_duration:
          name: "🪟 Lüftungsdauer (min)"
          description: |
            Wie lange Fenster für Stoßlüften offen bleiben sollen.
          default: 10
          selector:
            number:
              min: 1
              max: 60
              step: 1
              unit_of_measurement: "min"
        escalation_delay:
          name: "⚠️ Eskalations-Delay (min)"
          description: |
            Wie lange nach dem "Bitte schließen" Reminder bis kritische Alerts starten.
            Gesamtzeit bis kritisch = Lüftungsdauer + dieser Wert.
          default: 20
          selector:
            number:
              min: 1
              max: 60
              step: 1
              unit_of_measurement: "min"

    section_master:
      name: "🏠 Master-Raum"
      description: |
        Fensterkontakt, Raum-Label und optionaler Präsenz-Sensor für den Master-Bereich.
      collapsed: false
      input:
        master_window:
          name: "🪟 Master Fensterkontakt"
          description: |
            Fensterkontakt des Master-Raums.
          default: ""
          selector:
            entity:
              domain: binary_sensor
              device_class: window
        master_label:
          name: "🏷️ Master Raum-Name"
          description: |
            Wird in Notifications angezeigt (z.B. "Wohnzimmer").
            Leer lassen → friendly_name des Fenster-Sensors wird verwendet.
          default: ""
          selector:
            text:
        master_presence:
          name: "🧍 Master Präsenz-Sensor (opt)"
          description: |
            Binary sensor oder input_boolean. Wenn 'on' (anwesend) →
            KEINE Fenster-Notifications für diesen Raum.
            Beim Verlassen ('on' → 'off') wird re-geprüft und ggf. Close-Reminder gesendet.
            Leer lassen = Notifications immer senden.
          default: ""
          selector:
            entity:
              domain:
                - binary_sensor
                - input_boolean

    section_room2:
      name: "🛏️ Raum 2"
      description: |
        Fensterkontakt, Raum-Label und optionaler Präsenz-Sensor für Raum 2.
      collapsed: true
      input:
        room2_window:
          name: "🪟 Raum 2 Fensterkontakt"
          description: |
            Fensterkontakt von Raum 2.
          default: ""
          selector:
            entity:
              domain: binary_sensor
              device_class: window
        room2_label:
          name: "🏷️ Raum 2 Name"
          description: |
            Wird in Notifications angezeigt. Leer → friendly_name des Fensters.
          default: ""
          selector:
            text:
        room2_presence:
          name: "🧍 Raum 2 Präsenz-Sensor (opt)"
          description: |
            Wenn 'on' → KEINE Fenster-Notifications für diesen Raum.
            Re-Check bei Verlassen (Übergang 'on' → 'off').
          default: ""
          selector:
            entity:
              domain:
                - binary_sensor
                - input_boolean

    section_room3:
      name: "💻 Raum 3"
      description: |
        Fensterkontakt, Raum-Label und optionaler Präsenz-Sensor für Raum 3.
      collapsed: true
      input:
        room3_window:
          name: "🪟 Raum 3 Fensterkontakt"
          description: |
            Fensterkontakt von Raum 3.
          default: ""
          selector:
            entity:
              domain: binary_sensor
              device_class: window
        room3_label:
          name: "🏷️ Raum 3 Name"
          description: |
            Wird in Notifications angezeigt. Leer → friendly_name des Fensters.
          default: ""
          selector:
            text:
        room3_presence:
          name: "🧍 Raum 3 Präsenz-Sensor (opt)"
          description: |
            Wenn 'on' → KEINE Fenster-Notifications für diesen Raum.
            Re-Check bei Verlassen (Übergang 'on' → 'off').
          default: ""
          selector:
            entity:
              domain:
                - binary_sensor
                - input_boolean

    section_room4:
      name: "🛁 Raum 4"
      description: |
        Fensterkontakt, Raum-Label und optionaler Präsenz-Sensor für Raum 4.
      collapsed: true
      input:
        room4_window:
          name: "🪟 Raum 4 Fensterkontakt"
          description: |
            Fensterkontakt von Raum 4.
          default: ""
          selector:
            entity:
              domain: binary_sensor
              device_class: window
        room4_label:
          name: "🏷️ Raum 4 Name"
          description: |
            Wird in Notifications angezeigt. Leer → friendly_name des Fensters.
          default: ""
          selector:
            text:
        room4_presence:
          name: "🧍 Raum 4 Präsenz-Sensor (opt)"
          description: |
            Wenn 'on' → KEINE Fenster-Notifications für diesen Raum.
            Re-Check bei Verlassen (Übergang 'on' → 'off').
          default: ""
          selector:
            entity:
              domain:
                - binary_sensor
                - input_boolean

    section_room5:
      name: "🍳 Raum 5"
      description: |
        Fensterkontakt, Raum-Label und optionaler Präsenz-Sensor für Raum 5.
      collapsed: true
      input:
        room5_window:
          name: "🪟 Raum 5 Fensterkontakt"
          description: |
            Fensterkontakt von Raum 5.
          default: ""
          selector:
            entity:
              domain: binary_sensor
              device_class: window
        room5_label:
          name: "🏷️ Raum 5 Name"
          description: |
            Wird in Notifications angezeigt. Leer → friendly_name des Fensters.
          default: ""
          selector:
            text:
        room5_presence:
          name: "🧍 Raum 5 Präsenz-Sensor (opt)"
          description: |
            Wenn 'on' → KEINE Fenster-Notifications für diesen Raum.
            Re-Check bei Verlassen (Übergang 'on' → 'off').
          default: ""
          selector:
            entity:
              domain:
                - binary_sensor
                - input_boolean

    section_cooling:
      name: "❄️ Sommer-Kühlung"
      description: |
        Intelligente Kühlung durch Lüften im Sommer.
        Benachrichtigt wenn Innentemperatur hoch UND Außentemperatur kühler ist.
        Unterdrückt "Fenster schließen" Alerts, wenn Kühlung sinnvoll ist.
      collapsed: true
      input:
        enable_cooling:
          name: "🔘 Sommer-Kühlung aktivieren"
          description: |
            Master-Schalter für die Kühlungs-Logik.
          default: false
          selector:
            boolean:
        cooling_indoor_temp_sensor:
          name: "🌡️ Innentemperatur-Sensor"
          description: |
            Sensor für die Innentemperatur (z.B. Wohnzimmer).
          default: ""
          selector:
            entity:
              domain: sensor
              device_class: temperature
        cooling_outdoor_temp_source:
          name: "🌡️ Außentemperatur-Sensor (opt)"
          description: |
            Optionaler externer Temperatursensor.
            Wenn leer, wird die Temperatur aus der Wetter-Entity verwendet.
          default: ""
          selector:
            entity:
              domain: sensor
              device_class: temperature
        cooling_indoor_threshold:
          name: "🌡️ Innen-Schwelle (°C)"
          description: |
            Ab dieser Innentemperatur werden Kühlungs-Notifications gesendet.
          default: 25
          selector:
            number:
              min: 20
              max: 35
              step: 0.5
              unit_of_measurement: "°C"
        cooling_time_start:
          name: "🕐 Kühlungs-Zeitfenster: Start"
          description: |
            Beginn des Zeitfensters für Kühlungs-Notifications.
            Default 20:00 — Sommer-Lüftung typischerweise abends bis morgens.
            Über Mitternacht hinweg möglich (z.B. 20:00–08:00).
          default: "20:00:00"
          selector:
            time:
        cooling_time_end:
          name: "🕓 Kühlungs-Zeitfenster: Ende"
          description: |
            Ende des Zeitfensters. Default 08:00 (morgens).
          default: "08:00:00"
          selector:
            time:
        cooling_schedule:
          name: "🗓️ Kühlungs-Zeitplan (opt, überschreibt Start/Ende)"
          description: |
            Optionaler Schedule-Helfer für komplexere Zeitfenster.
            Wenn gesetzt → ÜBERSCHREIBT die manuellen Start/Ende-Zeiten oben.
            State 'on' = Kühlungs-Notifications erlaubt.
          default: ""
          selector:
            entity:
              domain: schedule
        cooling_hysteresis:
          name: "🌡️ Hysterese (°C)"
          description: |
            Außentemp muss mindestens X °C unter Innentemp liegen
            für eine Kühlempfehlung. Verhindert Flatter-Notifications.
          default: 2.0
          selector:
            number:
              min: 0.5
              max: 5.0
              step: 0.5
              unit_of_measurement: "°C"

    section_notifications:
      name: "📩 Benachrichtigungen"
      description: |
        Geräte für Push-Notifications (Normal & Kritisch).
      collapsed: false
      input:
        quiet_schedule:
          name: "🌙 Ruhezeit-Zeitplan"
          description: |
            Optionaler Zeitplan (schedule-Helfer) für Ruhezeiten.
            Wenn aktiv (on), werden alle Benachrichtigungen unterdrückt.
            Leer lassen = keine Ruhezeit-Blockierung.
          default: ""
          selector:
            entity:
              domain: schedule
        notify_on_presence:
          name: "🔔 Auch bei Anwesenheit benachrichtigen"
          description: |
            AUS (Default): Räume mit konfiguriertem Präsenz-Sensor (on)
            bekommen KEINE Fenster-Notification — Präsenz unterdrückt.
            AN: Präsenz wird ignoriert, Push wird immer gesendet.
            Räume ohne Präsenz-Sensor werden immer benachrichtigt.
          default: false
          selector:
            boolean:
        notify_device:
          name: "📩 Notify Gerät (Normal)"
          description: |
            Mobile-App Gerät(e) für Standard-Reminder.
          default: []
          selector:
            device:
              filter:
                integration: mobile_app
              multiple: true
        critical_notify_device:
          name: "🚨 Notify Gerät (Critical)"
          description: |
            Mobile-App Gerät(e) für kritische Alarm-Meldungen.
          default: []
          selector:
            device:
              filter:
                integration: mobile_app
              multiple: true

mode: parallel
max: 10

trigger_variables:
  tv_co2_sensor: !input co2_sensor
  tv_co2_threshold: !input co2_threshold
  tv_humidity_sensor: !input humidity_sensor
  tv_humidity_threshold: !input humidity_threshold
  tv_cooling_indoor_temp_sensor: !input cooling_indoor_temp_sensor
  tv_cooling_outdoor_temp_source: !input cooling_outdoor_temp_source
  tv_weather_entity: !input weather_entity
  tv_enable_cooling: !input enable_cooling
  tv_cooling_indoor_threshold: !input cooling_indoor_threshold
  tv_cooling_hysteresis: !input cooling_hysteresis
  tv_master_window: !input master_window
  tv_room2_window: !input room2_window
  tv_room3_window: !input room3_window
  tv_room4_window: !input room4_window
  tv_room5_window: !input room5_window
  tv_people_home_entity: !input people_home_entity

trigger:
  # Need Fresh Air: Zeitfenster startet
  - trigger: time
    at: !input reminder_time_start
    id: need_fresh_air_window_open

  # Need Fresh Air: Person kommt heim (Zone von 0 → ≥1)
  # for: 30s als Debounce gegen HA-Startup wenn zone state aus unavailable→1 restored
  - trigger: template
    value_template: >
      {% set ph = tv_people_home_entity | default('') | string | trim %}
      {% if ph not in ['', 'none', 'None'] and states[ph] is defined %}
        {% set s = states(ph) %}
        {{ s not in ['0', 'unavailable', 'unknown'] }}
      {% else %}
        {{ false }}
      {% endif %}
    for: "00:00:30"
    id: need_fresh_air_arrived

  - trigger: template
    value_template: >
      {{ tv_co2_sensor != '' and has_value(tv_co2_sensor) and (states(tv_co2_sensor) | float(0)) > (tv_co2_threshold | float(1200)) }}
    for: "00:05:00"
    id: need_fresh_air_co2

  - trigger: template
    value_template: >
      {{ tv_humidity_sensor != '' and has_value(tv_humidity_sensor) and (states(tv_humidity_sensor) | float(0)) > (tv_humidity_threshold | float(60)) }}
    for: "00:05:00"
    id: need_fresh_air_humidity

  # Window opened (per room)
  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input master_window
    id: master_window_change

  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input room2_window
    id: room2_window_change

  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input room3_window
    id: room3_window_change

  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input room4_window
    id: room4_window_change

  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input room5_window
    id: room5_window_change

  # Presence changes (per room) — trigger re-check when user leaves a room with open window
  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input master_presence
    id: master_presence_change

  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input room2_presence
    id: room2_presence_change

  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input room3_presence
    id: room3_presence_change

  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input room4_presence
    id: room4_presence_change

  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input room5_presence
    id: room5_presence_change

  # Safety: Rain detected
  - trigger: state
    entity_id: !input weather_entity
    to:
      - "rainy"
      - "pouring"
      - "lightning-rainy"
      - "hail"
      - "snowy-rainy"
    id: safety_rain

  # Safety: Away Mode activated
  # Safety: Trigger wenn Zone leer wird (niemand daheim)
  - trigger: state
    entity_id: !input people_home_entity
    to: "0"
    id: safety_away_mode

  # Cooling: Lüften lohnt sich JETZT (Innen warm, Außen kühler, alle Fenster zu)
  # State-Transition-Trigger statt Polling → kein Spam
  - trigger: template
    value_template: >
      {% set indoor_s = tv_cooling_indoor_temp_sensor | default('') | string | trim %}
      {% set outdoor_s = tv_cooling_outdoor_temp_source | default('') | string | trim %}
      {% if (tv_enable_cooling | default(false) | bool(false)) and indoor_s not in ['', 'none'] and has_value(indoor_s) %}
        {% set indoor = states(indoor_s) | float(0) %}
        {% set outdoor = 0 %}
        {% if outdoor_s not in ['', 'none'] and has_value(outdoor_s) %}
          {% set outdoor = states(outdoor_s) | float(0) %}
        {% elif tv_weather_entity | default('') | string | trim != '' %}
          {% set outdoor = state_attr(tv_weather_entity, 'temperature') | float(0) %}
        {% endif %}
        {% set ns = namespace(any_open=false) %}
        {% for w in [tv_master_window, tv_room2_window, tv_room3_window, tv_room4_window, tv_room5_window] %}
          {% if w not in ['', 'none', 'None'] and states[w] is defined and is_state(w, 'on') %}
            {% set ns.any_open = true %}
          {% endif %}
        {% endfor %}
        {{ indoor >= (tv_cooling_indoor_threshold | float(25))
           and outdoor <= (indoor - (tv_cooling_hysteresis | float(2.0)))
           and not ns.any_open }}
      {% else %}
        {{ false }}
      {% endif %}
    for: "00:05:00"
    id: cooling_open_recommended

  # Cooling: Zeitfenster startet — Re-Check ob Bedingungen bereits erfüllt sind
  # (z.B. Innen warm + Außen kühler bevor das Window aufging)
  - trigger: time
    at: !input cooling_time_start
    id: cooling_window_open

  # Cooling: Zeitfenster endet (Manuell-Zeit) — Friendly Reminder zum Schließen
  - trigger: time
    at: !input cooling_time_end
    id: cooling_window_end

  # Cooling: Zeitfenster endet (Schedule-Variante) — gleicher Zweck
  - trigger: state
    entity_id: !input cooling_schedule
    to: "off"
    id: cooling_schedule_end

  # Cooling: Außen-Temp gestiegen → Fenster zu (mit Hysterese, 1°C Dead-Zone)
  - trigger: template
    value_template: >
      {% set indoor_s = tv_cooling_indoor_temp_sensor | default('') | string | trim %}
      {% set outdoor_s = tv_cooling_outdoor_temp_source | default('') | string | trim %}
      {% if (tv_enable_cooling | default(false) | bool(false)) and indoor_s not in ['', 'none'] and has_value(indoor_s) %}
        {% set indoor = states(indoor_s) | float(0) %}
        {% set outdoor = 0 %}
        {% if outdoor_s not in ['', 'none'] and has_value(outdoor_s) %}
          {% set outdoor = states(outdoor_s) | float(0) %}
        {% elif tv_weather_entity | default('') | string | trim != '' %}
          {% set outdoor = state_attr(tv_weather_entity, 'temperature') | float(0) %}
        {% endif %}
        {% set ns = namespace(any_open=false) %}
        {% for w in [tv_master_window, tv_room2_window, tv_room3_window, tv_room4_window, tv_room5_window] %}
          {% if w not in ['', 'none', 'None'] and states[w] is defined and is_state(w, 'on') %}
            {% set ns.any_open = true %}
          {% endif %}
        {% endfor %}
        {{ indoor >= (tv_cooling_indoor_threshold | float(25))
           and outdoor >= (indoor - ((tv_cooling_hysteresis | float(2.0)) / 2))
           and ns.any_open }}
      {% else %}
        {{ false }}
      {% endif %}
    for: "00:05:00"
    id: cooling_outdoor_warmer

action:
  - variables:
      inputs:
        weather_entity: !input weather_entity
        people_home_entity: !input people_home_entity
        guest_mode_boolean: !input guest_mode_boolean
        enable_daily_reminder: !input enable_daily_reminder
        reminder_time_start: !input reminder_time_start
        reminder_time_end: !input reminder_time_end
        reminder_schedule: !input reminder_schedule
        heating_climate_entities: !input heating_climate_entities
        co2_sensor: !input co2_sensor
        co2_threshold: !input co2_threshold
        humidity_sensor: !input humidity_sensor
        humidity_threshold: !input humidity_threshold
        airing_duration: !input airing_duration
        escalation_delay: !input escalation_delay
        notify_device: !input notify_device
        critical_notify_device: !input critical_notify_device
        quiet_schedule: !input quiet_schedule
        notify_on_presence: !input notify_on_presence
        master_window: !input master_window
        master_label: !input master_label
        master_presence: !input master_presence
        room2_window: !input room2_window
        room2_label: !input room2_label
        room2_presence: !input room2_presence
        room3_window: !input room3_window
        room3_label: !input room3_label
        room3_presence: !input room3_presence
        room4_window: !input room4_window
        room4_label: !input room4_label
        room4_presence: !input room4_presence
        room5_window: !input room5_window
        room5_label: !input room5_label
        room5_presence: !input room5_presence
        enable_cooling: !input enable_cooling
        cooling_indoor_temp_sensor: !input cooling_indoor_temp_sensor
        cooling_outdoor_temp_source: !input cooling_outdoor_temp_source
        cooling_indoor_threshold: !input cooling_indoor_threshold
        cooling_time_start: !input cooling_time_start
        cooling_time_end: !input cooling_time_end
        cooling_schedule: !input cooling_schedule
        cooling_hysteresis: !input cooling_hysteresis

      window_entities: >
        {% set ns = namespace(items=[]) %}
        {% for w in [inputs.master_window, inputs.room2_window, inputs.room3_window, inputs.room4_window, inputs.room5_window] %}
          {% if w is string and (w | trim) != '' %}
            {% set ns.items = ns.items + [w] %}
          {% endif %}
        {% endfor %}
        {{ ns.items }}

      # Per-Raum-Runtime-Config (nur Räume mit konfiguriertem Fenster)
      rooms_runtime: >
        {% set rooms = [
          {'key':'master', 'label': (inputs.master_label | default('') | string), 'window': (inputs.master_window | default('') | string), 'presence': (inputs.master_presence | default('') | string)},
          {'key':'room2',  'label': (inputs.room2_label  | default('') | string), 'window': (inputs.room2_window  | default('') | string), 'presence': (inputs.room2_presence  | default('') | string)},
          {'key':'room3',  'label': (inputs.room3_label  | default('') | string), 'window': (inputs.room3_window  | default('') | string), 'presence': (inputs.room3_presence  | default('') | string)},
          {'key':'room4',  'label': (inputs.room4_label  | default('') | string), 'window': (inputs.room4_window  | default('') | string), 'presence': (inputs.room4_presence  | default('') | string)},
          {'key':'room5',  'label': (inputs.room5_label  | default('') | string), 'window': (inputs.room5_window  | default('') | string), 'presence': (inputs.room5_presence  | default('') | string)}
        ] %}
        {% set ns = namespace(items=[]) %}
        {% for r in rooms %}
          {% if (r.window | trim) != '' %}
            {% set ns.items = ns.items + [r] %}
          {% endif %}
        {% endfor %}
        {{ ns.items }}

      presence_trigger_ids:
        - master_presence_change
        - room2_presence_change
        - room3_presence_change
        - room4_presence_change
        - room5_presence_change

      rain_states:
        - rainy
        - pouring
        - lightning-rainy
        - hail
        - snowy-rainy

      window_trigger_ids:
        - master_window_change
        - room2_window_change
        - room3_window_change
        - room4_window_change
        - room5_window_change

      away_mode_active: >
        {# Guest Mode überschreibt Away — Gäste bekommen Lüftungs-Reminder #}
        {% set guest_eid = inputs.guest_mode_boolean | default('') | string %}
        {% set guest_on = guest_eid not in ['', 'sensor.none', 'none'] and is_state(guest_eid, 'on') %}
        {% set ph = inputs.people_home_entity | default('') | string | trim %}
        {% if guest_on %}
          {{ false }}
        {% elif ph not in ['', 'none', 'None'] and states[ph] is defined %}
          {{ is_state(ph, '0') }}
        {% else %}
          {{ false }}
        {% endif %}

      quiet_active: >
        {% if inputs.quiet_schedule | default('') | string | trim not in ['', 'none', 'None'] %}
          {{ is_state(inputs.quiet_schedule, 'on') }}
        {% else %}
          {{ false }}
        {% endif %}

      rain_now: "{{ states(inputs.weather_entity) in rain_states }}"

      co2_sensor_entity: "{{ inputs.co2_sensor | default('') | string | trim }}"
      humidity_sensor_entity: "{{ inputs.humidity_sensor | default('') | string | trim }}"

      co2_value: >
        {% if co2_sensor_entity != '' and has_value(co2_sensor_entity) %}
          {{ states(co2_sensor_entity) | float(0) }}
        {% else %}
          {{ 0 }}
        {% endif %}

      humidity_value: >
        {% if humidity_sensor_entity != '' and has_value(humidity_sensor_entity) %}
          {{ states(humidity_sensor_entity) | float(0) }}
        {% else %}
          {{ 0 }}
        {% endif %}

      co2_high: "{{ co2_sensor_entity != '' and (co2_value | float(0)) > (inputs.co2_threshold | float(1200)) }}"
      humidity_high: "{{ humidity_sensor_entity != '' and (humidity_value | float(0)) > (inputs.humidity_threshold | float(60)) }}"

      # Aktuelle Zeit liegt im Lüftungs-Zeitfenster.
      # Schedule (wenn konfiguriert) überschreibt manuelle Start/Ende-Zeiten.
      # Manuelle Zeiten unterstützen Über-Mitternacht-Bereiche (z.B. 22:00–06:00).
      in_reminder_window: >
        {%- set sched = inputs.reminder_schedule | default('') | string | trim -%}
        {%- if sched not in ['', 'none', 'None'] -%}
          {{ is_state(sched, 'on') }}
        {%- else -%}
          {%- set now_t = now().time() -%}
          {%- set s = inputs.reminder_time_start | default('14:00:00') | string -%}
          {%- set e = inputs.reminder_time_end | default('16:00:00') | string -%}
          {%- set start_t = strptime(s, '%H:%M:%S').time() -%}
          {%- set end_t = strptime(e, '%H:%M:%S').time() -%}
          {%- if start_t <= end_t -%}
            {{ start_t <= now_t <= end_t }}
          {%- else -%}
            {{ now_t >= start_t or now_t <= end_t }}
          {%- endif -%}
        {%- endif -%}

      # Heizung läuft aktuell in mind. einem konfigurierten Climate
      heating_active: >
        {%- set cs = inputs.heating_climate_entities | default([]) -%}
        {%- if cs is string -%}{%- set cs = [cs] if cs not in ['', 'none', 'None'] else [] -%}{%- endif -%}
        {%- if cs | length == 0 -%}
          {{ false }}
        {%- else -%}
          {%- set ns = namespace(active=false) -%}
          {%- for c in cs -%}
            {%- if state_attr(c, 'hvac_action') in ['heating', 'preheating'] -%}
              {%- set ns.active = true -%}
            {%- endif -%}
          {%- endfor -%}
          {{ ns.active }}
        {%- endif -%}

      # Sommer-Schutz: Außen ist deutlich wärmer als Innen → Lüften würde Wärme reinbringen.
      # 1°C Buffer gegen Mess-Rauschen. Ohne konfigurierte Sensoren → keine Suppression.
      outdoor_warmer_than_indoor: >
        {%- set indoor_s = inputs.cooling_indoor_temp_sensor | default('') | string | trim -%}
        {%- set indoor_ok = indoor_s not in ['', 'none', 'None'] and has_value(indoor_s) -%}
        {%- if not indoor_ok -%}
          {{ false }}
        {%- else -%}
          {%- set indoor = states(indoor_s) | float(0) -%}
          {%- set outdoor_s = inputs.cooling_outdoor_temp_source | default('') | string | trim -%}
          {%- set ns = namespace(outdoor=none) -%}
          {%- if outdoor_s not in ['', 'none', 'None'] and has_value(outdoor_s) -%}
            {%- set ns.outdoor = states(outdoor_s) | float(0) -%}
          {%- elif inputs.weather_entity | default('') | string | trim != '' and state_attr(inputs.weather_entity, 'temperature') is not none -%}
            {%- set ns.outdoor = state_attr(inputs.weather_entity, 'temperature') | float(0) -%}
          {%- endif -%}
          {%- if ns.outdoor is none -%}
            {{ false }}
          {%- else -%}
            {{ ns.outdoor > (indoor + 1) }}
          {%- endif -%}
        {%- endif -%}

      # Daily-Reminder feuert nur wenn:
      #  - Trigger ist Window-Open ODER Person-Arrived
      #  - Erinnerung aktiviert
      #  - Aktuell im Zeitfenster
      #  - Heizung NICHT aktiv
      #  - Außen NICHT wärmer als Innen (Sommer-Schutz)
      #  - Sommer-Cooling würde NICHT gerade feuern (Kühlen hat Vorrang)
      # CO2/Luftfeuchte-Trigger feuern unabhängig von Zeitfenster/Heizung/Sommer.
      reminder_triggered: >
        {{
          ((trigger.id in ['need_fresh_air_window_open', 'need_fresh_air_arrived'])
           and (inputs.enable_daily_reminder | bool(false))
           and (in_reminder_window | bool(false))
           and not (heating_active | bool(false))
           and not (outdoor_warmer_than_indoor | bool(false))
           and not ((cooling_currently_recommended | bool(false)) and (in_cooling_window | bool(false))))
          or (trigger.id in ['need_fresh_air_co2', 'need_fresh_air_humidity'])
        }}

      # Kompakter Reason-String für Notification-Title in Klammern
      # Nur CO₂/Luftfeuchte werden angezeigt — Daily-Trigger bleibt ohne Bracket.
      reminder_reason: >
        {% set reasons = [] %}
        {% if co2_high | bool(false) %}
          {% set reasons = reasons + ['CO₂ ' ~ (co2_value | round(0) | int) ~ ' ppm'] %}
        {% endif %}
        {% if humidity_high | bool(false) %}
          {% set reasons = reasons + ['Luftfeuchte ' ~ (humidity_value | round(0) | int) ~ '%'] %}
        {% endif %}
        {{ reasons | join(' · ') }}

      open_windows_text: >
        {% set ns = namespace(items=[]) %}
        {% for w in window_entities %}
          {% if w != '' and states[w] is defined and is_state(w, 'on') %}
            {% set label = state_attr(w, 'friendly_name') if state_attr(w, 'friendly_name') is not none else w %}
            {% set ns.items = ns.items + [label] %}
          {% endif %}
        {% endfor %}
        {{ ns.items | join(', ') if ns.items | length > 0 else 'Fenster' }}

      any_window_open: >
        {% set ns = namespace(open=false) %}
        {% for w in window_entities %}
          {% if w != '' and states[w] is defined and is_state(w, 'on') %}
            {% set ns.open = true %}
          {% endif %}
        {% endfor %}
        {{ ns.open | bool(false) }}

      # Räume mit offenem Fenster — gefiltert nach Präsenz.
      # notify_on_presence=true: Präsenz wird ignoriert (immer benachrichtigen).
      # notify_on_presence=false: Räume mit aktiver Präsenz werden unterdrückt.
      # Räume ohne Präsenz-Sensor immer benachrichtigen.
      # Label-Fallback: master_label (wenn gesetzt) → friendly_name des Fensters → entity_id.
      rooms_to_notify_labels: >
        {% set ns = namespace(items=[]) %}
        {% set force_notify = inputs.notify_on_presence | bool(false) %}
        {% for r in rooms_runtime %}
          {% set w = r.window %}
          {% if states[w] is defined and is_state(w, 'on') %}
            {% set p = r.presence %}
            {% set presence_active = (p not in ['', 'none', 'None']) and (states[p] is defined) and is_state(p, 'on') %}
            {% if force_notify or not presence_active %}
              {% set lbl_raw = r.label | trim %}
              {% set fn = state_attr(w, 'friendly_name') %}
              {% set lbl = lbl_raw if lbl_raw != '' else (fn if fn is not none else w) %}
              {% set ns.items = ns.items + [lbl] %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ ns.items }}

      any_room_to_notify: "{{ (rooms_to_notify_labels | length) > 0 }}"
      rooms_to_notify_text: "{{ rooms_to_notify_labels | join(', ') if (rooms_to_notify_labels | length) > 0 else 'Fenster' }}"

      window_opened_trigger: >
        {% if trigger.id in window_trigger_ids and trigger.event is defined and trigger.event.data is defined and trigger.event.data.new_state is defined and trigger.event.data.new_state is not none and trigger.event.data.new_state.state is defined %}
          {% set new_s = trigger.event.data.new_state.state %}
          {% set old_s = trigger.event.data.old_state.state if (trigger.event.data.old_state is defined and trigger.event.data.old_state is not none and trigger.event.data.old_state.state is defined) else '' %}
          {{ new_s == 'on' and old_s != 'on' }}
        {% else %}
          {{ false }}
        {% endif %}

      notify_targets_list: >
        {% set raw = inputs.notify_device %}
        {% set ns = namespace(items=[]) %}
        {% set r_list = raw if (raw is iterable and raw is not string) else ([raw] if raw != '' else []) %}
        {% for ent_raw in r_list %}
          {% set ent = (ent_raw | string) | trim %}
          {% if ent != '' %}
            {% set dev_name = device_attr(ent, 'name') %}
            {% if dev_name is string and (dev_name | trim) != '' %}
              {% set ns.items = ns.items + ['notify.mobile_app_' ~ ((dev_name | slugify) | replace('-', '_'))] %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ ns.items | unique | join(',') }}

      critical_targets_list: >
        {% set raw = inputs.critical_notify_device %}
        {% set ns = namespace(items=[]) %}
        {% set r_list = raw if (raw is iterable and raw is not string) else ([raw] if raw != '' else []) %}
        {% for ent_raw in r_list %}
          {% set ent = (ent_raw | string) | trim %}
          {% if ent != '' %}
            {% set dev_name = device_attr(ent, 'name') %}
            {% if dev_name is string and (dev_name | trim) != '' %}
              {% set ns.items = ns.items + ['notify.mobile_app_' ~ ((dev_name | slugify) | replace('-', '_'))] %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {% if (ns.items | length) == 0 %}
          {{ notify_targets_list }}
        {% else %}
          {{ ns.items | unique | join(',') }}
        {% endif %}

      # ── Cooling variables ──
      cooling_enabled: "{{ inputs.enable_cooling | bool(false) }}"

      cooling_indoor_temp: >
        {% set s = inputs.cooling_indoor_temp_sensor | default('') | string | trim %}
        {% if s not in ['', 'none', 'None'] and has_value(s) %}
          {{ states(s) | float(0) }}
        {% else %}
          {{ 0 }}
        {% endif %}

      cooling_outdoor_temp: >
        {% set s = inputs.cooling_outdoor_temp_source | default('') | string | trim %}
        {% if s not in ['', 'none', 'None'] and has_value(s) %}
          {{ states(s) | float(0) }}
        {% elif inputs.weather_entity | default('') | string | trim != '' and state_attr(inputs.weather_entity, 'temperature') is not none %}
          {{ state_attr(inputs.weather_entity, 'temperature') | float(0) }}
        {% else %}
          {{ 0 }}
        {% endif %}

      cooling_sensors_valid: >
        {% set indoor_s = inputs.cooling_indoor_temp_sensor | default('') | string | trim %}
        {% set outdoor_s = inputs.cooling_outdoor_temp_source | default('') | string | trim %}
        {% set indoor_ok = indoor_s not in ['', 'none', 'None'] and has_value(indoor_s) %}
        {% set outdoor_ok = (outdoor_s not in ['', 'none', 'None'] and has_value(outdoor_s)) or (inputs.weather_entity | default('') | string | trim != '' and state_attr(inputs.weather_entity, 'temperature') is not none) %}
        {{ indoor_ok and outdoor_ok }}

      # Aktuelle Zeit liegt im Kühlungs-Zeitfenster.
      # Schedule (wenn konfiguriert) überschreibt manuelle Start/Ende-Zeiten.
      # Default 20:00–08:00 für typische Sommer-Nachtkühlung (über Mitternacht).
      in_cooling_window: >
        {%- set sched = inputs.cooling_schedule | default('') | string | trim -%}
        {%- if sched not in ['', 'none', 'None'] -%}
          {{ is_state(sched, 'on') }}
        {%- else -%}
          {%- set now_t = now().time() -%}
          {%- set s = inputs.cooling_time_start | default('20:00:00') | string -%}
          {%- set e = inputs.cooling_time_end | default('08:00:00') | string -%}
          {%- set start_t = strptime(s, '%H:%M:%S').time() -%}
          {%- set end_t = strptime(e, '%H:%M:%S').time() -%}
          {%- if start_t <= end_t -%}
            {{ start_t <= now_t <= end_t }}
          {%- else -%}
            {{ now_t >= start_t or now_t <= end_t }}
          {%- endif -%}
        {%- endif -%}

      # Cooling state aktuell empfehlenswert? (Mirror der trigger-Logik)
      # Wird benötigt damit der zusätzliche Time-Trigger den State prüfen kann.
      cooling_currently_recommended: >
        {%- set indoor_s = inputs.cooling_indoor_temp_sensor | default('') | string | trim -%}
        {%- if (cooling_enabled | bool(false)) and indoor_s not in ['', 'none', 'None'] and has_value(indoor_s) -%}
          {%- set indoor = states(indoor_s) | float(0) -%}
          {%- set outdoor_s = inputs.cooling_outdoor_temp_source | default('') | string | trim -%}
          {%- set ns = namespace(outdoor=none) -%}
          {%- if outdoor_s not in ['', 'none', 'None'] and has_value(outdoor_s) -%}
            {%- set ns.outdoor = states(outdoor_s) | float(0) -%}
          {%- elif inputs.weather_entity | default('') | string | trim != '' and state_attr(inputs.weather_entity, 'temperature') is not none -%}
            {%- set ns.outdoor = state_attr(inputs.weather_entity, 'temperature') | float(0) -%}
          {%- endif -%}
          {%- if ns.outdoor is none -%}
            {{ false }}
          {%- else -%}
            {%- set ns2 = namespace(any_open=false) -%}
            {%- for w in window_entities -%}
              {%- if states[w] is defined and is_state(w, 'on') -%}
                {%- set ns2.any_open = true -%}
              {%- endif -%}
            {%- endfor -%}
            {{ indoor >= (inputs.cooling_indoor_threshold | float(25))
               and ns.outdoor <= (indoor - (inputs.cooling_hysteresis | float(2.0)))
               and not ns2.any_open }}
          {%- endif -%}
        {%- else -%}
          {{ false }}
        {%- endif -%}

  # ════════════════════════════════════════════════════════════
  # FLOW 0: PRESENCE-OFF RE-CHECK
  # User verlässt Raum während Fenster offen → Re-Check ob Close-Reminder
  # oder Eskalation fällig ist (basierend auf Fenster-Offen-Dauer).
  # ════════════════════════════════════════════════════════════
  - choose:
      - conditions:
          - "{{ (trigger.id | default('')) in presence_trigger_ids }}"
          - "{{ trigger.event is defined and trigger.event.data is defined }}"
          - "{{ trigger.event.data.new_state is not none and trigger.event.data.new_state.state == 'off' }}"
          - "{{ trigger.event.data.old_state is not none and trigger.event.data.old_state.state != 'off' }}"
          - "{{ not (quiet_active | bool(false)) }}"
          # Re-Check nur nötig wenn Präsenz tatsächlich unterdrückt — sonst wurde bereits normal benachrichtigt.
          - "{{ not (inputs.notify_on_presence | bool(false)) }}"
        sequence:
          - variables:
              # Find rooms that: window open ≥ airing_duration AND no active presence.
              # Classify each: critical if open ≥ airing + escalation_delay.
              presence_recheck_rooms: >
                {% set ns = namespace(items=[]) %}
                {% set now_ts = as_timestamp(now()) | float(0) %}
                {% set thresh_s = (inputs.airing_duration | float(10)) * 60 %}
                {% set esc_s = thresh_s + (inputs.escalation_delay | float(20)) * 60 %}
                {% for r in rooms_runtime %}
                  {% set w = r.window %}
                  {% if states[w] is defined and is_state(w, 'on') %}
                    {% set p = r.presence %}
                    {% set presence_active = (p not in ['', 'none', 'None']) and (states[p] is defined) and is_state(p, 'on') %}
                    {% if not presence_active %}
                      {% set open_since = as_timestamp(states[w].last_changed, now_ts) | float(now_ts) %}
                      {% set open_dur = now_ts - open_since %}
                      {% if open_dur >= thresh_s %}
                        {% set lbl_raw = r.label | trim %}
                        {% set fn = state_attr(w, 'friendly_name') %}
                        {% set lbl = lbl_raw if lbl_raw != '' else (fn if fn is not none else w) %}
                        {% set is_critical = open_dur >= esc_s %}
                        {% set ns.items = ns.items + [{'label': lbl, 'critical': is_critical}] %}
                      {% endif %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
                {{ ns.items }}
              presence_recheck_normal_labels: "{{ presence_recheck_rooms | rejectattr('critical') | map(attribute='label') | list }}"
              presence_recheck_critical_labels: "{{ presence_recheck_rooms | selectattr('critical') | map(attribute='label') | list }}"

          # Critical re-check (any room past escalation threshold)
          - if:
              - "{{ (presence_recheck_critical_labels | length) > 0 }}"
              - "{{ (critical_targets_list | trim) != '' }}"
            then:
              - repeat:
                  for_each: "{{ (critical_targets_list | trim).split(',') if (critical_targets_list | trim) != '' else [] }}"
                  sequence:
                    - action: "{{ repeat.item | trim }}"
                      data:
                        title: "🚨 Fenster zu!"
                        message: "{{ presence_recheck_critical_labels | join(', ') }} noch offen!\n(Lüftungs-Steuerung)"
                        data:
                          tag: vaillant_lueftung
                          push:
                            interruption-level: critical
                            sound:
                              name: alarm.caf
                              critical: 1
                              volume: 1.0
                          ttl: 0
                          priority: high
                          actions:
                            - action: "VAILLANT_LUEFTUNG_SNOOZE_1H"
                              title: "⏰ In 1h erinnern"
                      continue_on_error: true

          # Normal close-reminder re-check (rooms past airing_duration but not yet escalation)
          - if:
              - "{{ (presence_recheck_normal_labels | length) > 0 }}"
              - "{{ (presence_recheck_critical_labels | length) == 0 }}"
              - "{{ (notify_targets_list | trim) != '' }}"
            then:
              - repeat:
                  for_each: "{{ (notify_targets_list | trim).split(',') if (notify_targets_list | trim) != '' else [] }}"
                  sequence:
                    - action: "{{ repeat.item | trim }}"
                      data:
                        title: "🌬️ Fenster zu!"
                        message: "{{ inputs.airing_duration | int }} min Lüftungszeit um. Noch offen: {{ presence_recheck_normal_labels | join(', ') }}.\n(Lüftungs-Steuerung)"
                        data:
                          tag: vaillant_lueftung
                          push:
                            sticky: true
                      continue_on_error: true
          - stop: "Presence re-check done"

  # ════════════════════════════════════════════════════════════
  # FLOW 1: NEED FRESH AIR
  # ════════════════════════════════════════════════════════════
  - choose:
      - conditions:
          - "{{ reminder_triggered | bool(false) }}"
          - "{{ not (away_mode_active | bool(false)) }}"
          - "{{ not (quiet_active | bool(false)) }}"
          - "{{ (notify_targets_list | trim) != '' }}"
        sequence:
          # Stündliche Wetter-Vorhersage abrufen (für "bis X Uhr" / "ab X Uhr trocken")
          - action: weather.get_forecasts
            target:
              entity_id: !input weather_entity
            data:
              type: hourly
            response_variable: weather_forecast
            continue_on_error: true
          - variables:
              forecast_list: >
                {%- set we = inputs.weather_entity | default('') | string -%}
                {%- if weather_forecast is defined and we in (weather_forecast | default({})) -%}
                  {{ weather_forecast[we].forecast | default([], true) }}
                {%- else -%}
                  {{ [] }}
                {%- endif -%}
              # Slot bis zum Abend (heute 21:00) — danach gilt "am Abend"
              evening_ts: "{{ as_timestamp(today_at('21:00')) | float(0) }}"
              # Such-Zeitfenster: 12h voraus
              rain_hint: >
                {%- set rain_conds = ['rainy','pouring','snowy','snowy-rainy','lightning','lightning-rainy','hail'] -%}
                {%- set fc = forecast_list | default([], true) -%}
                {%- if rain_now | bool(false) -%}
                  {# Aktuell Regen → nächste trockene Stunde finden #}
                  {%- set ns = namespace(dry_at=none) -%}
                  {%- for f in fc[:12] -%}
                    {%- if ns.dry_at is none and (f.condition | default('') not in rain_conds) -%}
                      {%- set ns.dry_at = f.datetime -%}
                    {%- endif -%}
                  {%- endfor -%}
                  {%- if ns.dry_at -%}
                    ⛈️ Regen – ab {{ as_timestamp(ns.dry_at) | timestamp_custom('%H:%M', true) }} trocken
                  {%- else -%}
                    ⛈️ Regen – kurz und gezielt lüften!
                  {%- endif -%}
                {%- else -%}
                  {# Aktuell trocken → nächsten Regen suchen #}
                  {%- set ns = namespace(rain_at=none) -%}
                  {%- for f in fc[:12] -%}
                    {%- if ns.rain_at is none and (f.condition | default('') in rain_conds) -%}
                      {%- set ns.rain_at = f.datetime -%}
                    {%- endif -%}
                  {%- endfor -%}
                  {%- if ns.rain_at and (as_timestamp(ns.rain_at) | float(0)) < (evening_ts | float(0)) -%}
                    ☀️ Kein Regen – bis {{ as_timestamp(ns.rain_at) | timestamp_custom('%H:%M', true) }}
                  {%- else -%}
                    ☀️ Kein Regen – bis am Abend
                  {%- endif -%}
                {%- endif -%}
          - repeat:
              for_each: "{{ (notify_targets_list | trim).split(',') }}"
              sequence:
                - action: "{{ repeat.item | trim }}"
                  data:
                    title: "🌬️ Zeit zum Lüften!{% if (reminder_reason | trim) != '' %} ({{ reminder_reason | trim }}){% endif %}"
                    message: "{{ rain_hint }}{% if any_window_open | bool(false) %}\nBereits offen: {{ open_windows_text }}.{% endif %}"
                    data:
                      tag: vaillant_lueftung
                      push:
                        sticky: true
                  continue_on_error: true

      # ════════════════════════════════════════════════════════
      # FLOW 2: WINDOW OPENED -> TIMER -> ESCALATION
      # ════════════════════════════════════════════════════════
      - conditions:
          - "{{ window_opened_trigger | bool(false) }}"
        sequence:
          - delay:
              minutes: "{{ inputs.airing_duration }}"

          - variables:
              # Re-compute presence-aware room list AFTER the delay
              rooms_to_notify_after_delay: >
                {% set ns = namespace(items=[]) %}
                {% set force_notify = inputs.notify_on_presence | bool(false) %}
                {% for r in rooms_runtime %}
                  {% set w = r.window %}
                  {% if states[w] is defined and is_state(w, 'on') %}
                    {% set p = r.presence %}
                    {% set presence_active = (p not in ['', 'none', 'None']) and (states[p] is defined) and is_state(p, 'on') %}
                    {% if force_notify or not presence_active %}
                      {% set lbl_raw = r.label | trim %}
                      {% set fn = state_attr(w, 'friendly_name') %}
                      {% set lbl = lbl_raw if lbl_raw != '' else (fn if fn is not none else w) %}
                      {% set ns.items = ns.items + [lbl] %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
                {{ ns.items }}
              any_window_open_now: >
                {% set ns = namespace(open=false) %}
                {% for w in window_entities %}
                  {% if w != '' and states[w] is defined and is_state(w, 'on') %}
                    {% set ns.open = true %}
                  {% endif %}
                {% endfor %}
                {{ ns.open | bool(false) }}
              any_room_to_notify_now: "{{ (rooms_to_notify_after_delay | length) > 0 }}"
              open_rooms_now_text: "{{ rooms_to_notify_after_delay | join(', ') if (rooms_to_notify_after_delay | length) > 0 else 'Fenster' }}"
              # Recompute cooling_beneficial_now after airing_duration delay
              cooling_beneficial_now: >
                {% set indoor_s = inputs.cooling_indoor_temp_sensor | default('') | string | trim %}
                {% set outdoor_s = inputs.cooling_outdoor_temp_source | default('') | string | trim %}
                {% set indoor_ok = indoor_s not in ['', 'none', 'None'] and has_value(indoor_s) %}
                {% set outdoor_ok = (outdoor_s not in ['', 'none', 'None'] and has_value(outdoor_s)) or (inputs.weather_entity | default('') | string | trim != '' and state_attr(inputs.weather_entity, 'temperature') is not none) %}
                {% if (inputs.enable_cooling | bool(false)) and indoor_ok and outdoor_ok %}
                  {% set indoor_t = states(indoor_s) | float(0) %}
                  {% set outdoor_t = states(outdoor_s) | float(0) if (outdoor_s not in ['', 'none', 'None'] and has_value(outdoor_s)) else (state_attr(inputs.weather_entity, 'temperature') | float(0)) %}
                  {{ indoor_t >= (inputs.cooling_indoor_threshold | float(25)) and outdoor_t <= (indoor_t - (inputs.cooling_hysteresis | float(2.0))) and (in_cooling_window | bool(false)) and not (states(inputs.weather_entity) in rain_states) and not (away_mode_active | bool(false)) }}
                {% else %}
                  {{ false }}
                {% endif %}

          # Close reminder (suppressed when cooling is beneficial OR user present in all open rooms)
          - choose:
              - conditions:
                  - "{{ any_room_to_notify_now | bool(false) }}"
                  - "{{ not (cooling_beneficial_now | bool(false)) }}"
                  - "{{ (notify_targets_list | trim) != '' }}"
                sequence:
                  - repeat:
                      for_each: "{{ (notify_targets_list | trim).split(',') if (notify_targets_list | trim) != '' else [] }}"
                      sequence:
                        - action: "{{ repeat.item | trim }}"
                          data:
                            title: "🌬️ Fenster zu!"
                            message: "{{ inputs.airing_duration | int }} min Lüftungszeit um. Noch offen: {{ open_rooms_now_text }}.\n(Lüftungs-Steuerung)"
                            data:
                              tag: vaillant_lueftung
                              push:
                                sticky: true
                          continue_on_error: true

          - condition: template
            value_template: "{{ any_window_open_now | bool(false) }}"

          # Stop escalation if cooling is beneficial
          - condition: template
            value_template: "{{ not (cooling_beneficial_now | bool(false)) }}"

          - delay:
              minutes: "{{ inputs.escalation_delay }}"

          # Escalation loop with wait_for_trigger for snooze
          - choose:
              - conditions:
                  - "{{ (critical_targets_list | trim) != '' }}"
                sequence:
                  - repeat:
                      while:
                        - condition: template
                          value_template: >
                            {# Presence-aware: continue loop if at least one open window is eligible (respects notify_on_presence toggle) #}
                            {% set ns = namespace(eligible=false) %}
                            {% set force_notify = inputs.notify_on_presence | bool(false) %}
                            {% for r in rooms_runtime %}
                              {% set w = r.window %}
                              {% if states[w] is defined and is_state(w, 'on') %}
                                {% set p = r.presence %}
                                {% set presence_active = (p not in ['', 'none', 'None']) and (states[p] is defined) and is_state(p, 'on') %}
                                {% if force_notify or not presence_active %}
                                  {% set ns.eligible = true %}
                                {% endif %}
                              {% endif %}
                            {% endfor %}
                            {% set indoor_s = inputs.cooling_indoor_temp_sensor | default('') | string | trim %}
                            {% set outdoor_s = inputs.cooling_outdoor_temp_source | default('') | string | trim %}
                            {% set cool_ok = false %}
                            {% if (inputs.enable_cooling | bool(false)) and indoor_s not in ['', 'none', 'None'] and has_value(indoor_s) %}
                              {% set indoor_t = states(indoor_s) | float(0) %}
                              {% set outdoor_t = 0 %}
                              {% if outdoor_s not in ['', 'none', 'None'] and has_value(outdoor_s) %}
                                {% set outdoor_t = states(outdoor_s) | float(0) %}
                              {% elif inputs.weather_entity | default('') | string | trim != '' %}
                                {% set outdoor_t = state_attr(inputs.weather_entity, 'temperature') | float(0) %}
                              {% endif %}
                              {% set cool_ok = indoor_t >= (inputs.cooling_indoor_threshold | float(25)) and outdoor_t <= (indoor_t - (inputs.cooling_hysteresis | float(2.0))) and (in_cooling_window | bool(false)) %}
                            {% endif %}
                            {{ ns.eligible and not cool_ok and repeat.index <= 60 }}
                      sequence:
                        - variables:
                            escalation_open_text: >
                              {% set ns = namespace(items=[]) %}
                              {% set force_notify = inputs.notify_on_presence | bool(false) %}
                              {% for r in rooms_runtime %}
                                {% set w = r.window %}
                                {% if states[w] is defined and is_state(w, 'on') %}
                                  {% set p = r.presence %}
                                  {% set presence_active = (p not in ['', 'none', 'None']) and (states[p] is defined) and is_state(p, 'on') %}
                                  {% if force_notify or not presence_active %}
                                    {% set lbl_raw = r.label | trim %}
                                    {% set fn = state_attr(w, 'friendly_name') %}
                                    {% set lbl = lbl_raw if lbl_raw != '' else (fn if fn is not none else w) %}
                                    {% set ns.items = ns.items + [lbl] %}
                                  {% endif %}
                                {% endif %}
                              {% endfor %}
                              {{ ns.items | join(', ') if ns.items | length > 0 else 'Fenster' }}

                        # Send critical notification with action buttons
                        - repeat:
                            for_each: "{{ (critical_targets_list | trim).split(',') if (critical_targets_list | trim) != '' else [] }}"
                            sequence:
                              - action: "{{ repeat.item | trim }}"
                                data:
                                  title: "🚨 Fenster zu!"
                                  message: "{{ escalation_open_text }} noch offen!\n(Lüftungs-Steuerung)"
                                  data:
                                    tag: vaillant_lueftung
                                    push:
                                      interruption-level: critical
                                      sound:
                                        name: alarm.caf
                                        critical: 1
                                        volume: 1.0
                                    ttl: 0
                                    priority: high
                                    actions:
                                      - action: "VAILLANT_LUEFTUNG_SNOOZE_1H"
                                        title: "⏰ In 1h erinnern"
                                continue_on_error: true

                        # Wait for snooze action OR 1 minute timeout
                        - wait_for_trigger:
                            - trigger: event
                              event_type: mobile_app_notification_action
                              event_data:
                                action: "VAILLANT_LUEFTUNG_SNOOZE_1H"
                          timeout:
                            minutes: 1
                          continue_on_timeout: true

                        # Handle snooze button response
                        - choose:
                            # ── Snooze 1h ──
                            - conditions:
                                - "{{ wait.trigger is defined and wait.trigger.event.data.action == 'VAILLANT_LUEFTUNG_SNOOZE_1H' }}"
                              sequence:
                                - repeat:
                                    for_each: "{{ (critical_targets_list | trim).split(',') if (critical_targets_list | trim) != '' else [] }}"
                                    sequence:
                                      - action: "{{ repeat.item | trim }}"
                                        data:
                                          title: "⏰ Alerts pausiert"
                                          message: "Fenster-Erinnerung in 1 Stunde."
                                          data:
                                            tag: vaillant_lueftung
                                            push:
                                              sticky: true
                                        continue_on_error: true
                                - delay:
                                    hours: 1
                                # Loop continues after delay → re-checks while condition

                          # Default: timeout → loop continues (next alert in ~1 min)

      # ════════════════════════════════════════════════════════
      # FLOW 3: SAFETY (RAIN / AWAY MODE)
      # Präsenz-aware: Räume mit aktiver Präsenz werden aus Liste gefiltert.
      # ════════════════════════════════════════════════════════
      - conditions:
          - "{{ (trigger.id in ['safety_rain', 'safety_away_mode']) | bool(false) }}"
        sequence:
          - variables:
              safety_due_to_rain: "{{ (trigger.id == 'safety_rain') | bool(false) }}"
              safety_due_to_away_mode: "{{ ((trigger.id == 'safety_away_mode') and (away_mode_active | bool(false))) | bool(false) }}"
              # Präsenz-Filter ignorieren bei Away-Mode ODER globalem Toggle
              safety_ignore_presence: "{{ (safety_due_to_away_mode | bool(false)) or (inputs.notify_on_presence | bool(false)) }}"
              safety_rooms_to_notify: >
                {% set ns = namespace(items=[]) %}
                {% for r in rooms_runtime %}
                  {% set w = r.window %}
                  {% if states[w] is defined and is_state(w, 'on') %}
                    {% set p = r.presence %}
                    {% set presence_active = (p not in ['', 'none', 'None']) and (states[p] is defined) and is_state(p, 'on') %}
                    {% if safety_ignore_presence or not presence_active %}
                      {% set lbl_raw = r.label | trim %}
                      {% set fn = state_attr(w, 'friendly_name') %}
                      {% set lbl = lbl_raw if lbl_raw != '' else (fn if fn is not none else w) %}
                      {% set ns.items = ns.items + [lbl] %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
                {{ ns.items }}
              safety_rooms_text: "{{ safety_rooms_to_notify | join(', ') if (safety_rooms_to_notify | length) > 0 else 'Fenster' }}"
              safety_should_alert: "{{ ((safety_rooms_to_notify | length) > 0) and ((safety_due_to_rain | bool(false)) or (safety_due_to_away_mode | bool(false))) }}"
              safety_reason: >
                {% if safety_due_to_rain | bool(false) %}
                  🌧️ Regen erkannt
                {% elif safety_due_to_away_mode | bool(false) %}
                  🏠 Away Mode aktiviert
                {% else %}
                  ⚠️ Sicherheits-Event
                {% endif %}

          - choose:
              - conditions:
                  - "{{ safety_should_alert | bool(false) }}"
                  - "{{ (critical_targets_list | trim) != '' }}"
                sequence:
                  - repeat:
                      for_each: "{{ (critical_targets_list | trim).split(',') if (critical_targets_list | trim) != '' else [] }}"
                      sequence:
                        - action: "{{ repeat.item | trim }}"
                          data:
                            title: "⚠️ Fenster offen!"
                            message: "{{ safety_reason }}. Offene Fenster: {{ safety_rooms_text }}.\n(Lüftungs-Steuerung)"
                            data:
                              tag: vaillant_lueftung
                              push:
                                interruption-level: critical
                                sound:
                                  name: alarm.caf
                                  critical: 1
                                  volume: 1.0
                              ttl: 0
                              priority: high
                          continue_on_error: true

      # ════════════════════════════════════════════════════════
      # FLOW 4: SUMMER COOLING — Lüften lohnt sich (Fenster auf)
      # Trigger: State-Transition (cooling_open_recommended) ODER Time-Window-Open
      # ════════════════════════════════════════════════════════
      - conditions:
          - "{{ trigger.id in ['cooling_open_recommended', 'cooling_window_open'] }}"
          - "{{ in_cooling_window | bool(false) }}"
          - "{{ cooling_currently_recommended | bool(false) }}"
          - "{{ not (rain_now | bool(false)) }}"
          - "{{ not (quiet_active | bool(false)) }}"
          - "{{ not (away_mode_active | bool(false)) }}"
          - "{{ (notify_targets_list | trim) != '' }}"
        sequence:
          # Hourly Forecast für "Lüften lohnt bis HH:MM"
          - action: weather.get_forecasts
            target:
              entity_id: !input weather_entity
            data:
              type: hourly
            response_variable: weather_forecast
            continue_on_error: true
          - variables:
              forecast_list: >
                {%- set we = inputs.weather_entity | default('') | string -%}
                {%- if weather_forecast is defined and we in (weather_forecast | default({})) -%}
                  {{ weather_forecast[we].forecast | default([], true) }}
                {%- else -%}
                  {{ [] }}
                {%- endif -%}
              # Erste Stunde wo Außen wieder ≥ (Innen − Hysterese) → Lüften lohnt nicht mehr
              cooling_until: >
                {%- set fc = forecast_list | default([], true) -%}
                {%- set indoor = cooling_indoor_temp | float(0) -%}
                {%- set hyst = inputs.cooling_hysteresis | float(2.0) -%}
                {%- set cutoff = indoor - hyst -%}
                {%- set ns = namespace(end_at=none) -%}
                {%- for f in fc[:12] -%}
                  {%- if ns.end_at is none and (f.temperature | float(99) > cutoff) -%}
                    {%- set ns.end_at = f.datetime -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- if ns.end_at -%}
                  {{ as_timestamp(ns.end_at) | timestamp_custom('%H:%M', true) }}
                {%- endif -%}
              cooling_hint: >
                {%- if (cooling_until | trim) != '' -%}
                  Lüften lohnt bis {{ cooling_until }}.
                {%- else -%}
                  Lüften lohnt sich jetzt.
                {%- endif -%}
          - repeat:
              for_each: "{{ (notify_targets_list | trim).split(',') if (notify_targets_list | trim) != '' else [] }}"
              sequence:
                - action: "{{ repeat.item | trim }}"
                  data:
                    title: "❄️ Fenster auf — kühlen!"
                    message: "Innen {{ cooling_indoor_temp | float(0) | round(1) }}°C, außen {{ cooling_outdoor_temp | float(0) | round(1) }}°C.\n{{ cooling_hint }}"
                    data:
                      tag: vaillant_lueftung
                      push:
                        sticky: true
                  continue_on_error: true

      # ════════════════════════════════════════════════════════
      # FLOW 4b: COOLING — Außen wärmer (Fenster zu)
      # WICHTIG: Suppressed WÄHREND des Cooling-Zeitfensters — User soll
      # über Nacht durchlüften können ohne Spam. Am Ende des Fensters
      # kommt eine einmalige freundliche Erinnerung (FLOW 4c).
      # ════════════════════════════════════════════════════════
      - conditions:
          - "{{ trigger.id == 'cooling_outdoor_warmer' }}"
          - "{{ not (in_cooling_window | bool(false)) }}"
          - "{{ not (quiet_active | bool(false)) }}"
          - "{{ not (away_mode_active | bool(false)) }}"
          - "{{ (notify_targets_list | trim) != '' }}"
        sequence:
          - repeat:
              for_each: "{{ (notify_targets_list | trim).split(',') if (notify_targets_list | trim) != '' else [] }}"
              sequence:
                - action: "{{ repeat.item | trim }}"
                  data:
                    title: "🌡️ Fenster zu — zu warm draußen"
                    message: "Außen {{ cooling_outdoor_temp | float(0) | round(1) }}°C, innen {{ cooling_indoor_temp | float(0) | round(1) }}°C. Offen: {{ open_windows_text }}."
                    data:
                      tag: vaillant_lueftung
                      push:
                        sticky: true
                        interruption-level: time-sensitive
                  continue_on_error: true

      # ════════════════════════════════════════════════════════
      # FLOW 4c: COOLING — Zeitfenster endet (Morgen-Reminder)
      # Einmalige freundliche Erinnerung am Ende des Cooling-Fensters,
      # falls noch ein Fenster offen ist. Keine Eskalation, kein Critical.
      # ════════════════════════════════════════════════════════
      - conditions:
          - "{{ trigger.id in ['cooling_window_end', 'cooling_schedule_end'] }}"
          - "{{ cooling_enabled | bool(false) }}"
          - "{{ any_window_open | bool(false) }}"
          - "{{ not (quiet_active | bool(false)) }}"
          - "{{ not (away_mode_active | bool(false)) }}"
          - "{{ (notify_targets_list | trim) != '' }}"
        sequence:
          - repeat:
              for_each: "{{ (notify_targets_list | trim).split(',') if (notify_targets_list | trim) != '' else [] }}"
              sequence:
                - action: "{{ repeat.item | trim }}"
                  data:
                    title: "🌬️ Lüftung beendet — Fenster zu"
                    message: "Kühlungs-Zeitfenster ist vorbei. Offen: {{ open_windows_text }}."
                    data:
                      tag: vaillant_lueftung
                      push:
                        sticky: true
                  continue_on_error: true
