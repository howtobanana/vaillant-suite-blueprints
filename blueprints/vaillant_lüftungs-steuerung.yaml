blueprint:
  name: "(Vaillant) Lüftungs-Steuerung"
  description: |
    🪟 **Modul 3: Lüftungs-Assistent**

    Managt das Stoßlüften und schützt vor vergessenen Fenstern. Unabhängig von der Heizung.

    **Kern-Funktionen:**
    - 🌬️ Erinnerung zum Lüften (Zeit, CO2 oder Feuchte).
    - ⏱️ Close-Timer: Erinnert ans Schließen nach X Minuten.
    - 🚨 Eskalation: Nerviger Alarm, wenn Fenster offen bleiben.
    - 🔇 Snooze/Mute: Eskalation per Push-Button pausieren oder deaktivieren.
    - 🌧️ Sicherheits-Warnung bei Regen oder Verlassen des Hauses.
    - ❄️ Sommer-Kühlung: Benachrichtigung wenn Lüften die Wohnung kühlen kann.

    **Das Ökosystem:**
    Entwickelt für den Betrieb im Verbund mit:
    *   🌡️ `(Vaillant) Heizungs-Steuerung` (Zentrale Heizungslogik).
    *   📍 `(Vaillant) Geofencing` (Anwesenheit & Eco).
    *   ❤️ `(Vaillant) System-Diagnose` (Wartung & Batterien).

    **Info:**
    Dieses Modul sendet nur Nachrichten. Das "Core Heating" Modul erkennt die offenen Fenster separat und stoppt die Heizung automatisch.

    **Version:** 2.0 | **Autor:** BananaPower

  domain: automation
  source_url: https://raw.githubusercontent.com/howtobanana/vaillant-suite-blueprints/main/blueprints/vaillant_l%C3%BCftungs-steuerung.yaml
  author: "bananapower"

  input:
    section_global:
      name: "🌍 Global: Wetter, Away & Notifications"
      description: |
        Zentrale Konfiguration für Wetter, Away-Status, Reminder und Benachrichtigungen.
        Diese Werte gelten für alle Räume.
      collapsed: false
      input:
        weather_entity:
          name: "🌧️ Wetter-Entity"
          description: |
            Weather-Entity für Regenstatus und Regenprognose (z.B. weather.home).
          selector:
            entity:
              domain: weather
        away_mode_boolean:
          name: "🏠 Away-Mode Helper"
          description: |
            Global Away-Helper for safety check (same as Core Heating).
          selector:
            entity:
              domain: input_boolean

        enable_daily_reminder:
          name: "🔘 Tägliche Erinnerung aktiv"
          description: |
            Schalter: Täglichen Reminder zur Reminder-Zeit senden.
          default: true
          selector:
            boolean:
        reminder_time:
          name: "🕐 Reminder-Zeit"
          description: |
            Beispiel: 13:00 Uhr.
          default: "13:00:00"
          selector:
            time:
        co2_sensor:
          name: "🫧 CO2 Sensor (opt)"
          description: |
            Optionaler CO2-Sensor für bedarfsbasierte Lüftungs-Reminder.
          default: ""
          selector:
            entity:
              domain: sensor
        co2_threshold:
          name: "🫧 CO2 Grenzwert (ppm)"
          description: |
            Reminder auslösen, wenn CO2 darüber liegt.
          default: 1200
          selector:
            number:
              min: 600
              max: 4000
              step: 50
              unit_of_measurement: "ppm"
        humidity_sensor:
          name: "💧 Luftfeuchte Sensor (opt)"
          description: |
            Optionaler Feuchtesensor für bedarfsbasierte Lüftungs-Reminder.
          default: ""
          selector:
            entity:
              domain: sensor
              device_class:
                - humidity
        humidity_threshold:
          name: "💧 Feuchte Grenzwert (%)"
          description: |
            Reminder auslösen, wenn Luftfeuchte darüber liegt.
          default: 60
          selector:
            number:
              min: 40
              max: 90
              step: 1
              unit_of_measurement: "%"

        airing_duration:
          name: "🪟 Lüftungsdauer (min)"
          description: |
            Wie lange Fenster für Stoßlüften offen bleiben sollen.
          default: 10
          selector:
            number:
              min: 1
              max: 60
              step: 1
              unit_of_measurement: "min"
        escalation_delay:
          name: "⚠️ Eskalations-Delay (min)"
          description: |
            Wie lange nach dem "Bitte schließen" Reminder bis kritische Alerts starten.
          default: 5
          selector:
            number:
              min: 1
              max: 60
              step: 1
              unit_of_measurement: "min"

    section_master:
      name: "🏠 Master-Raum"
      description: |
        Fensterkontakt für den Master-Bereich.
      collapsed: false
      input:
        master_window:
          name: "🪟 Master Fensterkontakt"
          description: |
            Fensterkontakt des Master-Raums.
          default: ""
          selector:
            entity:
              domain: binary_sensor
              device_class: window

    section_room2:
      name: "🛏️ Raum 2"
      description: |
        Fensterkontakt für Raum 2.
      collapsed: true
      input:
        room2_window:
          name: "🪟 Raum 2 Fensterkontakt"
          description: |
            Fensterkontakt von Raum 2.
          default: ""
          selector:
            entity:
              domain: binary_sensor
              device_class: window

    section_room3:
      name: "💻 Raum 3"
      description: |
        Fensterkontakt für Raum 3.
      collapsed: true
      input:
        room3_window:
          name: "🪟 Raum 3 Fensterkontakt"
          description: |
            Fensterkontakt von Raum 3.
          default: ""
          selector:
            entity:
              domain: binary_sensor
              device_class: window

    section_room4:
      name: "🛁 Raum 4"
      description: |
        Fensterkontakt für Raum 4.
      collapsed: true
      input:
        room4_window:
          name: "🪟 Raum 4 Fensterkontakt"
          description: |
            Fensterkontakt von Raum 4.
          default: ""
          selector:
            entity:
              domain: binary_sensor
              device_class: window

    section_room5:
      name: "🍳 Raum 5"
      description: |
        Fensterkontakt für Raum 5.
      collapsed: true
      input:
        room5_window:
          name: "🪟 Raum 5 Fensterkontakt"
          description: |
            Fensterkontakt von Raum 5.
          default: ""
          selector:
            entity:
              domain: binary_sensor
              device_class: window

    section_cooling:
      name: "❄️ Sommer-Kühlung"
      description: |
        Intelligente Kühlung durch Lüften im Sommer.
        Benachrichtigt wenn Innentemperatur hoch UND Außentemperatur kühler ist.
        Unterdrückt "Fenster schließen" Alerts, wenn Kühlung sinnvoll ist.
      collapsed: true
      input:
        enable_cooling:
          name: "🔘 Sommer-Kühlung aktivieren"
          description: |
            Master-Schalter für die Kühlungs-Logik.
          default: false
          selector:
            boolean:
        cooling_indoor_temp_sensor:
          name: "🌡️ Innentemperatur-Sensor"
          description: |
            Sensor für die Innentemperatur (z.B. Wohnzimmer).
          default: ""
          selector:
            entity:
              domain: sensor
              device_class: temperature
        cooling_outdoor_temp_source:
          name: "🌡️ Außentemperatur-Sensor (opt)"
          description: |
            Optionaler externer Temperatursensor.
            Wenn leer, wird die Temperatur aus der Wetter-Entity verwendet.
          default: ""
          selector:
            entity:
              domain: sensor
              device_class: temperature
        cooling_indoor_threshold:
          name: "🌡️ Innen-Schwelle (°C)"
          description: |
            Ab dieser Innentemperatur werden Kühlungs-Notifications gesendet.
          default: 25
          selector:
            number:
              min: 20
              max: 35
              step: 0.5
              unit_of_measurement: "°C"
        cooling_schedule:
          name: "🕐 Kühlungs-Zeitplan (opt)"
          description: |
            Wann Kühlungs-Notifications erlaubt sind (z.B. 14:00–22:00).
            Leer lassen = immer erlaubt wenn Kühlung aktiv.
          default: ""
          selector:
            entity:
              domain: schedule
        cooling_hysteresis:
          name: "🌡️ Hysterese (°C)"
          description: |
            Außentemp muss mindestens X °C unter Innentemp liegen
            für eine Kühlempfehlung. Verhindert Flatter-Notifications.
          default: 2.0
          selector:
            number:
              min: 0.5
              max: 5.0
              step: 0.5
              unit_of_measurement: "°C"

    section_notifications:
      name: "📩 Benachrichtigungen"
      description: |
        Geräte für Push-Notifications (Normal & Kritisch).
      collapsed: false
      input:
        quiet_schedule:
          name: "🌙 Ruhezeit-Zeitplan"
          description: |
            Optionaler Zeitplan (schedule-Helfer) für Ruhezeiten.
            Wenn aktiv (on), werden alle Benachrichtigungen unterdrückt.
            Leer lassen = keine Ruhezeit-Blockierung.
          default: ""
          selector:
            entity:
              domain: schedule
        mute_alerts_boolean:
          name: "🔇 Fenster-Alerts Stummschaltung (opt)"
          description: |
            Optionaler input_boolean Helfer für Push-Button-Stummschaltung.
            Wird per Push-Button aktiviert ("Für heute deaktivieren")
            und um Mitternacht automatisch zurückgesetzt.
            Erstellen: Einstellungen → Helfer → Umschalter.
            Leer lassen = Stummschaltung nicht verfügbar.
          default: ""
          selector:
            entity:
              domain: input_boolean
        notify_device:
          name: "📩 Notify Gerät (Normal)"
          description: |
            Mobile-App Gerät(e) für Standard-Reminder.
          default: []
          selector:
            device:
              filter:
                integration: mobile_app
              multiple: true
        critical_notify_device:
          name: "🚨 Notify Gerät (Critical)"
          description: |
            Mobile-App Gerät(e) für kritische Alarm-Meldungen.
          default: []
          selector:
            device:
              filter:
                integration: mobile_app
              multiple: true

mode: parallel
max: 10

trigger_variables:
  tv_co2_sensor: !input co2_sensor
  tv_co2_threshold: !input co2_threshold
  tv_humidity_sensor: !input humidity_sensor
  tv_humidity_threshold: !input humidity_threshold
  tv_cooling_indoor_temp_sensor: !input cooling_indoor_temp_sensor
  tv_cooling_outdoor_temp_source: !input cooling_outdoor_temp_source
  tv_weather_entity: !input weather_entity
  tv_enable_cooling: !input enable_cooling
  tv_cooling_indoor_threshold: !input cooling_indoor_threshold
  tv_cooling_hysteresis: !input cooling_hysteresis

trigger:
  # Need Fresh Air
  - trigger: time
    at: !input reminder_time
    id: need_fresh_air_time

  - trigger: template
    value_template: >
      {{ tv_co2_sensor != '' and has_value(tv_co2_sensor) and (states(tv_co2_sensor) | float(0)) > (tv_co2_threshold | float(1200)) }}
    for: "00:05:00"
    id: need_fresh_air_co2

  - trigger: template
    value_template: >
      {{ tv_humidity_sensor != '' and has_value(tv_humidity_sensor) and (states(tv_humidity_sensor) | float(0)) > (tv_humidity_threshold | float(60)) }}
    for: "00:05:00"
    id: need_fresh_air_humidity

  # Window opened (per room)
  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input master_window
    id: master_window_change

  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input room2_window
    id: room2_window_change

  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input room3_window
    id: room3_window_change

  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input room4_window
    id: room4_window_change

  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input room5_window
    id: room5_window_change

  # Safety: Rain detected
  - trigger: state
    entity_id: !input weather_entity
    to:
      - "rainy"
      - "pouring"
      - "lightning-rainy"
      - "hail"
      - "snowy-rainy"
    id: safety_rain

  # Safety: Away Mode activated
  - trigger: state
    entity_id: !input away_mode_boolean
    to: "on"
    id: safety_away_mode

  # Cooling: Periodic check (every 10 min)
  - trigger: time_pattern
    minutes: "/10"
    id: cooling_check

  # Cooling: Outdoor temp rose above indoor (close windows)
  - trigger: template
    value_template: >
      {% set indoor_s = tv_cooling_indoor_temp_sensor | default('') | string | trim %}
      {% set outdoor_s = tv_cooling_outdoor_temp_source | default('') | string | trim %}
      {% if (tv_enable_cooling | default(false) | bool(false)) and indoor_s not in ['', 'none'] and has_value(indoor_s) %}
        {% set indoor = states(indoor_s) | float(0) %}
        {% set outdoor = 0 %}
        {% if outdoor_s not in ['', 'none'] and has_value(outdoor_s) %}
          {% set outdoor = states(outdoor_s) | float(0) %}
        {% elif tv_weather_entity | default('') | string | trim != '' %}
          {% set outdoor = state_attr(tv_weather_entity, 'temperature') | float(0) %}
        {% endif %}
        {{ outdoor > indoor }}
      {% else %}
        {{ false }}
      {% endif %}
    for: "00:05:00"
    id: cooling_outdoor_warmer

  # Midnight: Reset mute boolean
  - trigger: time
    at: "00:00:00"
    id: midnight_reset

action:
  - variables:
      inputs:
        weather_entity: !input weather_entity
        away_mode_boolean: !input away_mode_boolean
        enable_daily_reminder: !input enable_daily_reminder
        reminder_time: !input reminder_time
        co2_sensor: !input co2_sensor
        co2_threshold: !input co2_threshold
        humidity_sensor: !input humidity_sensor
        humidity_threshold: !input humidity_threshold
        airing_duration: !input airing_duration
        escalation_delay: !input escalation_delay
        notify_device: !input notify_device
        critical_notify_device: !input critical_notify_device
        quiet_schedule: !input quiet_schedule
        mute_alerts_boolean: !input mute_alerts_boolean
        master_window: !input master_window
        room2_window: !input room2_window
        room3_window: !input room3_window
        room4_window: !input room4_window
        room5_window: !input room5_window
        enable_cooling: !input enable_cooling
        cooling_indoor_temp_sensor: !input cooling_indoor_temp_sensor
        cooling_outdoor_temp_source: !input cooling_outdoor_temp_source
        cooling_indoor_threshold: !input cooling_indoor_threshold
        cooling_schedule: !input cooling_schedule
        cooling_hysteresis: !input cooling_hysteresis

      window_entities: >
        {% set ns = namespace(items=[]) %}
        {% for w in [inputs.master_window, inputs.room2_window, inputs.room3_window, inputs.room4_window, inputs.room5_window] %}
          {% if w is string and (w | trim) != '' %}
            {% set ns.items = ns.items + [w] %}
          {% endif %}
        {% endfor %}
        {{ ns.items }}

      rain_states:
        - rainy
        - pouring
        - lightning-rainy
        - hail
        - snowy-rainy

      window_trigger_ids:
        - master_window_change
        - room2_window_change
        - room3_window_change
        - room4_window_change
        - room5_window_change

      away_mode_active: >
        {% if inputs.away_mode_boolean != '' %}
          {{ is_state(inputs.away_mode_boolean, 'on') }}
        {% else %}
          {{ false }}
        {% endif %}

      quiet_active: >
        {% if inputs.quiet_schedule | default('') | string | trim not in ['', 'none', 'None'] %}
          {{ is_state(inputs.quiet_schedule, 'on') }}
        {% else %}
          {{ false }}
        {% endif %}

      mute_alerts_entity: "{{ inputs.mute_alerts_boolean | default('') | string | trim }}"
      mute_alerts_configured: "{{ mute_alerts_entity not in ['', 'none', 'None'] }}"
      mute_alerts_active: >
        {% if mute_alerts_configured %}
          {{ is_state(mute_alerts_entity, 'on') }}
        {% else %}
          {{ false }}
        {% endif %}

      rain_now: "{{ states(inputs.weather_entity) in rain_states }}"

      co2_sensor_entity: "{{ inputs.co2_sensor | default('') | string | trim }}"
      humidity_sensor_entity: "{{ inputs.humidity_sensor | default('') | string | trim }}"

      co2_value: >
        {% if co2_sensor_entity != '' and has_value(co2_sensor_entity) %}
          {{ states(co2_sensor_entity) | float(0) }}
        {% else %}
          {{ 0 }}
        {% endif %}

      humidity_value: >
        {% if humidity_sensor_entity != '' and has_value(humidity_sensor_entity) %}
          {{ states(humidity_sensor_entity) | float(0) }}
        {% else %}
          {{ 0 }}
        {% endif %}

      co2_high: "{{ co2_sensor_entity != '' and (co2_value | float(0)) > (inputs.co2_threshold | float(1200)) }}"
      humidity_high: "{{ humidity_sensor_entity != '' and (humidity_value | float(0)) > (inputs.humidity_threshold | float(60)) }}"

      reminder_triggered: >
        {{
          (trigger.id == 'need_fresh_air_time' and (inputs.enable_daily_reminder | bool(false)))
          or (trigger.id in ['need_fresh_air_co2', 'need_fresh_air_humidity'])
        }}

      reminder_reason: >
        {% set reasons = [] %}
        {% if trigger.id == 'need_fresh_air_time' and (inputs.enable_daily_reminder | bool(false)) %}
          {% set reasons = reasons + ['Tageszeit erreicht (' ~ (inputs.reminder_time[:5] if inputs.reminder_time is string else 'Reminder') ~ ')'] %}
        {% endif %}
        {% if co2_high | bool(false) %}
          {% set reasons = reasons + ['CO2 hoch: ' ~ (co2_value | round(0)) ~ ' ppm'] %}
        {% endif %}
        {% if humidity_high | bool(false) %}
          {% set reasons = reasons + ['Luftfeuchte hoch: ' ~ (humidity_value | round(1)) ~ '%'] %}
        {% endif %}
        {{ reasons | join(' | ') }}

      open_windows_text: >
        {% set ns = namespace(items=[]) %}
        {% for w in window_entities %}
          {% if w != '' and states[w] is defined and is_state(w, 'on') %}
            {% set label = state_attr(w, 'friendly_name') if state_attr(w, 'friendly_name') is not none else w %}
            {% set ns.items = ns.items + [label] %}
          {% endif %}
        {% endfor %}
        {{ ns.items | join(', ') if ns.items | length > 0 else 'Fenster' }}

      any_window_open: >
        {% set ns = namespace(open=false) %}
        {% for w in window_entities %}
          {% if w != '' and states[w] is defined and is_state(w, 'on') %}
            {% set ns.open = true %}
          {% endif %}
        {% endfor %}
        {{ ns.open | bool(false) }}

      window_opened_trigger: >
        {% if trigger.id in window_trigger_ids and trigger.event is defined and trigger.event.data is defined and trigger.event.data.new_state is defined and trigger.event.data.new_state is not none and trigger.event.data.new_state.state is defined %}
          {% set new_s = trigger.event.data.new_state.state %}
          {% set old_s = trigger.event.data.old_state.state if (trigger.event.data.old_state is defined and trigger.event.data.old_state is not none and trigger.event.data.old_state.state is defined) else '' %}
          {{ new_s == 'on' and old_s != 'on' }}
        {% else %}
          {{ false }}
        {% endif %}

      notify_targets_list: >
        {% set raw = inputs.notify_device %}
        {% set ns = namespace(items=[]) %}
        {% set r_list = raw if (raw is iterable and raw is not string) else ([raw] if raw != '' else []) %}
        {% for ent_raw in r_list %}
          {% set ent = (ent_raw | string) | trim %}
          {% if ent != '' %}
            {% set dev_name = device_attr(ent, 'name') %}
            {% if dev_name is string and (dev_name | trim) != '' %}
              {% set ns.items = ns.items + ['notify.mobile_app_' ~ ((dev_name | slugify) | replace('-', '_'))] %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ ns.items | unique | join(',') }}

      critical_targets_list: >
        {% set raw = inputs.critical_notify_device %}
        {% set ns = namespace(items=[]) %}
        {% set r_list = raw if (raw is iterable and raw is not string) else ([raw] if raw != '' else []) %}
        {% for ent_raw in r_list %}
          {% set ent = (ent_raw | string) | trim %}
          {% if ent != '' %}
            {% set dev_name = device_attr(ent, 'name') %}
            {% if dev_name is string and (dev_name | trim) != '' %}
              {% set ns.items = ns.items + ['notify.mobile_app_' ~ ((dev_name | slugify) | replace('-', '_'))] %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {% if (ns.items | length) == 0 %}
          {{ notify_targets_list }}
        {% else %}
          {{ ns.items | unique | join(',') }}
        {% endif %}

      # ── Cooling variables ──
      cooling_enabled: "{{ inputs.enable_cooling | bool(false) }}"

      cooling_indoor_temp: >
        {% set s = inputs.cooling_indoor_temp_sensor | default('') | string | trim %}
        {% if s not in ['', 'none', 'None'] and has_value(s) %}
          {{ states(s) | float(0) }}
        {% else %}
          {{ 0 }}
        {% endif %}

      cooling_outdoor_temp: >
        {% set s = inputs.cooling_outdoor_temp_source | default('') | string | trim %}
        {% if s not in ['', 'none', 'None'] and has_value(s) %}
          {{ states(s) | float(0) }}
        {% elif inputs.weather_entity | default('') | string | trim != '' and state_attr(inputs.weather_entity, 'temperature') is not none %}
          {{ state_attr(inputs.weather_entity, 'temperature') | float(0) }}
        {% else %}
          {{ 0 }}
        {% endif %}

      cooling_sensors_valid: >
        {% set indoor_s = inputs.cooling_indoor_temp_sensor | default('') | string | trim %}
        {% set outdoor_s = inputs.cooling_outdoor_temp_source | default('') | string | trim %}
        {% set indoor_ok = indoor_s not in ['', 'none', 'None'] and has_value(indoor_s) %}
        {% set outdoor_ok = (outdoor_s not in ['', 'none', 'None'] and has_value(outdoor_s)) or (inputs.weather_entity | default('') | string | trim != '' and state_attr(inputs.weather_entity, 'temperature') is not none) %}
        {{ indoor_ok and outdoor_ok }}

      cooling_schedule_active: >
        {% set s = inputs.cooling_schedule | default('') | string | trim %}
        {% if s not in ['', 'none', 'None'] %}
          {{ is_state(s, 'on') }}
        {% else %}
          {{ true }}
        {% endif %}

      cooling_beneficial: >
        {{
          (cooling_enabled | bool(false))
          and (cooling_sensors_valid | bool(false))
          and ((cooling_indoor_temp | float(0)) >= (inputs.cooling_indoor_threshold | float(25)))
          and ((cooling_outdoor_temp | float(0)) <= ((cooling_indoor_temp | float(0)) - (inputs.cooling_hysteresis | float(2.0))))
          and (cooling_schedule_active | bool(false))
          and not (rain_now | bool(false))
          and not (away_mode_active | bool(false))
        }}

      cooling_no_longer_beneficial: >
        {{
          (cooling_enabled | bool(false))
          and (cooling_sensors_valid | bool(false))
          and ((cooling_outdoor_temp | float(0)) > (cooling_indoor_temp | float(0)))
        }}

  # ════════════════════════════════════════════════════════════
  # MIDNIGHT RESET: Auto-reset mute boolean
  # ════════════════════════════════════════════════════════════
  - choose:
      - conditions:
          - "{{ trigger.id == 'midnight_reset' }}"
        sequence:
          - if:
              - "{{ mute_alerts_configured and (mute_alerts_active | bool(false)) }}"
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: "{{ mute_alerts_entity }}"
                continue_on_error: true
          - stop: "Midnight reset done"

  # ════════════════════════════════════════════════════════════
  # FLOW 1: NEED FRESH AIR
  # ════════════════════════════════════════════════════════════
  - choose:
      - conditions:
          - "{{ reminder_triggered | bool(false) }}"
          - "{{ not (away_mode_active | bool(false)) }}"
          - "{{ not (quiet_active | bool(false)) }}"
          - "{{ (notify_targets_list | trim) != '' }}"
        sequence:
          - variables:
              rain_hint: >
                {%- if rain_now | bool(false) -%}
                  ⛈️ Aktuell Regen – kurz und gezielt lüften!
                {%- else -%}
                  ☀️ Kein Regen – perfekt zum Lüften.
                {%- endif -%}
          - repeat:
              for_each: "{{ (notify_targets_list | trim).split(',') }}"
              sequence:
                - action: "{{ repeat.item | trim }}"
                  data:
                    title: "🪟 Lüften empfohlen"
                    message: "Stoßlüften — {{ reminder_reason if (reminder_reason | trim) != '' else 'Trigger' }}. {{ rain_hint }} Fenster: {{ open_windows_text }}."
                    data:
                      tag: vaillant_lueftung_reminder
                      push:
                        sticky: true
                  continue_on_error: true

      # ════════════════════════════════════════════════════════
      # FLOW 2: WINDOW OPENED -> TIMER -> ESCALATION
      # ════════════════════════════════════════════════════════
      - conditions:
          - "{{ window_opened_trigger | bool(false) }}"
        sequence:
          - delay:
              minutes: "{{ inputs.airing_duration }}"

          - variables:
              any_window_open_now: >
                {% set ns = namespace(open=false) %}
                {% for w in window_entities %}
                  {% if w != '' and states[w] is defined and is_state(w, 'on') %}
                    {% set ns.open = true %}
                  {% endif %}
                {% endfor %}
                {{ ns.open | bool(false) }}
              open_windows_now_text: >
                {% set ns = namespace(items=[]) %}
                {% for w in window_entities %}
                  {% if w != '' and states[w] is defined and is_state(w, 'on') %}
                    {% set label = state_attr(w, 'friendly_name') if state_attr(w, 'friendly_name') is not none else w %}
                    {% set ns.items = ns.items + [label] %}
                  {% endif %}
                {% endfor %}
                {{ ns.items | join(', ') if ns.items | length > 0 else 'Fenster' }}
              # Recompute cooling_beneficial after airing_duration delay
              cooling_beneficial_now: >
                {% set indoor_s = inputs.cooling_indoor_temp_sensor | default('') | string | trim %}
                {% set outdoor_s = inputs.cooling_outdoor_temp_source | default('') | string | trim %}
                {% set indoor_ok = indoor_s not in ['', 'none', 'None'] and has_value(indoor_s) %}
                {% set outdoor_ok = (outdoor_s not in ['', 'none', 'None'] and has_value(outdoor_s)) or (inputs.weather_entity | default('') | string | trim != '' and state_attr(inputs.weather_entity, 'temperature') is not none) %}
                {% if (inputs.enable_cooling | bool(false)) and indoor_ok and outdoor_ok %}
                  {% set indoor_t = states(indoor_s) | float(0) %}
                  {% set outdoor_t = states(outdoor_s) | float(0) if (outdoor_s not in ['', 'none', 'None'] and has_value(outdoor_s)) else (state_attr(inputs.weather_entity, 'temperature') | float(0)) %}
                  {% set sched_s = inputs.cooling_schedule | default('') | string | trim %}
                  {% set sched_ok = is_state(sched_s, 'on') if sched_s not in ['', 'none', 'None'] else true %}
                  {{ indoor_t >= (inputs.cooling_indoor_threshold | float(25)) and outdoor_t <= (indoor_t - (inputs.cooling_hysteresis | float(2.0))) and sched_ok and not (states(inputs.weather_entity) in rain_states) and not (is_state(inputs.away_mode_boolean, 'on')) }}
                {% else %}
                  {{ false }}
                {% endif %}

          # Close reminder (suppressed when cooling is beneficial)
          - choose:
              - conditions:
                  - "{{ any_window_open_now | bool(false) }}"
                  - "{{ not (cooling_beneficial_now | bool(false)) }}"
                  - "{{ (notify_targets_list | trim) != '' }}"
                sequence:
                  - repeat:
                      for_each: "{{ (notify_targets_list | trim).split(',') if (notify_targets_list | trim) != '' else [] }}"
                      sequence:
                        - action: "{{ repeat.item | trim }}"
                          data:
                            title: "🪟 Fenster schließen"
                            message: "Lüftungszeit erreicht ({{ inputs.airing_duration | int }} min). Noch offen: {{ open_windows_now_text }}."
                            data:
                              tag: vaillant_lueftung_close
                              push:
                                sticky: true
                          continue_on_error: true

          - condition: template
            value_template: "{{ any_window_open_now | bool(false) }}"

          # Stop escalation if cooling is beneficial
          - condition: template
            value_template: "{{ not (cooling_beneficial_now | bool(false)) }}"

          - delay:
              minutes: "{{ inputs.escalation_delay }}"

          # Escalation loop with wait_for_trigger for snooze/mute
          - choose:
              - conditions:
                  - "{{ (critical_targets_list | trim) != '' }}"
                sequence:
                  - repeat:
                      while:
                        - condition: template
                          value_template: >
                            {% set ns = namespace(open=false) %}
                            {% for w in window_entities %}
                              {% if w != '' and states[w] is defined and is_state(w, 'on') %}
                                {% set ns.open = true %}
                              {% endif %}
                            {% endfor %}
                            {% set muted = false %}
                            {% if mute_alerts_entity not in ['', 'none', 'None'] %}
                              {% set muted = is_state(mute_alerts_entity, 'on') %}
                            {% endif %}
                            {% set indoor_s = inputs.cooling_indoor_temp_sensor | default('') | string | trim %}
                            {% set outdoor_s = inputs.cooling_outdoor_temp_source | default('') | string | trim %}
                            {% set cool_ok = false %}
                            {% if (inputs.enable_cooling | bool(false)) and indoor_s not in ['', 'none', 'None'] and has_value(indoor_s) %}
                              {% set indoor_t = states(indoor_s) | float(0) %}
                              {% set outdoor_t = 0 %}
                              {% if outdoor_s not in ['', 'none', 'None'] and has_value(outdoor_s) %}
                                {% set outdoor_t = states(outdoor_s) | float(0) %}
                              {% elif inputs.weather_entity | default('') | string | trim != '' %}
                                {% set outdoor_t = state_attr(inputs.weather_entity, 'temperature') | float(0) %}
                              {% endif %}
                              {% set sched_s = inputs.cooling_schedule | default('') | string | trim %}
                              {% set sched_ok = is_state(sched_s, 'on') if sched_s not in ['', 'none', 'None'] else true %}
                              {% set cool_ok = indoor_t >= (inputs.cooling_indoor_threshold | float(25)) and outdoor_t <= (indoor_t - (inputs.cooling_hysteresis | float(2.0))) and sched_ok %}
                            {% endif %}
                            {{ ns.open and not muted and not cool_ok and repeat.index <= 60 }}
                      sequence:
                        - variables:
                            escalation_open_text: >
                              {% set ns = namespace(items=[]) %}
                              {% for w in window_entities %}
                                {% if w != '' and states[w] is defined and is_state(w, 'on') %}
                                  {% set label = state_attr(w, 'friendly_name') if state_attr(w, 'friendly_name') is not none else w %}
                                  {% set ns.items = ns.items + [label] %}
                                {% endif %}
                              {% endfor %}
                              {{ ns.items | join(', ') if ns.items | length > 0 else 'Fenster' }}

                        # Send critical notification with action buttons
                        - repeat:
                            for_each: "{{ (critical_targets_list | trim).split(',') if (critical_targets_list | trim) != '' else [] }}"
                            sequence:
                              - action: "{{ repeat.item | trim }}"
                                data:
                                  title: "🚨 Fenster sofort schließen!"
                                  message: "{{ escalation_open_text }} noch offen!"
                                  data:
                                    tag: vaillant_lueftung_critical
                                    push:
                                      interruption-level: critical
                                      sound:
                                        name: alarm.caf
                                        critical: 1
                                        volume: 1.0
                                    ttl: 0
                                    priority: high
                                    actions:
                                      - action: "VAILLANT_LUEFTUNG_SNOOZE_1H"
                                        title: "⏰ In 1h erinnern"
                                      - action: "VAILLANT_LUEFTUNG_MUTE_TODAY"
                                        title: "🔇 Heute deaktivieren"
                                        destructive: true
                                continue_on_error: true

                        # Wait for user action OR 1 minute timeout
                        - wait_for_trigger:
                            - trigger: event
                              event_type: mobile_app_notification_action
                              event_data:
                                action: "VAILLANT_LUEFTUNG_SNOOZE_1H"
                            - trigger: event
                              event_type: mobile_app_notification_action
                              event_data:
                                action: "VAILLANT_LUEFTUNG_MUTE_TODAY"
                          timeout:
                            minutes: 1
                          continue_on_timeout: true

                        # Handle button responses
                        - choose:
                            # ── Snooze 1h ──
                            - conditions:
                                - "{{ wait.trigger is defined and wait.trigger.event.data.action == 'VAILLANT_LUEFTUNG_SNOOZE_1H' }}"
                              sequence:
                                - repeat:
                                    for_each: "{{ (critical_targets_list | trim).split(',') if (critical_targets_list | trim) != '' else [] }}"
                                    sequence:
                                      - action: "{{ repeat.item | trim }}"
                                        data:
                                          title: "⏰ Alerts pausiert"
                                          message: "Fenster-Erinnerung in 1 Stunde."
                                          data:
                                            tag: vaillant_lueftung_critical
                                            push:
                                              sticky: true
                                        continue_on_error: true
                                - delay:
                                    hours: 1
                                # Loop continues after delay → re-checks while condition

                            # ── Mute today ──
                            - conditions:
                                - "{{ wait.trigger is defined and wait.trigger.event.data.action == 'VAILLANT_LUEFTUNG_MUTE_TODAY' }}"
                              sequence:
                                - if:
                                    - "{{ mute_alerts_configured }}"
                                  then:
                                    - action: input_boolean.turn_on
                                      target:
                                        entity_id: "{{ mute_alerts_entity }}"
                                      continue_on_error: true
                                - repeat:
                                    for_each: "{{ (critical_targets_list | trim).split(',') if (critical_targets_list | trim) != '' else [] }}"
                                    sequence:
                                      - action: "{{ repeat.item | trim }}"
                                        data:
                                          title: "🔇 Alerts deaktiviert"
                                          message: "Keine Fenster-Alerts bis Mitternacht."
                                          data:
                                            tag: vaillant_lueftung_critical
                                            push:
                                              sticky: true
                                        continue_on_error: true
                                - stop: "Muted for today — while-loop exits"

                          # Default: timeout → loop continues (next alert in ~1 min)

      # ════════════════════════════════════════════════════════
      # FLOW 3: SAFETY (RAIN / AWAY MODE)
      # ════════════════════════════════════════════════════════
      - conditions:
          - "{{ (trigger.id in ['safety_rain', 'safety_away_mode']) | bool(false) }}"
        sequence:
          - variables:
              safety_due_to_rain: "{{ (trigger.id == 'safety_rain') | bool(false) }}"
              safety_due_to_away_mode: "{{ ((trigger.id == 'safety_away_mode') and (away_mode_active | bool(false))) | bool(false) }}"
              any_window_open_now: >
                {% set ns = namespace(open=false) %}
                {% for w in window_entities %}
                  {% if w != '' and states[w] is defined and is_state(w, 'on') %}
                    {% set ns.open = true %}
                  {% endif %}
                {% endfor %}
                {{ ns.open | bool(false) }}
              open_windows_now_text: >
                {% set ns = namespace(items=[]) %}
                {% for w in window_entities %}
                  {% if w != '' and states[w] is defined and is_state(w, 'on') %}
                    {% set label = state_attr(w, 'friendly_name') if state_attr(w, 'friendly_name') is not none else w %}
                    {% set ns.items = ns.items + [label] %}
                  {% endif %}
                {% endfor %}
                {{ ns.items | join(', ') if ns.items | length > 0 else 'Fenster' }}
              safety_should_alert: "{{ ((any_window_open_now | bool(false)) and ((safety_due_to_rain | bool(false)) or (safety_due_to_away_mode | bool(false)))) | bool(false) }}"
              safety_reason: >
                {% if safety_due_to_rain | bool(false) %}
                  🌧️ Regen erkannt
                {% elif safety_due_to_away_mode | bool(false) %}
                  🏠 Away Mode aktiviert
                {% else %}
                  ⚠️ Sicherheits-Event
                {% endif %}

          - choose:
              - conditions:
                  - "{{ safety_should_alert | bool(false) }}"
                  - "{{ (critical_targets_list | trim) != '' }}"
                sequence:
                  - repeat:
                      for_each: "{{ (critical_targets_list | trim).split(',') if (critical_targets_list | trim) != '' else [] }}"
                      sequence:
                        - action: "{{ repeat.item | trim }}"
                          data:
                            title: "⚠️ Fenster offen — Achtung!"
                            message: "{{ safety_reason }}. Offene Fenster: {{ open_windows_now_text }}."
                            data:
                              tag: vaillant_lueftung_safety
                              push:
                                interruption-level: critical
                                sound:
                                  name: alarm.caf
                                  critical: 1
                                  volume: 1.0
                              ttl: 0
                              priority: high
                          continue_on_error: true

      # ════════════════════════════════════════════════════════
      # FLOW 4: SUMMER COOLING
      # ════════════════════════════════════════════════════════
      - conditions:
          - "{{ trigger.id == 'cooling_check' }}"
          - "{{ cooling_enabled | bool(false) }}"
          - "{{ cooling_sensors_valid | bool(false) }}"
          - "{{ not (quiet_active | bool(false)) }}"
          - "{{ not (away_mode_active | bool(false)) }}"
        sequence:
          - choose:
              # Cooling beneficial + no windows open → suggest opening
              - conditions:
                  - "{{ cooling_beneficial | bool(false) }}"
                  - "{{ not (any_window_open | bool(false)) }}"
                  - "{{ (notify_targets_list | trim) != '' }}"
                sequence:
                  - repeat:
                      for_each: "{{ (notify_targets_list | trim).split(',') if (notify_targets_list | trim) != '' else [] }}"
                      sequence:
                        - action: "{{ repeat.item | trim }}"
                          data:
                            title: "❄️ Kühlen durch Lüften"
                            message: "Innen {{ cooling_indoor_temp | float(0) | round(1) }}°C, Außen {{ cooling_outdoor_temp | float(0) | round(1) }}°C — Fenster öffnen zum Kühlen!"
                            data:
                              tag: vaillant_lueftung_cooling
                              push:
                                sticky: true
                          continue_on_error: true

              # Windows open but outdoor now warmer → suggest closing
              - conditions:
                  - "{{ cooling_no_longer_beneficial | bool(false) }}"
                  - "{{ any_window_open | bool(false) }}"
                  - "{{ (notify_targets_list | trim) != '' }}"
                sequence:
                  - repeat:
                      for_each: "{{ (notify_targets_list | trim).split(',') if (notify_targets_list | trim) != '' else [] }}"
                      sequence:
                        - action: "{{ repeat.item | trim }}"
                          data:
                            title: "🌡️ Fenster schließen — Kühlung beenden"
                            message: "Außen ({{ cooling_outdoor_temp | float(0) | round(1) }}°C) jetzt wärmer als Innen ({{ cooling_indoor_temp | float(0) | round(1) }}°C). {{ open_windows_text }}."
                            data:
                              tag: vaillant_lueftung_cooling
                              push:
                                sticky: true
                          continue_on_error: true

      # ════════════════════════════════════════════════════════
      # FLOW 4b: COOLING — Outdoor temp rose above indoor (event)
      # ════════════════════════════════════════════════════════
      - conditions:
          - "{{ trigger.id == 'cooling_outdoor_warmer' }}"
          - "{{ cooling_enabled | bool(false) }}"
          - "{{ any_window_open | bool(false) }}"
          - "{{ not (quiet_active | bool(false)) }}"
          - "{{ (notify_targets_list | trim) != '' }}"
        sequence:
          - repeat:
              for_each: "{{ (notify_targets_list | trim).split(',') if (notify_targets_list | trim) != '' else [] }}"
              sequence:
                - action: "{{ repeat.item | trim }}"
                  data:
                    title: "🌡️ Fenster schließen — Kühlung beenden"
                    message: "Außen ({{ cooling_outdoor_temp | float(0) | round(1) }}°C) wärmer als Innen ({{ cooling_indoor_temp | float(0) | round(1) }}°C). Fenster schließen!"
                    data:
                      tag: vaillant_lueftung_cooling
                      push:
                        sticky: true
                        interruption-level: time-sensitive
                  continue_on_error: true
