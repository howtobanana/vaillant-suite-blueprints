  # PRESENCE TRIGGERS
  # ============================================
  - trigger: template
    value_template: >
      {% set sensors = tv_master_presence_sensors | default([], true) | reject('in', ['', 'sensor.none', 'none']) | list %}
      {{ (sensors | length > 0) and ((expand(sensors) | selectattr('state', 'eq', 'on') | list | length) > 0) }}
    for:
      minutes: !input presence_activation_delay
    id: master_presence_on
  - trigger: template
    value_template: >
      {% set sensors = tv_master_presence_sensors | default([], true) | reject('in', ['', 'sensor.none', 'none']) | list %}
      {% set on_count = expand(sensors) | selectattr('state', 'eq', 'on') | list | length %}
      {% set off_count = expand(sensors) | selectattr('state', 'eq', 'off') | list | length %}
      {{ (sensors | length > 0) and ((on_count + off_count) == (sensors | length)) and (on_count == 0) }}
    for:
      minutes: !input presence_deactivation_delay
    id: master_presence_off
