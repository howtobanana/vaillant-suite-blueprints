          message: |
            MASTER THERMOSTAT
            BUILD: LEITSTAND_V2_MASTER_HEATING
            RUNTIME_HINT: If you still see old layout, reload automations / restart HA
            {% set m_target = master_final_target | default(0) | float(0) %}
            {% set m_base = master_base_required_target | default(0) | float(0) %}
            {% set m_forced = master_forced_min_active | default(false) | bool(false) %}
            {% set m_away = away_mode_entity_on | default(false) | bool(false) %}
            {% set m_boost = master_boost_active | default(false) | bool(false) %}
            {% set m_weather = weather_modifier_sanitized | default(0) | float(0) %}
            {% set m_humidity = master_humidity_drop | default(0) | float(0) %}
