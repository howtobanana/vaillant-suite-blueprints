          description: |
            **Pflicht-Helper für API-Budget und Anti-Cycling.**

            **Typ:** `input_text` (max 255 Zeichen).

            Speichert Write-Richtung und Timestamps im Format: `kind:ts1,ts2,...`
            Ermöglicht Sliding-Window Budget-Tracking (N Writes pro 60min).

            ⚠️ **NICHT manuell ändern!** Wird automatisch vom Blueprint verwaltet.

            **Erstellen:** Einstellungen → Helfer → Text → Name: "Vaillant Master Write Log" → Max: 255
          selector:
            entity:
              domain: input_text

