            MODIFIERS
            Boost: {{ 'ACTIVE' if m_boost else 'OFF' }}
            Weather: {{ m_weather | round(1) }}°C
            Humidity: {{ m_humidity | round(1) }}°C

            RAUM STATUS
            {% set hys = inputs.hysteresis | float(0.6) %}
