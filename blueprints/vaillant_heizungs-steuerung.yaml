      {{ (tv_follower1_window | string not in ['', 'sensor.none', 'none']) and is_state(tv_follower1_window, 'on') }}
    for:
      seconds: !input window_heat_delay
    id: follower1_window_open_30s
  - trigger: template
    value_template: >
      {{ (tv_follower1_window | string not in ['', 'sensor.none', 'none']) and is_state(tv_follower1_window, 'off') }}
    id: follower1_window_closed
  - trigger: template
    value_template: >
      {{ (tv_follower2_window | string not in ['', 'sensor.none', 'none']) and is_state(tv_follower2_window, 'on') }}
    for:
      seconds: !input window_heat_delay
    id: follower2_window_open_30s
  - trigger: template
