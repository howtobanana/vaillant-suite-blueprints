            {% set master_man_safe = master_is_manual | default(false) | bool(false) %}
            {% set master_mode = 'Zeitplan' if master_sched_safe else ('Praesenz' if master_pres_safe else ('Manual' if master_man_safe else 'Eco')) %}
            {% set master_heating_on = (master_target_safe > ((master_current_temp | float(0)) + hys)) and (master_sched_safe or master_pres_safe or master_man_safe) %}
            Wohnzimmer: {{ master_target_safe | round(1) }}°C | {{ master_mode }} | Heating {{ 'ON' if master_heating_on else 'OFF' }}

            {% if inputs.room2_enabled | default(false) | bool(false) %}
            {% set r2_tgt = room2_final_temp | default(0) | float(0) %}
            {% set r2_cur = room2_current_temp | default(21) | float(21) %}
            {% set r2_sched = room2_schedule_active | default(false) | bool(false) %}
            {% set r2_pres = room2_presence | default(false) | bool(false) %}
            {% set r2_man = room2_is_manual | default(false) | bool(false) %}
            {% set r2_act = room2_active_for_demand | default((r2_sched or r2_pres or r2_man)) | bool(false) %}
            {% set r2_boost = room2_needs_boost | default(false) | bool(false) %}
            {% set r2_heat = r2_act and (r2_tgt > (r2_cur + hys)) %}
            {% if inputs.room2_climate | string not in ['', 'sensor.none', 'none'] %}
            {% set r2_hvac = state_attr(inputs.room2_climate, 'hvac_action') | default('n/a', true) %}
            {% else %}
            {% set r2_hvac = 'n/a' %}
            {% endif %}
            Schlafzimmer: {{ r2_tgt | round(1) }}°C | {{ 'Zeitplan' if r2_sched else ('Praesenz' if r2_pres else ('Manual' if r2_man else 'Eco')) }} | Boost {{ 'ON' if r2_boost else 'OFF' }} | Heating {{ 'ON' if r2_heat else 'OFF' }} | HVAC {{ r2_hvac }}
