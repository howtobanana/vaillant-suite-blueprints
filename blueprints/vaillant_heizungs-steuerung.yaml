blueprint:
  name: "(Vaillant) Heizungs-Steuerung"
  description: |
    **Zentrale Heizungslogik für Vaillant-Systeme**

    Dieses Modul bildet das Herzstück der Heizungssteuerung. Es koordiniert den Master-Thermostat und die Heizkörperventile (TRVs) basierend auf physikalischem Bedarf, Wetterdaten und Sicherheitslogik.

    **Kern-Funktionen:**
    *   🛡️ **Dynamic Safety:** Unterscheidet zwischen Kälteeinbruch (Not-Aus) und Luftaustausch (Weiterheizen).
    *   🔗 **Smart Follower:** Dynamische Offset-Steuerung für Nebenräume (folgen dem Master).
    *   🌦️ **Gebäude-Kompensation:** Plan A per Template-Sensor (empfohlen), Plan B per Außensensor-Fallback; wirkt als Aufschlag auf den Master-Sollwert.
    *   ⚡ **Echtzeit-Reaktion:** Sofortige Anpassung bei Statusänderungen ohne Latenz.
    *   🧠 **Fail-Safe:** Mehrstufige Sicherheitslogik (Debounce, Frostschutz, 60min Time-Guard).

    **Das Ökosystem:**
    Entwickelt für den Betrieb im Verbund mit:
    *   📍 `(Vaillant) Geofencing` (Anwesenheit & Eco).
    *   💨 `(Vaillant) Lüftungs-Steuerung` (Luftaustausch & Feuchtigkeit).
    *   ❤️ `(Vaillant) System-Diagnose` (Wartung & Batterien).

    **Voraussetzungen:**
    Erfordert die **myVaillant** Integration (HACS). Besonderer Dank an die Entwickler dieser Integration für die Bereitstellung der Schnittstelle.

    **Haftungsausschluss:**
    Dies ist ein privates Projekt. Der Autor ist kein zertifizierter Installateur. Die Nutzung erfolgt auf eigene Gefahr. Für Schäden an der Anlage oder durch Fehlkonfiguration wird keine Haftung übernommen.

    **Version:** 1.0 | **Autor:** BananaPower

  domain: automation
  source_url: https://raw.githubusercontent.com/howtobanana/vaillant-suite-blueprints/main/blueprints/vaillant_heizungs-steuerung.yaml
  author: "bananapower"

  input:
    section_global:
      name: "🌍 Basisparameter"
      description: |
        Grundlegende Sicherheitsnetze, Timer, Abwesenheits-Stati und Regel-Schwellen.
        Diese Parameter bilden das stabile Fundament der Automation.
      collapsed: false
      input:
        eco_temp_input:
          name: "🌡️ Eco-Temp Helper (opt)"
          description: |
            Optionaler Slider (input_number) für die globale Eco-Temperatur. Hat Vorrang vor dem Fixwert.
          default: ""
          selector:
            entity:
              domain: input_number
        eco_temp_fixed:
          name: "🌡️ Eco-Temp Fix (°C)"
          description: |
            Fallback-Solltemperatur für den Eco-Betrieb (Standby).
          default: 19
          selector:
            number:
              min: 17
              max: 21
              step: 0.5
              unit_of_measurement: "°C"
        away_temp_input:
          name: "🌡️ Away-Temp Helper (opt)"
          description: |
            Optionaler Slider (input_number) für die globale Away-Temperatur.
          default: ""
          selector:
            entity:
              domain: input_number
        away_temp_fixed:
          name: "🌡️ Away-Temp Fix (°C)"
          description: |
            Fallback-Solltemperatur für längere Abwesenheiten.
          default: 16
          selector:
            number:
              min: 14
              max: 18
              step: 0.5
              unit_of_measurement: "°C"
        away_mode_boolean:
          name: "Away-Mode Helper (input_boolean)"
          description: |
            Globaler Urlaubsschalter. Setzt die gesamte Wohnung auf Away-Temp.
          default: []
          selector:
            entity:
              domain: input_boolean
              multiple: true
        hysteresis:
          name: "⚙️ Hysterese (°C)"
          description: |
            Latenz-Schutz: Ein TRV-Sollwert muss sich um mindestens diesen Wert ändern, bevor gesendet wird.
          default: 0.6
          selector:
            number:
              min: 0.1
              max: 1.0
              step: 0.1
              unit_of_measurement: "°C"
        min_trv_temp:
          name: "♨️ TRV Minimum (°C)"
          description: |
            Hartes Limit nach unten. Wird bei Frostschutz und offenen Fenstern genutzt.
          default: 12
          selector:
            number:
              min: 5
              max: 15
              step: 0.5
              unit_of_measurement: "°C"
        window_heat_delay:
          name: "⏱️ Fenster-Delay (s)"
          description: |
            Sekunden, die ein Fenster offen sein muss, bevor der Raum auf Frostschutz (TRV Min) fällt.
          default: 30
          selector:
            number:
              min: 10
              max: 300
              step: 5
              unit_of_measurement: "s"
        window_close_settle_seconds:
          name: "⏱️ Fenster-Zu Settling (s)"
          description: |
            Fenster muss X Sekunden geschlossen sein, bevor wieder auf Komfort hochgeregelt werden darf.
          default: 180
          selector:
            number:
              min: 0
              max: 600
              step: 5
              unit_of_measurement: "s"
        smart_drop_threshold:
          name: "📉 Smart-Drop Schwelle (°C)"
          description: |
            Temperatursturz-Sicherung: Schaltet Master ab, wenn der Ist-Wert um X °C unter den Eco-Anker fällt.
          default: 2.0
          selector:
            number:
              min: 0.0
              max: 5.0
              step: 0.5
              unit_of_measurement: "°C"
        helper_input_settle_seconds:
          name: "⏳ Debounce Latenz (s)"
          description: |
            Sicherheitspuffer, falls du am UI-Slider ziehst. Wartet X Sekunden, bevor die API gefeuert wird.
          default: 30
          selector:
            number:
              min: 5
              max: 120
              step: 5
              unit_of_measurement: "s"
        presence_activation_delay:
          name: "⏱️ Präsenz Aktivierung (min)"
          description: |
            Verzögerung, bis ein Raum als belegt gilt. Verhindert kurzes Aufheizen bei Durchqueren.
          default: 2
          selector:
            number:
              min: 0
              max: 10
              step: 1
              unit_of_measurement: "min"
        presence_deactivation_delay:
          name: "⏱️ Präsenz Nachlauf (min)"
          description: |
            Nachlaufzeit, nachdem keine Bewegung mehr erkannt wurde, bevor der Raum auf Eco abfällt.
          default: 30
          selector:
            number:
              min: 15
              max: 120
              step: 5
              unit_of_measurement: "min"
        pre_heat_timeout:
          name: "🔥 Pre-Heat Timeout (min)"
          description: |
            Maximale Vorheizdauer ab Einschalten des Toggles.
            Nach Ablauf wird der Pre-Heat Toggle automatisch auf OFF gesetzt.
            Bei Räumen MIT Präsenz oder Zeitplan wird Pre-Heat auch vorher schon
            automatisch deaktiviert, sobald Präsenz erkannt oder der Zeitplan aktiv wird.
            Für lange Anreisen (z.B. Zug) entsprechend höher setzen.
          default: 90
          selector:
            number:
              min: 30
              max: 480
              step: 15
              unit_of_measurement: "min"
        max_changes_per_hour:
          name: "🔧 API: Budget/h"
          description: |
            Budget für Vaillant Cloud Aufrufe pro rollendem 60-Minuten-Fenster. Alle Writes können schnell hintereinander genutzt werden, solange Budget vorhanden. Füllt sich automatisch auf wenn Timestamps älter als 60min werden.
          default: 10
          selector:
            number:
              min: 5
              max: 20
              step: 1
        master_hold_drop_after_raise_minutes:
          name: "⏱️ Hold Drop nach Raise (min)"
          description: |
            Nach einer Erhöhung werden Absenkungen für X Minuten gesperrt (außer Safety-Fällen).
          default: 20
          selector:
            number:
              min: 0
              max: 120
              step: 1
              unit_of_measurement: "min"
        master_hold_raise_after_drop_minutes:
          name: "⏱️ Hold Raise nach Drop (min)"
          description: |
            Nach einer Absenkung werden Erhöhungen für Y Minuten gesperrt (außer Safety-Fällen).
          default: 10
          selector:
            number:
              min: 0
              max: 120
              step: 1
              unit_of_measurement: "min"

    section_master:
      name: "🏠 Master-Raum"
      description: |

        Parameter für den führenden Master-Raum und die zentrale Sollwertstrategie.
