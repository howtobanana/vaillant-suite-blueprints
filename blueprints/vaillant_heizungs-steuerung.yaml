          temp_sensor: ""
          offset: !input follower2_offset
      helper_input_settle_seconds: !input helper_input_settle_seconds
      trigger_id_safe: "{{ trigger.id if trigger is defined and trigger is not none and trigger.id is defined else '' }}"
      helper_input_trigger_entity: >
        {% if trigger is defined and trigger is not none and trigger.event is defined and trigger.event.data is defined and trigger.event.data.entity_id is defined and trigger.event.data.entity_id is not none %}
          {% set raw_id = trigger.event.data.entity_id %}
        {% elif trigger is defined and trigger is not none and trigger.entity_id is defined and trigger.entity_id is not none %}
          {% set raw_id = trigger.entity_id %}
        {% else %}
          {% set raw_id = none %}
        {% endif %}
        {% if raw_id is none %}
          {{ '' }}
        {% elif raw_id is string %}
          {{ raw_id | string | trim }}
        {% elif raw_id is iterable %}
          {% set first_id = (raw_id | list | first) %}
          {{ first_id | string | trim if first_id is not none else '' }}
        {% else %}
          {{ raw_id | string | trim }}
        {% endif %}
      helper_input_trigger: >
        {{
