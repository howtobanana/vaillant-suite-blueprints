              domain: binary_sensor
              device_class: occupancy
              multiple: true
        master_presence_helper:
          name: "Master Presence Helper Entity"
          description: |

            Input boolean to store master presence state. Create manually: Settings -> Helpers -> Toggle -> Name: 'Heating: Master Presence Active'

          default: ""
          selector:
            entity:
              domain: input_boolean
        master_pre_heat_helper:
          name: "🔥 Master Pre-Heat Helper (opt)"
          description: |

            Optionaler Toggle zum Vorheizen des Master-Raums auf Comfort-Temperatur,
            auch wenn Zeitplan/Präsenz gerade inaktiv sind.
            Wird automatisch deaktiviert bei: Präsenz ON, Zeitplan aktiv, oder Timeout.
            Erforderlicher Helfer-Typ: **Umschalter** (input_boolean).

          default: ""
