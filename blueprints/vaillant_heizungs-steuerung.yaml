                          value: >
                            {% set kind = master_write_kind_current | default('sync', true) | string %}
                            {% set existing = master_write_timestamps_clean | default('', true) | string | trim %}
                            {% set now_ts = as_timestamp(now()) | int(0) | string %}
                            {% set new_ts = (existing ~ ',' ~ now_ts) if (existing | length > 0) else now_ts %}
                            {{ kind ~ ':' ~ new_ts }}
                        continue_on_error: true
                  - wait_template: >
                      {{ (((state_attr(inputs.master_climate, 'temperature') | float(0)) - (master_final_target | float(0))) | abs) < 0.11 }}
                    timeout: "00:00:20"
                    continue_on_timeout: true
                  - if:
                      - "{{ not (wait.completed | default(false) | bool(false)) }}"
                    then:
                      - action: system_log.write
                        continue_on_error: true
                        data:
                          level: warning
                          message: >
                            Vaillant Blueprint: PATH A master write verification timeout (target={{ master_final_target | float(0) }}, actual={{ state_attr(inputs.master_climate, 'temperature') | float(0) }})

              # PATH B (CRITICAL): highest bidder boost or significant drop WITH strict cooldown
              - conditions:
                  - "{{ not (master_forced_min_active | bool(false)) }}"
                  - "{{ (master_needs_global_boost | bool(false)) or (master_significant_drop | bool(false)) }}"
                  - "{{ (master_target_delta_abs | float(0)) > 0.1 }}"
                  - "{{ master_change_cooldown_ok_step55 | bool(false) }}"
                  # FIX: Anti-cycling hold gate – significant drops (>= 1.5°C) always
                  # pass through, boosts respect raise-hold unless bypassed by event trigger
                  - >
                    {{
                      (master_significant_drop | bool(false))
                      or (master_hold_bypass | bool(false))
                      or (
                        (master_needs_global_boost | bool(false))
                        and not (master_raise_hold_active | bool(false))
                      )
                    }}
                sequence:
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ inputs.master_climate }}"
                    data:
                      temperature: "{{ master_final_target }}"
                    continue_on_error: true
                  # FIX: Write log IMMEDIATELY after API call, before wait_template.
                  - if:
                      - "{{ master_write_log_configured | bool(false) }}"
                    then:
                      - action: input_text.set_value
                        target:
                          entity_id: "{{ inputs.master_write_log_helper }}"
                        data:
                          value: >
                            {% set kind = master_write_kind_current | default('sync', true) | string %}
                            {% set existing = master_write_timestamps_clean | default('', true) | string | trim %}
                            {% set now_ts = as_timestamp(now()) | int(0) | string %}
                            {% set new_ts = (existing ~ ',' ~ now_ts) if (existing | length > 0) else now_ts %}
                            {{ kind ~ ':' ~ new_ts }}
                        continue_on_error: true
                  - wait_template: >
                      {{ (((state_attr(inputs.master_climate, 'temperature') | float(0)) - (master_final_target | float(0))) | abs) < 0.11 }}
                    timeout: "00:00:20"
                    continue_on_timeout: true
                  - if:
                      - "{{ not (wait.completed | default(false) | bool(false)) }}"
                    then:
                      - action: system_log.write
                        continue_on_error: true
                        data:
                          level: warning
                          message: >
                            Vaillant Blueprint: PATH B master write verification timeout (target={{ master_final_target | float(0) }}, actual={{ state_attr(inputs.master_climate, 'temperature') | float(0) }})
              # PATH C (COMFORT): regular writes with strict cooldown guard
              - conditions:
                  - "{{ master_write_allowed | bool(false) }}"
                sequence:
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ inputs.master_climate }}"
                    data:
                      temperature: "{{ master_final_target }}"
                    continue_on_error: true
                  # FIX: Write log IMMEDIATELY after API call, before wait_template.
                  - if:
                      - "{{ master_write_log_configured | bool(false) }}"
                    then:
                      - action: input_text.set_value
                        target:
                          entity_id: "{{ inputs.master_write_log_helper }}"
                        data:
                          value: >
                            {% set kind = master_write_kind_current | default('sync', true) | string %}
                            {% set existing = master_write_timestamps_clean | default('', true) | string | trim %}
                            {% set now_ts = as_timestamp(now()) | int(0) | string %}
                            {% set new_ts = (existing ~ ',' ~ now_ts) if (existing | length > 0) else now_ts %}
                            {{ kind ~ ':' ~ new_ts }}
                        continue_on_error: true
                  - wait_template: >
                      {{ (((state_attr(inputs.master_climate, 'temperature') | float(0)) - (master_final_target | float(0))) | abs) < 0.11 }}
                    timeout: "00:00:20"
                    continue_on_timeout: true
                  - if:
                      - "{{ not (wait.completed | default(false) | bool(false)) }}"
                    then:
                      - action: system_log.write
                        continue_on_error: true
                        data:
                          level: warning
                          message: >
                            Vaillant Blueprint: PATH C master write verification timeout (target={{ master_final_target | float(0) }}, actual={{ state_attr(inputs.master_climate, 'temperature') | float(0) }})
          - if:
              - condition: template
                value_template: >
                  {% set age_s = master_last_update_age_step55 | float(999999) %}
                  {% set verify_window_s = 300.0 %}
                  {% set master_entity = inputs.master_climate | string %}
                  {% set master_state = states(master_entity) if master_entity not in ['', 'sensor.none', 'none'] else '' %}
                  {% set master_entity_valid = (master_entity not in ['', 'sensor.none', 'none']) and (master_state not in ['unknown', 'unavailable', 'none', '']) %}
                  {% set actual = (state_attr(master_entity, 'temperature') | float(0)) if master_entity_valid else 0.0 %}
                  {% set mismatch = ((actual | float(0)) - (master_final_target | float(0))) | abs %}
                  {{ ((inputs.enable_leitstand_normal | default(false) | bool(false)) or (inputs.enable_leitstand_expert | default(false) | bool(false))) and (master_entity_valid | bool(false)) and (age_s <= verify_window_s) and ((mismatch | float(0)) > 0.11) }}
            then:
              - action: system_log.write
                continue_on_error: true
                data:
                  level: warning
                  message: >
                    MASTER VERIFY (restart-safe) mismatch | requested={{ master_final_target | float(0) }} actual={{ state_attr(inputs.master_climate, 'temperature') | float(0) }} delta={{ ((state_attr(inputs.master_climate, 'temperature') | float(0)) - (master_final_target | float(0))) | round(3) }}

  # ════════════════════════════════════════════════════════════
  # LEITSTAND: Shared variables for both modes
  # ════════════════════════════════════════════════════════════
  - variables:
      _quiet_active: >
        {% if inputs.quiet_schedule | default('') | string | trim not in ['', 'none', 'None'] %}
          {{ is_state(inputs.quiet_schedule, 'on') }}
        {% else %}
          {{ false }}
        {% endif %}
      _leitstand_normal: "{{ inputs.enable_leitstand_normal | default(false) | bool(false) and not (_quiet_active | bool(false)) }}"
      _leitstand_expert: "{{ inputs.enable_leitstand_expert | default(false) | bool(false) and not (_quiet_active | bool(false)) }}"
      _leitstand_any: "{{ (_leitstand_normal | bool(false)) or (_leitstand_expert | bool(false)) }}"
      _notify_targets_list: >
        {% set raw = inputs.notify_devices %}
        {% set ns = namespace(items=[]) %}
        {% set r_list = raw if (raw is iterable and raw is not string) else ([raw] if raw != '' else []) %}
        {% for ent_raw in r_list %}
          {% set ent = (ent_raw | string) | trim %}
          {% if ent != '' %}
            {% set dev_name = device_attr(ent, 'name') %}
            {% if dev_name is string and (dev_name | trim) != '' %}
              {% set ns.items = ns.items + ['notify.mobile_app_' ~ ((dev_name | slugify) | replace('-', '_'))] %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ ns.items | unique | join(',') }}
      _notify_configured: "{{ (_notify_targets_list | trim) != '' and not (_quiet_active | bool(false)) }}"
      _is_demand_event: >
        {{
          trigger_id_safe | default('manual') != 'scheduled'
          or (master_write_allowed | bool(false))
          or (master_forced_min_active | bool(false) and ((master_target_delta_abs | float(0)) > 0.5))
        }}
      _l_m_target: "{{ master_final_target | default(0) | float(0) }}"
      _l_m_base: "{{ master_base_required_target | default(0) | float(0) }}"
      _l_m_forced: "{{ master_forced_min_active | default(false) | bool(false) }}"
      _l_m_away: "{{ away_mode_entity_on | default(false) | bool(false) }}"
      _l_m_boost: "{{ master_boost_active | default(false) | bool(false) }}"
      _l_m_weather: "{{ weather_modifier_sanitized | default(0) | float(0) }}"
      _l_m_humidity: "{{ master_humidity_drop | default(0) | float(0) }}"
      _l_m_state: "{{ master_state | default('ECO', true) | string }}"
      _l_m_reason: "{{ master_reason | default('base', true) | string }}"
      _l_m_hvac: "{{ master_hvac_action | default('n/a', true) | string }}"
      _l_m_delta: "{{ master_target_delta_abs | default(0) | float(0) }}"
      _l_hvac_icon: "{{ '🔥' if (_l_m_hvac | string) == 'heating' else '💤' }}"
      _l_m_current_temp: >
        {%- set climate_curr = state_attr(inputs.master_climate, 'current_temperature') | float(21) -%}
        {%- set tid = inputs.master_temp_sensor | default('') | string -%}
        {%- if tid not in ['', 'sensor.none', 'none'] and states(tid) not in ['unknown', 'unavailable', 'none', ''] -%}
          {{ states(tid) | float(climate_curr) }}
        {%- else -%}
          {{ climate_curr }}
        {%- endif -%}
      _l_m_sched: "{{ master_schedule_active | default(false) | bool(false) }}"
      _l_m_pres: "{{ master_presence_detected | default(false) | bool(false) }}"
      _l_m_man: "{{ master_is_manual | default(false) | bool(false) }}"
      _l_m_pre_heat: "{{ master_pre_heat_active | default(false) | bool(false) }}"
      _l_m_sens_valid: "{{ master_sensors_valid | default(false) | bool(false) }}"
      _l_m_help_valid: "{{ master_helper_valid | default(false) | bool(false) }}"
      _l_m_mode_modus: "{{ 'Not-Aus' if (_l_m_forced | bool(false)) else ('Abwesend' if (_l_m_away | bool(false) and not (_l_m_pre_heat | bool(false))) else ('PreHeat' if (_l_m_pre_heat | bool(false)) else 'Heizbetrieb')) }}"

  # ════════════════════════════════════════════════════════════
  # LEITSTAND NORMAL: Demand-only Dashboard (überschreibt sich selbst)
  # ════════════════════════════════════════════════════════════
  - if:
      - "{{ _leitstand_normal | bool(false) }}"
      - "{{ _is_demand_event | bool(false) }}"
    then:
      - action: persistent_notification.create
        continue_on_error: true
        data:
          notification_id: "vaillant_leitstand"
          title: "🔥 Vaillant Leitstand ({{ now().strftime('%H:%M:%S') }})"
          message: >-
            {%- set n = '\n' -%}
            {%- set msg = namespace(out='') -%}
            {%- set msg.out = msg.out ~ '🚨 Trigger: ' ~ (trigger_id_safe | default('manual')) ~ ' | Boost ' ~ ('AN' if (_l_m_boost | bool(false)) else 'AUS') ~ ' | Wetter ' ~ (_l_m_weather | float(0) | round(1)) ~ '°C | Away ' ~ ('✅' if (_l_m_away | bool(false)) else '⬜') -%}
            {%- set msg.out = msg.out ~ n ~ n ~ '🌡️ **Master — ' ~ _l_m_state ~ ' / ' ~ _l_m_mode_modus ~ '** (' ~ _l_m_reason ~ ')' -%}
            {%- set msg.out = msg.out ~ n ~ _l_hvac_icon ~ ' Heizen | Ist ' ~ (_l_m_current_temp | float(0) | round(1)) ~ '°C → Soll ' ~ (_l_m_target | float(0) | round(1)) ~ '°C | Komfort ' ~ (master_comfort_temp | default(0) | float(0) | round(1)) ~ '°C' -%}
            {%- set msg.out = msg.out ~ n ~ ('✅' if (_l_m_pres | bool(false)) else '⬜') ~ ' Präsenz | ' ~ ('✅' if (_l_m_sched | bool(false)) else '⬜') ~ ' Zeitplan | ' ~ ('✅' if (_l_m_man | bool(false)) else '⬜') ~ ' Manuell | ' ~ ('✅' if ((_l_m_sens_valid | bool(false)) or (_l_m_help_valid | bool(false))) else '⬜') ~ ' Sensoren | ' ~ ('🔥' if (_l_m_pre_heat | bool(false)) else '⬜') ~ ' PreHeat' -%}
            {%- set msg.out = msg.out ~ n ~ n ~ '🚪 **Räume**' -%}
            {%- set ns_dis = namespace(labels=[]) -%}
            {%- for room in rooms_runtime_list | default([], true) -%}
              {%- set rk = room.key | default('?') | string -%}
              {%- set cid = room.climate | default('') | string -%}
              {%- set rok = room.room_ok | default(false) | bool(false) -%}
              {%- set rl = state_attr(cid, 'friendly_name') | default(rk, true) if rok else rk -%}
              {%- set ft = room.final_target | default(0) | float(0) -%}
              {%- set ml = room.mode_label | default('n/a') | string -%}
              {%- set ha_i = '🔥' if (room.hvac_action | default('n/a')) == 'heating' else '💤' -%}
              {%- set w_icon = ' 🪟' if (room.window_open_too_long | default(false) | bool(false)) else '' -%}
              {%- if room.enabled | default(false) | bool(false) -%}
                {%- set msg.out = msg.out ~ n ~ '▸ ' ~ rl ~ ': ' ~ (ft | round(1)) ~ '°C — ' ~ ml ~ ' ' ~ ha_i ~ w_icon -%}
              {%- else -%}
                {%- set ns_dis.labels = ns_dis.labels + [rk] -%}
              {%- endif -%}
            {%- endfor -%}
            {%- if ns_dis.labels | length > 0 -%}
              {%- set msg.out = msg.out ~ n ~ '▸ Deaktiviert: ' ~ (ns_dis.labels | join(', ')) -%}
            {%- endif -%}
            {%- set msg.out = msg.out ~ n ~ n ~ '📱 **Geräte**' -%}
            {%- for room in rooms_runtime_list | default([], true) -%}
              {%- if room.enabled | default(false) | bool(false) -%}
                {%- set cid = room.climate | default('') | string -%}
                {%- set rok = room.room_ok | default(false) | bool(false) -%}
                {%- set rl = state_attr(cid, 'friendly_name') | default(room.key | default('?'), true) if rok else (room.key | default('?')) -%}
                {%- set cok = room.climate_ok | default(false) | bool(false) -%}
                {%- set wid = room.window | default('') | string -%}
                {%- set w_configured = wid not in ['', 'sensor.none', 'none'] -%}
                {%- set w_online = w_configured and states(wid) not in ['unknown', 'unavailable'] -%}
                {%- set p_configured = (room.presence_sensors_sanitized | default([]) | length) > 0 -%}
                {%- set dev_line = ('✅' if cok else '❌') ~ 'TRV' -%}
                {%- if w_configured -%}
                  {%- set dev_line = dev_line ~ '  ' ~ ('✅' if w_online else '❌') ~ 'Fenster' -%}
                {%- endif -%}
                {%- if p_configured -%}
                  {%- set dev_line = dev_line ~ '  ' ~ '✅Präsenz' -%}
                {%- endif -%}
                {%- set msg.out = msg.out ~ n ~ '▸ ' ~ rl ~ ': ' ~ dev_line -%}
              {%- endif -%}
            {%- endfor -%}
            {%- set msg.out = msg.out ~ n ~ n ~ '🚧 ' -%}
            {%- if master_write_allowed | default(false) | bool(false) -%}
              {%- set msg.out = msg.out ~ 'Schreiben erlaubt' -%}
            {%- elif not (master_needs_raise | default(false) | bool(false)) and not (master_needs_global_drop | default(false) | bool(false)) -%}
              {%- set msg.out = msg.out ~ 'Blockiert (kein Δ)' -%}
            {%- else -%}
              {%- set msg.out = msg.out ~ 'Blockiert (Cooldown/Hold)' -%}
            {%- endif -%}
            {%- set msg.out = msg.out ~ ' | Budget ' ~ (master_write_budget_remaining | int(0)) ~ '/' ~ (max_changes_per_hour_effective | int(10)) ~ ' | Write vor ' ~ (master_last_update_age_step55 | default(0) | float(0) | round(0)) ~ 's' -%}
            {{ msg.out }}
      - if:
          - "{{ _notify_configured | bool(false) }}"
        then:
          - repeat:
              for_each: "{{ (_notify_targets_list | trim).split(',') if (_notify_targets_list | trim) != '' else [] }}"
              sequence:
                - action: "{{ repeat.item | trim }}"
                  continue_on_error: true
                  data:
                    title: "📣 Heizung Leitstand"
                    message: >-
                      {%- set n = '\n' -%}
                      {%- set msg = namespace(out='') -%}
                      {%- set msg.out = msg.out ~ '🌡️ Master: ' ~ _l_m_state ~ ' / ' ~ _l_m_mode_modus -%}
                      {%- set msg.out = msg.out ~ n ~ _l_hvac_icon ~ ' Ist ' ~ (_l_m_current_temp | float(0) | round(1)) ~ '°C → Soll ' ~ (_l_m_target | float(0) | round(1)) ~ '°C' -%}
                      {%- set msg.out = msg.out ~ n ~ '🚧 Budget ' ~ (master_write_budget_remaining | int(0)) ~ '/' ~ (max_changes_per_hour_effective | int(10)) -%}
                      {%- for room in rooms_runtime_list | default([], true) -%}
                        {%- if room.enabled | default(false) | bool(false) -%}
                          {%- set cid = room.climate | default('') | string -%}
                          {%- set rok = room.room_ok | default(false) | bool(false) -%}
                          {%- set rl = state_attr(cid, 'friendly_name') | default(room.key | default('?'), true) if rok else (room.key | default('?')) -%}
                          {%- set ft = room.final_target | default(0) | float(0) -%}
                          {%- set ml = room.mode_label | default('n/a') | string -%}
                          {%- set ha_i = '🔥' if (room.hvac_action | default('n/a')) == 'heating' else '💤' -%}
                          {%- set msg.out = msg.out ~ n ~ '▸ ' ~ rl ~ ': ' ~ (ft | round(1)) ~ '°C ' ~ ml ~ ' ' ~ ha_i -%}
                        {%- endif -%}
                      {%- endfor -%}
                      {{ msg.out }}
                    data:
                      tag: vaillant_heizung_leitstand
                      push:
                        sticky: true

  # ════════════════════════════════════════════════════════════
  # LEITSTAND EXPERT: Verlauf (unique ID, nur bei Events/Writes)
  # ════════════════════════════════════════════════════════════
  - if:
      - "{{ _leitstand_expert | bool(false) }}"
    then:
      - action: persistent_notification.create
        continue_on_error: true
        data:
          notification_id: "vaillant_expert_{{ now().strftime('%Y%m%d_%H%M%S') }}"
          title: "🔍 Expert Leitstand ({{ now().strftime('%H:%M:%S') }})"
          message: >-
            {%- set n = '\n' -%}
            {%- set msg = namespace(out='') -%}
            {%- set msg.out = msg.out ~ '🚨 Trigger: ' ~ (trigger_id_safe | default('manual')) ~ ' | Boost ' ~ ('AN' if (_l_m_boost | bool(false)) else 'AUS') ~ ' | Wetter ' ~ (_l_m_weather | float(0) | round(1)) ~ '°C | Feucht. ' ~ (_l_m_humidity | float(0) | round(1)) ~ '°C' -%}
            {%- set msg.out = msg.out ~ n ~ 'Away ' ~ ('✅' if (_l_m_away | bool(false)) else '⬜') ~ ' | Sommer ' ~ ('✅' if (summer_mode | default(false) | bool(false)) else '⬜') ~ ' | Entität: ' ~ (inputs.master_climate | default('n/a')) -%}
            {%- set msg.out = msg.out ~ n ~ n ~ '🌡️ **Master — ' ~ _l_m_state ~ ' / ' ~ _l_m_mode_modus ~ '** (' ~ _l_m_reason ~ ')' -%}
            {%- set msg.out = msg.out ~ n ~ _l_hvac_icon ~ ' Heizen | Ist ' ~ (_l_m_current_temp | float(0) | round(1)) ~ '°C → Soll ' ~ (_l_m_target | float(0) | round(1)) ~ '°C | Base ' ~ (_l_m_base | float(0) | round(1)) ~ '°C | Eco ' ~ (eco_temp | default(0) | float(0) | round(1)) ~ '°C | Δ=' ~ (_l_m_delta | float(0) | round(1)) -%}
            {%- set msg.out = msg.out ~ n ~ ('✅' if (_l_m_pres | bool(false)) else '⬜') ~ ' Präsenz | ' ~ ('✅' if (_l_m_sched | bool(false)) else '⬜') ~ ' Zeitplan | ' ~ ('✅' if (_l_m_man | bool(false)) else '⬜') ~ ' Manuell | ' ~ ('✅' if ((_l_m_sens_valid | bool(false)) or (_l_m_help_valid | bool(false))) else '⬜') ~ ' Sensoren | ' ~ ('🔥' if (_l_m_pre_heat | bool(false)) else '⬜') ~ ' PreHeat' -%}
            {%- set msg.out = msg.out ~ n ~ n ~ '🚪 **Räume**' -%}
            {%- set ns_dis = namespace(labels=[]) -%}
            {%- for room in rooms_runtime_list | default([], true) -%}
              {%- set rk = room.key | default('?') | string -%}
              {%- set cid = room.climate | default('') | string -%}
              {%- set rok = room.room_ok | default(false) | bool(false) -%}
              {%- set rl = state_attr(cid, 'friendly_name') | default(rk, true) if rok else rk -%}
              {%- set ft = room.final_target | default(0) | float(0) -%}
              {%- set ct = room.current_temp | default(0) | float(0) -%}
              {%- set rd = ((ft - ct) | abs) | round(1) -%}
              {%- set ml = room.mode_label | default('n/a') | string -%}
              {%- set ha_i = '🔥' if (room.hvac_action | default('n/a')) == 'heating' else '💤' -%}
              {%- set is_active = room.active_for_demand | default(false) | bool(false) -%}
              {%- set w_icon = ' 🪟' if (room.window_open_too_long | default(false) | bool(false)) else '' -%}
              {%- if room.enabled | default(false) | bool(false) -%}
                {%- set msg.out = msg.out ~ n ~ '▸ ' ~ rl ~ ': ' ~ (ft | round(1)) ~ '°C (Ist ' ~ (ct | round(1)) ~ '°C Δ=' ~ rd ~ ') — ' ~ ml ~ ' ' ~ ha_i ~ w_icon ~ (' — aktiv' if is_active else '') -%}
              {%- else -%}
                {%- set ns_dis.labels = ns_dis.labels + [rk] -%}
              {%- endif -%}
            {%- endfor -%}
            {%- if ns_dis.labels | length > 0 -%}
              {%- set msg.out = msg.out ~ n ~ '▸ Deaktiviert: ' ~ (ns_dis.labels | join(', ')) -%}
            {%- endif -%}
            {%- set msg.out = msg.out ~ n ~ n ~ '📱 **Geräte**' -%}
            {%- for room in rooms_runtime_list | default([], true) -%}
              {%- if room.enabled | default(false) | bool(false) -%}
                {%- set cid = room.climate | default('') | string -%}
                {%- set rok = room.room_ok | default(false) | bool(false) -%}
                {%- set rl = state_attr(cid, 'friendly_name') | default(room.key | default('?'), true) if rok else (room.key | default('?')) -%}
                {%- set cok = room.climate_ok | default(false) | bool(false) -%}
                {%- set wid = room.window | default('') | string -%}
                {%- set w_configured = wid not in ['', 'sensor.none', 'none'] -%}
                {%- set w_online = w_configured and states(wid) not in ['unknown', 'unavailable'] -%}
                {%- set p_configured = (room.presence_sensors_sanitized | default([]) | length) > 0 -%}
                {%- set dev_line = ('✅' if cok else '❌') ~ 'TRV' -%}
                {%- if w_configured -%}
                  {%- set dev_line = dev_line ~ '  ' ~ ('✅' if w_online else '❌') ~ 'Fenster' -%}
                {%- endif -%}
                {%- if p_configured -%}
                  {%- set dev_line = dev_line ~ '  ' ~ '✅Präsenz' -%}
                {%- endif -%}
                {%- set msg.out = msg.out ~ n ~ '▸ ' ~ rl ~ ': ' ~ dev_line -%}
              {%- endif -%}
            {%- endfor -%}
            {%- set msg.out = msg.out ~ n ~ n ~ '🚧 ' -%}
            {%- if master_write_allowed | default(false) | bool(false) -%}
              {%- set msg.out = msg.out ~ 'Schreiben erlaubt' -%}
            {%- elif not (master_needs_raise | default(false) | bool(false)) and not (master_needs_global_drop | default(false) | bool(false)) -%}
              {%- set msg.out = msg.out ~ 'Blockiert (kein Δ)' -%}
            {%- else -%}
              {%- set msg.out = msg.out ~ 'Blockiert (Cooldown/Hold)' -%}
            {%- endif -%}
            {%- set msg.out = msg.out ~ ' | Budget ' ~ (master_write_budget_remaining | int(0)) ~ '/' ~ (max_changes_per_hour_effective | int(10)) ~ ' | Write vor ' ~ (master_last_update_age_step55 | default(0) | float(0) | round(0)) ~ 's' -%}
            {%- set msg.out = msg.out ~ n ~ 'Raise ' ~ ('✅' if (master_needs_raise | default(false) | bool(false)) else '⬜') ~ ' | Drop ' ~ ('✅' if (master_needs_global_drop | default(false) | bool(false)) else '⬜') ~ ' | Hold ' ~ ('✅' if (master_drop_hold_active | default(false) | bool(false)) or (master_raise_hold_active | default(false) | bool(false)) else '⬜') ~ ' | Bypass ' ~ ('✅' if (master_hold_bypass | default(false) | bool(false)) else '⬜') ~ ' | Letzter: ' ~ (master_last_write_kind | default('?')) ~ ' vor ' ~ (master_last_update_age_step55 | default(0) | float(0) | round(0)) ~ 's' -%}
            {{ msg.out }}

  # ════════════════════════════════════════════════════════════
  # ALWAYS-ON ALERT: Fires only on critical problems, auto-dismisses
  # ════════════════════════════════════════════════════════════
  - variables:
      _alert_problems: >
        {%- set ns = namespace(items=[]) -%}
        {%- if not (master_climate_available | bool(false)) -%}
          {%- set ns.items = ns.items + ['🔴 Master-Thermostat offline!'] -%}
        {%- endif -%}
        {%- if _l_m_forced | default(false) | bool(false) -%}
          {%- set ns.items = ns.items + ['🔴 NOT-AUS aktiv — Master auf Minimum (' ~ (inputs.min_trv_temp | float(12)) ~ '°C)'] -%}
        {%- endif -%}
        {%- if (master_write_budget_remaining | default(1) | int(1)) <= 0 -%}
          {%- set ns.items = ns.items + ['🟡 API-Budget erschöpft'] -%}
        {%- endif -%}
        {{ ns.items }}
  - choose:
      - conditions:
          - "{{ (_alert_problems | length) > 0 }}"
        sequence:
          - action: persistent_notification.create
            continue_on_error: true
            data:
              notification_id: "vaillant_alert"
              title: "⚠️ Heizung — Problem erkannt"
              message: >-
                {%- set n = '\n' -%}
                {%- set msg = namespace(out='') -%}
                {%- for item in _alert_problems -%}
                  {%- if not loop.first -%}{%- set msg.out = msg.out ~ n -%}{%- endif -%}
                  {%- set msg.out = msg.out ~ item -%}
                {%- endfor -%}
                {%- set msg.out = msg.out ~ n ~ n ~ '🕐 Erkannt: ' ~ now().strftime('%H:%M:%S') -%}
                {{ msg.out }}
          - if:
              - "{{ _notify_configured | bool(false) }}"
            then:
              - repeat:
                  for_each: "{{ (_notify_targets_list | trim).split(',') if (_notify_targets_list | trim) != '' else [] }}"
                  sequence:
                    - action: "{{ repeat.item | trim }}"
                      continue_on_error: true
                      data:
                        title: "⚠️ Heizung — Problem erkannt"
                        message: >-
                          {%- set n = '\n' -%}
                          {%- set msg = namespace(out='') -%}
                          {%- for item in _alert_problems -%}
                            {%- if not loop.first -%}{%- set msg.out = msg.out ~ n -%}{%- endif -%}
                            {%- set msg.out = msg.out ~ item -%}
                          {%- endfor -%}
                          {{ msg.out }}
                        data:
                          tag: vaillant_heizung_alert
                          push:
                            sticky: true
      - conditions:
          - "{{ (_alert_problems | length) == 0 }}"
        sequence:
          - action: persistent_notification.dismiss
            continue_on_error: true
            data:
              notification_id: "vaillant_alert"

mode: restart
