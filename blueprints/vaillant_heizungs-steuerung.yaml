            (trigger_id_safe in [
              'eco_temp_input_change',
              'away_temp_input_change',
              'master_comfort_input_change',
              'room2_comfort_input_change',
              'room3_comfort_input_change',
              'room4_comfort_input_change',
              'room5_comfort_input_change'
            ])
            and
            (helper_input_trigger_entity | string not in ['', 'sensor.none', 'none'])
          )
          or
          (trigger_id_safe in ['away_mode_on', 'away_mode_off'])
        }}
      helper_input_debounce_required: >
        {{
          (helper_input_trigger | bool(false))
          and
          (helper_input_trigger_entity | string not in ['', 'sensor.none', 'none'])
          and
          (trigger_id_safe not in ['away_mode_on', 'away_mode_off'])
        }}
      helper_input_trigger_ts: >
        {% if not helper_input_trigger | bool(false) %}
          {{ as_timestamp(now()) }}
        {% elif trigger is defined and trigger is not none and trigger.event is defined and trigger.event.time_fired is defined %}
          {{ as_timestamp(trigger.event.time_fired, as_timestamp(now())) }}
        {% elif trigger is defined and trigger is not none and trigger.to_state is defined and trigger.to_state is not none and trigger.to_state.last_changed is defined %}
          {{ as_timestamp(trigger.to_state.last_changed, as_timestamp(now())) }}
        {% else %}
          {{ as_timestamp(now()) }}
        {% endif %}

      # ===== GROUP 2: ROOM STATES =====
      master_schedule_active: >
        {% if inputs.master_schedule | string not in ['', 'sensor.none', 'none'] %}
          {{ is_state(inputs.master_schedule, 'on') }}
        {% else %}
          {{ false }}
        {% endif %}
      # Smart Presence Evaluation: Check helper OR check if physical sensor has been ON longer than the delay (survives HA restarts)
      master_presence_fresh: >
        {% set _h_eid = inputs.master_presence_helper | string %}
        {% if _h_eid in ['', 'sensor.none', 'none'] %}
          {% set helper = false %}
        {% else %}
          {# Case-insensitive: also handles 'On', 'True', '1' from non-standard boolean helpers #}
          {% set helper = (states(_h_eid) | string | lower) in ['on', 'true', '1'] %}
        {% endif %}
        {% set delay = (presence_activation_delay | float(2)) * 60 %}
        {% set active = expand(inputs.master_presence_sensors) | selectattr('state', 'eq', 'on') | list if inputs.master_presence_sensors else [] %}
        {% set ns = namespace(sensor_on=false) %}
        {% set now_ts = as_timestamp(now()) | float(0) %}
        {% for s in active %}
          {% if (now_ts - (as_timestamp(s.last_changed, now_ts) | float(now_ts))) >= delay %}
            {% set ns.sensor_on = true %}
          {% endif %}
        {% endfor %}
        {{ helper or ns.sensor_on }}
      master_presence_detected: >
        {{ master_presence_fresh | bool(false) }}
      master_sched_valid: >
        {{ inputs.master_schedule | string not in ['', 'sensor.none', 'none'] }}
      master_helper_valid: >
        {{ inputs.master_presence_helper | string not in ['', 'sensor.none', 'none'] }}
      master_sensors_valid: >
        {{ (inputs.master_presence_sensors | reject('in', ['', 'sensor.none', 'none']) | list | length > 0) if inputs.master_presence_sensors else false }}
      master_is_manual: >
        {{ (not (master_sched_valid | bool(false))) and (not (master_helper_valid | bool(false))) and (not (master_sensors_valid | bool(false))) }}
      master_pre_heat_valid: >
        {{ inputs.master_pre_heat_helper | string not in ['', 'sensor.none', 'none'] }}
      master_pre_heat_active: >
        {% set _ph_eid = inputs.master_pre_heat_helper | string %}
        {% if _ph_eid in ['', 'sensor.none', 'none'] %}
          {{ false }}
        {% else %}
          {{ (states(_ph_eid) | string | lower) in ['on', 'true', '1'] }}
        {% endif %}
      # ===== TARGET CALCULATION PREREQUISITES =====
      away_mode_helper_set: >
        {{ (inputs.away_mode_boolean | reject('in', ['', 'sensor.none', 'none']) | list | length) > 0 if inputs.away_mode_boolean else false }}
      away_mode_entity_on: >
        {% if away_mode_helper_set | bool(false) %}
          {% set ns = namespace(active=false) %}
          {% for ent in inputs.away_mode_boolean %}
            {% if ent | string not in ['', 'sensor.none', 'none'] and is_state(ent, 'on') %}
              {% set ns.active = true %}
            {% endif %}
          {% endfor %}
          {{ ns.active | bool(false) }}
        {% else %}
          {{ false }}
        {% endif %}
      # ===== GROUP 3: DEMAND CALCULATION =====
      eco_temp: >
        {% set _eid = inputs.eco_temp_input | string %}
        {% if _eid not in ['', 'sensor.none', 'none'] and states(_eid) not in ['unknown', 'unavailable', 'none', ''] %}
          {{ states(_eid) | float(inputs.eco_temp_fixed) }}
        {% else %}
          {{ inputs.eco_temp_fixed }}
        {% endif %}
      away_temp: >
        {% set _eid = inputs.away_temp_input | string %}
        {% if _eid not in ['', 'sensor.none', 'none'] and states(_eid) not in ['unknown', 'unavailable', 'none', ''] %}
          {{ states(_eid) | float(inputs.away_temp_fixed) }}
        {% else %}
          {{ inputs.away_temp_fixed }}
        {% endif %}
      master_comfort_temp: >
        {% set _eid = inputs.master_comfort_input | string %}
        {% if _eid not in ['', 'sensor.none', 'none'] and states(_eid) not in ['unknown', 'unavailable', 'none', ''] %}
          {{ states(_eid) | float(inputs.master_comfort_fixed) }}
        {% else %}
          {{ inputs.master_comfort_fixed }}
        {% endif %}
      master_demand: >
        {% if master_schedule_active | bool(false) or master_presence_detected | bool(false) or master_is_manual | bool(false) or master_pre_heat_active | bool(false) %}
          {{ master_comfort_temp }}
        {% else %}
          {{ eco_temp }}
        {% endif %}
      master_target_temp: >
        {% if away_mode_entity_on | bool(false) and not (master_pre_heat_active | bool(false)) %}
          {{ away_temp | float(inputs.away_temp_fixed | float(16)) }}
        {% else %}
          {{ master_demand | float(eco_temp | float(inputs.eco_temp_fixed | float(19))) }}
        {% endif %}
  - variables:
      # ===== GROUP 4: TARGET CALCULATION =====
      # (master_target_temp is resolved in the previous variables block)
      master_humidity: >
        {% if inputs.master_humidity_sensor | string not in ['', 'sensor.none', 'none'] %}
          {{ states(inputs.master_humidity_sensor) | float(50) }}
        {% else %}
          {{ 50 }}
        {% endif %}
      humidity_compensation_active: >
        {{ (inputs.enable_humidity_compensation | bool(false)) and ((master_humidity | float(50)) > 60) }}
      master_humidity_dynamic_drop: >
        {% if humidity_compensation_active | bool(false) %}
          {% set hum_diff = (master_humidity | float(50)) - 60 %}
          {% set dynamic_drop_raw = (hum_diff / 10.0) * (inputs.humidity_drop_amount | float(0.5)) %}
          {% set dynamic_drop = [[((dynamic_drop_raw * 2) | round(0) / 2), 0.0] | max, 2.0] | min %}
          {{ dynamic_drop | float(0) }}
        {% else %}
          0.0
        {% endif %}

      # ===== GROUP 5: SAFETY & STATUS =====
      outdoor_temp_sensor_configured: >
        {{ inputs.outdoor_temp_sensor | string not in ['', 'sensor.none', 'none'] }}
      outdoor_temp_raw: >
        {% set o_id = inputs.outdoor_temp_sensor | string %}
        {% if o_id not in ['', 'sensor.none', 'none'] and states(o_id) not in ['unknown', 'unavailable', 'none'] %}
          {{ state_attr(o_id, 'temperature') if o_id.startswith('weather.') else states(o_id) }}
        {% else %}
          none
        {% endif %}
      outdoor_temp: >
        {% set raw = outdoor_temp_raw %}
        {% if outdoor_temp_sensor_configured | bool(false) and raw | string not in ['unknown', 'unavailable', 'none', 'None', ''] %}
          {{ raw | float(0) }}
        {% else %}
          {{ 0 }}
        {% endif %}
      outdoor_temp_valid: >
        {% set raw = outdoor_temp_raw %}
        {{ (outdoor_temp_sensor_configured | bool(false)) and (raw | string not in ['unknown', 'unavailable', 'none', 'None', '']) }}
      summer_mode_should_be: >
        {% set ns = namespace(helper_on=false) %}
        {% set helper_id = inputs.summer_mode_helper | string %}
        {% if (helper_id | lower) not in ['', 'sensor.none', 'none'] and (states(helper_id) not in ['unknown', 'unavailable', 'none', '']) %}
          {% set ns.helper_on = (states(helper_id) == 'on') %}
        {% endif %}
        {% set outdoor_now = outdoor_temp | float(99) %}
        {% set threshold = inputs.summer_threshold | float(18) %}
        {% set hysteresis = inputs.summer_hysteresis | float(1.0) %}
        {% set off_threshold = (threshold - hysteresis) %}
        {% if not (outdoor_temp_valid | bool(false)) %}
          {{ false }}
        {% elif ns.helper_on | bool(false) %}
          {{ outdoor_now > off_threshold }}
        {% else %}
          {{ outdoor_now >= threshold }}
        {% endif %}
      summer_mode: >
        {{ summer_mode_should_be | bool(false) }}
      master_window_open_too_long: >
        {% set w = inputs.master_window | default('sensor.none', true) | string %}
        {% if w | lower not in ['', 'sensor.none', 'none'] and is_state(w, 'on') %}
          {% set w_state = states[w] %}
          {% if w_state is not none and w_state.last_changed is not none %}
            {% set open_ts = as_timestamp(w_state.last_changed, as_timestamp(now())) | float(0) %}
            {{ ((as_timestamp(now()) | float(0)) - open_ts) >= (inputs.window_heat_delay | float(30)) }}
          {% else %}
            {{ false }}
          {% endif %}
        {% else %}
          {{ false }}
        {% endif %}
      global_window_open: >
        {% set ns = namespace(is_open=false) %}
        {% for w_id in [
          inputs.master_window | string,
          inputs.room2_window | string,
          inputs.room3_window | string,
          inputs.room4_window | string,
          inputs.room5_window | string,
          inputs.follower1_window | string,
          inputs.follower2_window | string
        ] %}
          {% set window_entity_id = w_id | string %}
          {% if (window_entity_id | lower) not in ['', 'sensor.none', 'none'] and (states(window_entity_id) == 'on') %}
            {% set ns.is_open = true %}
          {% endif %}
        {% endfor %}
        {{ ns.is_open }}
      master_rapid_temp_drop: >
        {% if inputs.master_temp_sensor | string not in ['', 'sensor.none', 'none'] %}
          {% if inputs.master_climate | string not in ['', 'sensor.none', 'none'] %}
            {% set current_temp = states(inputs.master_temp_sensor) | float(state_attr(inputs.master_climate, 'current_temperature') | float(21)) %}
          {% else %}
            {% set current_temp = states(inputs.master_temp_sensor) | float(21) %}
          {% endif %}
        {% elif inputs.master_climate | string not in ['', 'sensor.none', 'none'] %}
          {% set current_temp = state_attr(inputs.master_climate, 'current_temperature') | float(21) %}
        {% else %}
          {% set current_temp = 21 %}
        {% endif %}
        {% set eco_anchor = eco_temp | float(inputs.eco_temp_fixed | float(19)) %}
        {% set drop_threshold = inputs.smart_drop_threshold | float(2.0) %}
        {{ (global_window_open | bool(false)) and (not (master_window_open_too_long | bool(false))) and ((current_temp | float(21)) < ((eco_anchor | float(19)) - (drop_threshold | float(2.0)))) }}
      master_target_final: >
        {% if master_window_open_too_long | bool(false) %}
          {{ inputs.min_trv_temp | float(12) }}
        {% elif master_rapid_temp_drop | bool(false) %}
          {{ inputs.min_trv_temp | float(12) }}
        {% else %}
          {# Fallback to eco_temp, never to a hardcoded value, so a broken master_target_temp fails safely #}
          {{ master_target_temp | float(eco_temp | float(inputs.eco_temp_fixed | float(19))) }}
        {% endif %}
      master_climate_available: >
        {{ inputs.master_climate | string not in ['', 'sensor.none', 'none'] and states(inputs.master_climate) not in ['unavailable', 'unknown'] }}
      master_active_for_followers: >
        {{ (master_schedule_active | bool(false)) or (master_presence_detected | bool(false)) or (master_is_manual | bool(false)) }}
      rooms_runtime: >
        {% set ns = namespace(items=[]) %}
        {% set now_ts = as_timestamp(now()) | float(0) %}
        {% set delay = (presence_activation_delay | float(2)) * 60 %}
        {% set threshold = inputs.room_boost_activation_threshold | float(1.0) %}
        {% for room in rooms_model | default([], true) %}
          {% set key = room.key | string %}
          {% set role = room.role | string %}
          {% set enabled = room.enabled | bool(false) %}
          {% set climate = room.climate | string %}
          {% set window = room.window | string if room.window is defined else '' %}
          {% set temp_sensor = room.temp_sensor | string if room.temp_sensor is defined else '' %}
          {% set schedule = room.schedule | string if room.schedule is defined else '' %}
          {% set presence_helper = room.presence_helper | string if room.presence_helper is defined else '' %}
          {% set presence_sensors_sanitized = (room.presence_sensors if room.presence_sensors is defined else []) | default([], true) | reject('in', ['', 'sensor.none', 'none']) | list %}
          {% set pre_heat_helper = room.pre_heat_helper | string if room.pre_heat_helper is defined else '' %}
          {% set comfort_input = room.comfort_input | string if room.comfort_input is defined else '' %}
          {% set comfort_fixed = room.comfort_fixed | float(20) if room.comfort_fixed is defined else 20 %}
          {% set offset = room.offset | float(0) if room.offset is defined else 0 %}
          {% set climate_ok = (climate not in ['', 'sensor.none', 'none']) and (states(climate) not in ['unknown', 'unavailable']) %}
          {% set sched_valid = schedule not in ['', 'sensor.none', 'none'] %}
          {% set helper_valid = presence_helper not in ['', 'sensor.none', 'none'] %}
          {% set sensors_valid = (presence_sensors_sanitized | length) > 0 %}
          {% set pre_heat_valid = (role == 'isolated') and pre_heat_helper not in ['', 'sensor.none', 'none'] %}
          {% set pre_heat_active = pre_heat_valid and ((states(pre_heat_helper) | string | lower) in ['on', 'true', '1']) %}
          {% set schedule_active = (role == 'isolated') and (sched_valid) and is_state(schedule, 'on') %}
          {# Case-insensitive boolean check: handles 'on', 'On', 'true', '1' from non-standard helpers #}
          {% set _helper_state = states(presence_helper) | string | lower if helper_valid else '' %}
          {% set helper_on = (role == 'isolated') and (helper_valid) and (_helper_state in ['on', 'true', '1']) %}
          {% set sensor_on_long_enough = false %}
          {% if role == 'isolated' and (sensors_valid) %}
            {% set ps = namespace(on=false) %}
            {% for s in expand(presence_sensors_sanitized) %}
              {% if s is not none and s.state == 'on' and (now_ts - (as_timestamp(s.last_changed, now_ts) | float(now_ts))) >= delay %}
                {% set ps.on = true %}
              {% endif %}
            {% endfor %}
            {% set sensor_on_long_enough = ps.on %}
          {% endif %}
          {% set manual_mode = (role == 'isolated') and (not (sched_valid)) and (not (helper_valid)) and (not (sensors_valid)) %}
          {% if not (enabled | bool(false)) %}
            {% set manual_mode = false %}
          {% endif %}
          {% if not (enabled | bool(false)) %}
            {% set active_for_demand = false %}
          {% elif role == 'isolated' %}
            {% set active_for_demand = (schedule_active | bool(false)) or (helper_on | bool(false)) or (sensor_on_long_enough | bool(false)) or (manual_mode | bool(false)) or (pre_heat_active | bool(false)) %}
          {% else %}
            {% set active_for_demand = master_active_for_followers | bool(false) %}
          {% endif %}
          {% set comfort_input_valid = comfort_input not in ['', 'sensor.none', 'none'] %}
          {# Also require the entity state to be a readable value, not unavailable/unknown #}
          {% set comfort_input_readable = comfort_input_valid and states(comfort_input) not in ['unknown', 'unavailable', 'none', ''] %}
          {% set comfort_config_ok = (role != 'isolated') or (comfort_input_valid) or ((comfort_fixed | float(0)) > 0) %}
          {% set room_ok = (enabled | bool(false)) and (climate_ok | bool(false)) and (comfort_config_ok | bool(false)) %}
          {% if role == 'isolated' %}
            {% if comfort_input_readable %}
              {% set comfort_target = states(comfort_input) | float(comfort_fixed | float(20)) %}
            {% else %}
              {# Falls back to user's configured comfort_fixed, never to a hardcoded value #}
              {% set comfort_target = comfort_fixed | float(20) %}
            {% endif %}
            {# Away mode is NOT applied to individual rooms — the master
               thermostat already drops to away_temp, which limits heat
               delivery for all rooms. Duplicating it here would be
               redundant and could mask demand tracking. #}
            {% if active_for_demand | bool(false) %}
              {% set base_target = comfort_target | float(0) %}
            {% else %}
              {% set base_target = eco_temp | float(19) %}
            {% endif %}
          {% else %}
            {% set comfort_target = [inputs.min_trv_temp | float(12), (master_target_final | float(inputs.min_trv_temp | float(12))) + (offset | float(0))] | max %}
            {% set base_target = comfort_target | float(0) %}
          {% endif %}
          {% set window_sanitized = [window] | default([], true) | reject('in', ['', 'sensor.none', 'none']) | list %}
          {% set window_open_too_long = false %}
          {% if (window_sanitized | length) > 0 and is_state(window, 'on') %}
            {% set w_state = expand(window_sanitized) | first %}
            {% if w_state is not none and w_state.last_changed is not none %}
              {% set open_ts = as_timestamp(w_state.last_changed, now_ts) | float(now_ts) %}
              {% set window_open_too_long = ((now_ts - open_ts) >= (inputs.window_heat_delay | float(30))) %}
            {% endif %}
          {% endif %}
          {% set window_closed_recently = false %}
          {% set settle_s = inputs.window_close_settle_seconds | float(180) %}
          {% if settle_s > 0 and (window_sanitized | length) > 0 and is_state(window, 'off') %}
            {% set w_state = expand(window_sanitized) | first %}
            {% if w_state is not none and w_state.last_changed is not none %}
              {% set close_ts = as_timestamp(w_state.last_changed, now_ts) | float(now_ts) %}
              {% set window_closed_recently = ((now_ts - close_ts) < settle_s) %}
            {% endif %}
          {% endif %}
          {% if window_open_too_long | bool(false) %}
            {% set final_raw = inputs.min_trv_temp | float(12) %}
          {% elif role == 'isolated' and (summer_mode | bool(false)) and not (active_for_demand | bool(false)) %}
            {% set final_raw = inputs.min_trv_temp | float(12) %}
          {% elif role == 'follower' and (summer_mode | bool(false)) and not (master_active_for_followers | bool(false)) %}
            {% set final_raw = inputs.min_trv_temp | float(12) %}
          {% elif window_closed_recently | bool(false) %}
            {# FIX: Don't cap active comfort demand to eco during settling.
               Rooms with active demand (schedule/presence) keep their target;
               only idle rooms settle at eco to prevent wasteful heating. #}
            {% if active_for_demand | bool(false) %}
              {% set final_raw = base_target | float(eco_temp | float(19)) %}
            {% else %}
              {% set final_raw = eco_temp | float(19) %}
            {% endif %}
          {% else %}
            {% set final_raw = base_target | float(0) %}
          {% endif %}
          {% set final_target = [inputs.min_trv_temp | float(12), final_raw | float(0)] | max %}
          {% if climate_ok %}
            {% set current_setpoint = state_attr(climate, 'temperature') | float(0) %}
          {% else %}
            {% set current_setpoint = 0 %}
          {% endif %}
          {% if temp_sensor not in ['', 'sensor.none', 'none'] and states(temp_sensor) not in ['unknown', 'unavailable', 'none', ''] %}
            {% if climate_ok %}
              {% set current_temp = states(temp_sensor) | float(state_attr(climate, 'current_temperature') | float(21)) %}
            {% else %}
              {% set current_temp = states(temp_sensor) | float(21) %}
            {% endif %}
          {% elif climate_ok %}
            {% set current_temp = state_attr(climate, 'current_temperature') | float(21) %}
          {% else %}
            {% set current_temp = 21 %}
          {% endif %}
          {% set needs_heat = (active_for_demand | bool(false)) and ((final_target | float(0)) > ((current_temp | float(0)) + (inputs.hysteresis | float(0.6)))) %}
          {% if role == 'isolated' %}
            {% set boost_delta = (comfort_target | float(0)) - (current_temp | float(0)) %}
            {% set boost_needed = (active_for_demand | bool(false)) and (not (window_open_too_long | bool(false))) and ((boost_delta | float(0)) >= threshold) %}
            {% set boost_deactivate = (not (active_for_demand | bool(false))) or ((boost_delta | float(0)) < (threshold / 2)) %}
            {% if window_open_too_long | bool(false) %}
              {% set mode_label = 'WindowOpen' %}
            {% elif schedule_active | bool(false) %}
              {% set mode_label = 'Zeitplan' %}
            {% elif (helper_on | bool(false)) or (sensor_on_long_enough | bool(false)) %}
              {% set mode_label = 'Praesenz' %}
            {% elif pre_heat_active | bool(false) %}
              {% set mode_label = 'PreHeat' %}
            {% elif manual_mode | bool(false) %}
              {% set mode_label = 'Manual' %}
            {% else %}
              {% set mode_label = 'Eco' %}
            {% endif %}
          {% else %}
            {% set boost_delta = 0 %}
            {% set boost_needed = false %}
            {% set boost_deactivate = true %}
            {% if window_open_too_long | bool(false) %}
              {% set mode_label = 'WindowOpen' %}
            {% elif (summer_mode | bool(false)) and (not (master_active_for_followers | bool(false))) %}
              {% set mode_label = 'SummerMin' %}
            {% else %}
              {% set mode_label = 'Follower' %}
            {% endif %}
          {% endif %}
          {% set hvac_action = state_attr(climate, 'hvac_action') | default('n/a', true) if climate_ok else 'n/a' %}
          {% set ns.items = ns.items + [{
            'key': key,
            'role': role,
            'enabled': enabled | bool(false),
            'climate': climate,
            'window': window,
            'temp_sensor': temp_sensor,
            'schedule': schedule,
            'presence_helper': presence_helper,
            'presence_sensors_sanitized': presence_sensors_sanitized,
            'comfort_input': comfort_input,
            'comfort_fixed': comfort_fixed | float(20),
            'offset': offset | float(0),
            'climate_ok': climate_ok | bool(false),
            'room_ok': room_ok | bool(false),
            'sched_valid': sched_valid | bool(false),
            'schedule_active': schedule_active | bool(false),
            'helper_valid': helper_valid | bool(false),
            'helper_on': helper_on | bool(false),
            'sensors_valid': sensors_valid | bool(false),
            'sensor_on_long_enough': sensor_on_long_enough | bool(false),
            'pre_heat_valid': pre_heat_valid | bool(false),
            'pre_heat_active': pre_heat_active | bool(false),
            'pre_heat_helper': pre_heat_helper | string,
            'manual_mode': manual_mode | bool(false),
            'active_for_demand': active_for_demand | bool(false),
            'window_open_too_long': window_open_too_long | bool(false),
            'window_closed_recently': window_closed_recently | bool(false),
            'comfort_target': comfort_target | float(0),
            'base_target': base_target | float(0),
            'final_target': final_target | float(0),
            'current_setpoint': current_setpoint | float(0),
            'current_temp': current_temp | float(0),
            'needs_heat': needs_heat | bool(false),
            'boost_needed': boost_needed | bool(false),
            'boost_deactivate': boost_deactivate | bool(true),
            'mode_label': mode_label | string,
            'hvac_action': hvac_action | string
          }] %}
        {% endfor %}
        {{ ns.items | tojson }}
      rooms_runtime_list: "{{ (rooms_runtime | default('[]', true)) | from_json }}"
      # ===== GROUP 6: WRITE LOGIC FLAGS =====
  # ===== STEP 0.00: SUMMER MODE HELPER SYNC =====
  # Guard: log a warning if rooms_runtime_list is unexpectedly empty while rooms are configured
  - if:
      - condition: template
        value_template: >
          {% set list = rooms_runtime_list | default([]) %}
          {% set any_enabled = (inputs.room2_enabled or inputs.room3_enabled or inputs.room4_enabled or inputs.room5_enabled or inputs.follower1_enabled or inputs.follower2_enabled) | bool(false) %}
          {{ (list | length == 0) and any_enabled }}
    then:
      - action: system_log.write
        continue_on_error: true
        data:
          level: warning
          message: "Vaillant Blueprint: rooms_runtime_list resolved empty despite enabled rooms – possible template error in rooms_runtime. Check blueprint configuration."
  - choose:
      - conditions:
          - "{{ inputs.summer_mode_helper | string not in ['', 'sensor.none', 'none'] }}"
          - "{{ summer_mode_should_be | bool(false) }}"
          - "{{ is_state(inputs.summer_mode_helper, 'off') }}"
        sequence:
          - action: input_boolean.turn_on
            target:
              entity_id: "{{ inputs.summer_mode_helper }}"
            continue_on_error: true
      - conditions:
          - "{{ inputs.summer_mode_helper | string not in ['', 'sensor.none', 'none'] }}"
          - "{{ not (summer_mode_should_be | bool(false)) }}"
          - "{{ is_state(inputs.summer_mode_helper, 'on') }}"
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: "{{ inputs.summer_mode_helper }}"
            continue_on_error: true
  # ===== STEP 0.005: PRE-HEAT AUTO-OFF =====
  # Master pre-heat auto-off: deactivate when presence ON, schedule active, or timeout exceeded
  - if:
      - "{{ master_pre_heat_active | bool(false) }}"
      - >
        {% set ph_eid = inputs.master_pre_heat_helper | string %}
        {% set now_ts = as_timestamp(now()) | float(0) %}
        {% set ph_changed = as_timestamp(states[ph_eid].last_changed, now_ts) | float(now_ts) if ph_eid not in ['', 'sensor.none', 'none'] else now_ts %}
        {% set timeout_s = (inputs.pre_heat_timeout | float(60)) * 60 %}
        {% set timed_out = (now_ts - ph_changed) >= timeout_s %}
        {% set presence_took_over = master_presence_detected | bool(false) %}
        {% set schedule_took_over = master_schedule_active | bool(false) %}
        {{ timed_out or presence_took_over or schedule_took_over }}
    then:
      - action: input_boolean.turn_off
        target:
          entity_id: "{{ inputs.master_pre_heat_helper }}"
        continue_on_error: true
  # Room pre-heat auto-off: deactivate when presence ON, schedule active, or timeout exceeded
  - repeat:
      for_each: "{{ rooms_runtime_list | default([], true) }}"
      sequence:
        - variables:
            _ph_room: "{{ repeat.item }}"
            _ph_helper: "{{ _ph_room.pre_heat_helper | default('') | string }}"
            _ph_valid: "{{ _ph_helper not in ['', 'sensor.none', 'none'] }}"
            _ph_on: "{{ _ph_valid and ((states(_ph_helper) | string | lower) in ['on', 'true', '1']) }}"
        - if:
            - "{{ _ph_on | bool(false) }}"
            - >
              {% set now_ts = as_timestamp(now()) | float(0) %}
              {% set ph_changed = as_timestamp(states[_ph_helper].last_changed, now_ts) | float(now_ts) if (_ph_valid | bool(false)) else now_ts %}
              {% set timeout_s = (inputs.pre_heat_timeout | float(60)) * 60 %}
              {% set timed_out = (now_ts - ph_changed) >= timeout_s %}
              {% set presence_took_over = (_ph_room.schedule_active | default(false) | bool(false)) or (_ph_room.helper_on | default(false) | bool(false)) or (_ph_room.sensor_on_long_enough | default(false) | bool(false)) %}
              {{ timed_out or presence_took_over }}
          then:
            - action: input_boolean.turn_off
              target:
                entity_id: "{{ _ph_helper }}"
              continue_on_error: true
  # ===== STEP 0.01: HELPER INPUT DEBOUNCE =====
  # Note: This automation uses mode: restart.
  # When a slider is moved (helper_input_trigger), a delay of helper_input_settle_seconds is inserted.
  # If the slider is moved again within that window, mode:restart cancels and restarts the run,
  # which resets the delay — effectively debouncing rapid slider changes.
  # No heating writes are issued during the settle window; this is intentional.
  - choose:
      - conditions:
          - "{{ helper_input_debounce_required | bool(false) }}"
        sequence:
          - delay:
              seconds: "{{ helper_input_settle_seconds }}"
          - choose:
              - conditions:
                  - "{{ helper_input_trigger_entity | string not in ['', 'sensor.none', 'none'] }}"
                  - >
                    {% set helper_entities = [helper_input_trigger_entity] | default([], true) | reject('in', ['', 'sensor.none', 'none']) | list %}
                    {% set so = (expand(helper_entities) | first) if (helper_entities | length) > 0 else none %}
                    {% if so is not none and so.last_changed is defined %}
                      {{ as_timestamp(so.last_changed, 0) > ((helper_input_trigger_ts | float(0)) + 0.5) }}
                    {% else %}
                      {{ false }}
                    {% endif %}
                sequence:
                  - stop: "Neuere Helper-Änderung erkannt - veralteten Lauf beendet."

    # ========== ROOM RUNTIME LOOP LOGIC ==========
  - repeat:
      for_each: "{{ rooms_runtime_list | default([], true) }}"
      sequence:
        - variables:
            room: "{{ repeat.item }}"
            room_ok: "{{ room.room_ok | default(false) | bool(false) }}"
            room_climate: "{{ room.climate | default('', true) | string }}"
            room_role: "{{ room.role | default('', true) | string }}"
            room_comfort_input: "{{ room.comfort_input | default('', true) | string }}"
            room_final_target: "{{ room.final_target | default(0) | float(0) }}"
            room_current_setpoint: "{{ room.current_setpoint | default(0) | float(0) }}"
            delta_abs: "{{ ((room_final_target | float(0)) - (room_current_setpoint | float(0))) | abs }}"
            force_sync: >
              {{
                (room_role == 'isolated')
                and (helper_input_trigger | bool(false))
                and (helper_input_trigger_entity | string | trim == room_comfort_input | string | trim)
              }}
        - choose:
            - conditions:
                - "{{ room_ok | bool(false) }}"
                - "{{ ((delta_abs | float(0)) > (inputs.hysteresis | float(0.6))) or (force_sync | bool(false)) }}"
              sequence:
                - action: climate.set_temperature
                  target:
                    entity_id: "{{ room_climate }}"
                  data:
                    temperature: "{{ room_final_target }}"
                  continue_on_error: true
                # --- TRV write verification ---
                - delay:
                    seconds: 3
                - variables:
                    trv_readback: >
                      {{ state_attr(room_climate, 'temperature') | float(-999) }}
                    trv_entity_state: >
                      {{ states(room_climate) | default('unknown', true) | string }}
                - choose:
                    - conditions:
                        - >
                          {{
                            trv_entity_state in ['unavailable', 'unknown']
                            or ((trv_readback | float(-999)) - (room_final_target | float(0))) | abs > 0.5
                          }}
                      sequence:
                        - action: persistent_notification.create
                          data:
                            title: "⚠️ TRV Write Failed"
                            message: >
                              {{ state_attr(room_climate, 'friendly_name') | default(room_climate, true) }}
                              antwortet nicht!

                              Soll: {{ room_final_target | round(1) }}°C
                              Readback: {{ trv_readback | round(1) }}°C
                              Entity-State: {{ trv_entity_state }}

                              Möglicherweise ist das Gerät in Zigbee2MQTT
                              offline — bitte prüfen und ggf. neu pairen.
                            notification_id: "trv_fail_{{ room_climate | replace('.', '_') }}"

  # ===== STEP 5.5: MASTER TARGET AGGREGATION & WRITE =====
  - choose:
      - conditions:
          - "{{ master_climate_available }}"
        sequence:
          - variables:
              master_forced_min_active: >
                {{ master_rapid_temp_drop | bool(false) }}
              away_mode_active_effective: >
