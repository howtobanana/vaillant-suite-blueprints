  # ===== PRESENCE HELPER SYNC (ha_start / scheduled) =====
  # Template triggers need a False→True transition to fire. After HA restart
  # or automation reload, sensors already "on" won't trigger — helper stays
  # stale. This compact sync corrects helpers that are out of step.
  - if:
      - "{{ trigger.id | default('manual') in ['ha_start', 'scheduled'] }}"
    then:
      - variables:
          _sync_delay: "{{ (presence_activation_delay | float(2)) * 60 }}"
          _now: "{{ as_timestamp(now()) | float(0) }}"
      - repeat:
          for_each:
            - sensors: "{{ tv_master_presence_sensors | default([], true) | reject('in', ['', 'sensor.none', 'none']) | list }}"
              helper: "{{ tv_master_presence_helper | default('') | string }}"
            - sensors: "{{ tv_room2_presence_sensors | default([], true) | reject('in', ['', 'sensor.none', 'none']) | list }}"
              helper: "{{ tv_room2_presence_helper | default('') | string }}"
            - sensors: "{{ tv_room3_presence_sensors | default([], true) | reject('in', ['', 'sensor.none', 'none']) | list }}"
              helper: "{{ tv_room3_presence_helper | default('') | string }}"
            - sensors: "{{ tv_room4_presence_sensors | default([], true) | reject('in', ['', 'sensor.none', 'none']) | list }}"
              helper: "{{ tv_room4_presence_helper | default('') | string }}"
            - sensors: "{{ tv_room5_presence_sensors | default([], true) | reject('in', ['', 'sensor.none', 'none']) | list }}"
              helper: "{{ tv_room5_presence_helper | default('') | string }}"
          sequence:
            - variables:
                _helper_id: "{{ repeat.item.helper | string }}"
                _helper_valid: "{{ _helper_id not in ['', 'sensor.none', 'none'] and (_helper_id | length) > 5 }}"
                _has_sensors: "{{ (repeat.item.sensors | length) > 0 }}"
            # --- Sync OFF → ON: helper is off but sensor(s) have been on long enough ---
            - if:
                - "{{ _helper_valid | bool(false) }}"
                - "{{ _has_sensors | bool(false) }}"
                - "{{ is_state(_helper_id, 'off') }}"
                - >
                  {% set ns = namespace(found=false) %}
                  {% for s in expand(repeat.item.sensors) %}
                    {% if s is not none and s.state == 'on' and ((_now | float) - (as_timestamp(s.last_changed, _now | float) | float)) >= (_sync_delay | float(120)) %}
                      {% set ns.found = true %}
                    {% endif %}
                  {% endfor %}
                  {{ ns.found }}
              then:
                - action: input_boolean.turn_on
                  target:
                    entity_id: "{{ _helper_id }}"
                  continue_on_error: true
            # --- Sync ON → OFF: helper is on but all sensors are off (beyond deactivation delay) ---
            - if:
                - "{{ _helper_valid | bool(false) }}"
                - "{{ _has_sensors | bool(false) }}"
                - "{{ is_state(_helper_id, 'on') }}"
                - >
                  {% set _deact_delay = (presence_deactivation_delay | float(30)) * 60 %}
                  {% set all_off = namespace(result=true) %}
                  {% for s in expand(repeat.item.sensors) %}
                    {% if s is not none %}
                      {% if s.state != 'off' or ((_now | float) - (as_timestamp(s.last_changed, _now | float) | float)) < _deact_delay %}
                        {% set all_off.result = false %}
                      {% endif %}
                    {% endif %}
                  {% endfor %}
                  {{ all_off.result }}
              then:
                - action: input_boolean.turn_off
                  target:
                    entity_id: "{{ _helper_id }}"
                  continue_on_error: true

