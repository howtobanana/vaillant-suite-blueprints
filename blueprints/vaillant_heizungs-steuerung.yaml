    for:
      minutes: !input presence_deactivation_delay
    id: room5_presence_off

  # ============================================
  # WINDOW TRIGGERS (30s OPEN-WINDOW MODE)
  # ============================================
  - trigger: template
    value_template: >
      {{ (tv_room2_window | string not in ['', 'sensor.none', 'none']) and is_state(tv_room2_window, 'on') }}
    for:
      seconds: !input window_heat_delay
    id: room2_window_open_30s
