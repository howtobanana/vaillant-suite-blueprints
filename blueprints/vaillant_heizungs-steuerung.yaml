            entity:
              domain: schedule
        enable_master_presence_priority:
          name: "👑 Master gewinnt bei Präsenz"
          description: |

            Aktiviert Vorrang des Master-Raums gegenüber isolierten Räumen bei Präsenz.

          default: false
