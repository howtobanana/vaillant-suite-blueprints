                {{ inputs.master_intent_reason_helper | string not in ['', 'sensor.none', 'none'] }}
              intent_target_changed_meaningfully: >
                {% if not (intent_layer_enabled_effective | bool(false)) %}
                  {{ true }}
                {% else %}
                  {{ (master_target_delta_abs | float(0)) > (inputs.hysteresis | float(0.6)) }}
                {% endif %}
              helper_triggered_raise_intent: >
                {{ (helper_input_trigger | bool(false)) and ((master_final_target | float(0)) > ((master_set_now | float(0)) + (inputs.hysteresis | float(0.6)))) }}
              master_intent_gate_ok: >
                {{ (not (intent_layer_enabled_effective | bool(false))) or (intent_target_changed_meaningfully | bool(false)) or (helper_triggered_raise_intent | bool(false)) }}
              master_needs_global_boost: >
                {{ (not (away_mode_active_effective | bool(false))) and ((master_set_now | float(0)) < ((master_base_required_target | float(0)) - 0.1)) }}
              master_needs_global_drop: >
                {{ (not (away_mode_active_effective | bool(false))) and ((master_set_now | float(0)) > ((master_final_target | float(0)) + 0.1)) }}
              master_significant_drop: >
                {{ ((master_set_now | float(0)) - (master_final_target | float(0))) > 2.0 }}
              effective_max_changes_per_hour: "{{ [inputs.max_changes_per_hour | float(3), 2] | max }}"
              # API Write Tracking: Letzter erfolgreicher Write an Master-Thermostat
              master_last_update_age_step55: >
                {% set entity = inputs.master_last_write_helper | string %}
                {% if entity not in ['', 'sensor.none', 'none'] and states[entity] is defined and states(entity) not in ['unknown', 'unavailable', 'none'] %}
                  {% set last_write_ts = state_attr(entity, 'timestamp') | float(0) %}
                  {% set now_ts = as_timestamp(now()) | float(0) %}
                  {% if (last_write_ts | float(0)) > 0 %}
                    {{ now_ts - (last_write_ts | float(0)) }}
                  {% else %}
                    {{ 999999 }}
                  {% endif %}
                {% else %}
                  {{ 999999 }}
                {% endif %}
              master_change_cooldown_ok_step55: >
                {{ (master_last_update_age_step55 | float(999999)) >= (3600 / (effective_max_changes_per_hour | float(3))) }}
              master_last_write_kind_configured: >
                {{ inputs.master_last_write_kind_helper | string not in ['', 'sensor.none', 'none'] }}
              master_last_write_kind: >
                {% if (master_last_write_kind_configured | bool(false)) and (states(inputs.master_last_write_kind_helper) not in ['unknown', 'unavailable', 'none', '']) %}
                  {{ states(inputs.master_last_write_kind_helper) | string | trim | lower }}
                {% else %}
                  sync
                {% endif %}
              master_hold_drop_after_raise_seconds: >
                {{ (inputs.master_hold_drop_after_raise_minutes | float(20)) * 60 }}
              master_hold_raise_after_drop_seconds: >
                {{ (inputs.master_hold_raise_after_drop_minutes | float(10)) * 60 }}
              master_drop_hold_active: >
                {{
                  (master_last_write_kind | string == 'raise')
                  and
                  ((master_last_update_age_step55 | float(999999)) < (master_hold_drop_after_raise_seconds | float(1200)))
                }}
              master_raise_hold_active: >
                {{
                  (master_last_write_kind | string == 'drop')
                  and
                  ((master_last_update_age_step55 | float(999999)) < (master_hold_raise_after_drop_seconds | float(600)))
                }}
              token_bucket_enabled: >
                {{
                  (intent_layer_enabled_effective | bool(false))
                  and
                  (inputs.api_tokens_helper | string not in ['', 'sensor.none', 'none'])
                  and
                  (inputs.api_tokens_last_refill_helper | string not in ['', 'sensor.none', 'none'])
                }}
              api_tokens_per_hour_effective: >
                {% set tph = inputs.api_tokens_per_hour | float(inputs.max_changes_per_hour | float(10)) %}
                {{ [tph, 0.1] | max }}
              api_token_capacity_effective: >
                {% set cap = inputs.api_token_capacity | float(api_tokens_per_hour_effective | float(10)) %}
                {{ [cap, api_tokens_per_hour_effective | float(10)] | max }}
              api_tokens_stored: >
                {% if (token_bucket_enabled | bool(false)) and (states(inputs.api_tokens_helper) not in ['unknown', 'unavailable', 'none', '']) %}
                  {% set raw = states(inputs.api_tokens_helper) | float(api_token_capacity_effective | float(0)) %}
                {% else %}
                  {% set raw = api_token_capacity_effective | float(0) %}
                {% endif %}
                {{ [[raw, 0.0] | max, api_token_capacity_effective | float(0)] | min }}
              api_last_refill_ts: >
                {% set now_ts = as_timestamp(now()) | float(0) %}
                {% if (token_bucket_enabled | bool(false)) and (states[inputs.api_tokens_last_refill_helper] is defined) and (states(inputs.api_tokens_last_refill_helper) not in ['unknown', 'unavailable', 'none', '']) %}
                  {% set ts = state_attr(inputs.api_tokens_last_refill_helper, 'timestamp') | float(now_ts) %}
                  {{ ts if ts > 0 else now_ts }}
                {% else %}
                  {{ now_ts }}
                {% endif %}
              api_elapsed_seconds: >
                {% set now_ts = as_timestamp(now()) | float(0) %}
                {{ [0.0, (now_ts - (api_last_refill_ts | float(now_ts)))] | max }}
              api_refill_tokens: >
                {% if token_bucket_enabled | bool(false) %}
                  {{ ((api_elapsed_seconds | float(0)) / 3600.0) * (api_tokens_per_hour_effective | float(0)) }}
                {% else %}
                  0.0
                {% endif %}
              api_tokens_recomputed: >
                {% set merged = (api_tokens_stored | float(0)) + (api_refill_tokens | float(0)) %}
                {{ [[merged, 0.0] | max, api_token_capacity_effective | float(0)] | min }}
              api_tokens_should_persist: >
                {{
                  (token_bucket_enabled | bool(false))
                  and
                  ((((api_tokens_recomputed | float(0)) - (api_tokens_stored | float(0))) | abs) >= 0.1
                  or ((api_elapsed_seconds | float(0)) >= 300))
                }}
              api_tokens_available_for_write: >
                {% if token_bucket_enabled | bool(false) %}
                  {{ api_tokens_recomputed | float(0) }}
                {% else %}
                  999.0
                {% endif %}
              api_tokens_after_write: >
                {% set next_tokens = (api_tokens_available_for_write | float(0)) - 1.0 %}
                {{ [[next_tokens, 0.0] | max, api_token_capacity_effective | float(0)] | min }}
              master_token_gate_ok: >
                {{ (not (token_bucket_enabled | bool(false))) or ((api_tokens_available_for_write | float(0)) >= 1.0) }}
              master_needs_raise: >
                {{ (master_final_target | float(0)) > ((master_set_now | float(0)) + (inputs.hysteresis | float(0.6))) }}
              master_stuck_protection_active: >
                {{ (master_needs_raise | bool(false)) and ((master_last_update_age_step55 | float(0)) >= 1800) }}
              master_raise_allowed: >
                {{
                  (master_needs_raise | bool(false))
                  and
                  ((master_change_cooldown_ok_step55 | bool(false)) or (helper_input_trigger | bool(false)) or ((master_target_delta_abs | float(0)) > 3.0) or (master_stuck_protection_active | bool(false)))
                  and
                  (
                    (not (master_raise_hold_active | bool(false)))
                    or (helper_input_trigger | bool(false))
                    or (master_forced_min_active | bool(false))
                    or (away_mode_active_effective | bool(false))
                  )
                }}
              master_drop_allowed: >
                {{
                  (master_needs_global_drop | bool(false))
                  and
                  ((master_change_cooldown_ok_step55 | bool(false)) or (helper_input_trigger | bool(false)))
                  and
                  (
                    (not (master_drop_hold_active | bool(false)))
                    or (master_forced_min_active | bool(false))
                    or (away_mode_active_effective | bool(false))
                  )
                }}
              master_write_allowed: >
                {{
                  (not (master_forced_min_active | bool(false)))
                  and
                  ((master_raise_allowed | bool(false)) or (master_drop_allowed | bool(false)))
                  and
                  (master_intent_gate_ok | bool(false))
                  and
                  (master_token_gate_ok | bool(false))
                }}
              master_hvac_action: >
                {{ state_attr(inputs.master_climate, 'hvac_action') | default('n/a', true) }}
              master_state: >
                {% if master_forced_min_active | bool(false) %}
                  FORCED_MIN
                {% elif away_mode_active_effective | bool(false) %}
                  AWAY
                {% elif (summer_mode | bool(false)) and (not (master_needs_raise | bool(false))) %}
                  SUMMER_MIN
                {% elif (master_needs_raise | bool(false)) or (master_boost_active | bool(false)) %}
                  HEATING
                {% else %}
                  ECO
                {% endif %}
              master_reason: >
                {% set ns = namespace(items=[]) %}
                {% if master_forced_min_active | bool(false) %}
                  {% set ns.items = ns.items + ['forced_min'] %}
                {% endif %}
                {% if away_mode_active_effective | bool(false) %}
                  {% set ns.items = ns.items + ['away_mode'] %}
                {% endif %}
                {% if (summer_mode | bool(false)) and (not (master_forced_min_active | bool(false))) %}
                  {% set ns.items = ns.items + ['summer_mode'] %}
                {% endif %}
                {% if (isolated_room_demand_targets | default([]) | length) > 0 %}
                  {% set ns.items = ns.items + ['room_demand'] %}
                {% endif %}
                {% if master_boost_active | bool(false) %}
                  {% set ns.items = ns.items + ['boost'] %}
                {% endif %}
                {% if (weather_modifier_sanitized | float(0)) > 0 %}
                  {% set ns.items = ns.items + ['weather'] %}
                {% endif %}
                {% if (master_humidity_drop | float(0)) < 0 %}
                  {% set ns.items = ns.items + ['humidity_drop'] %}
                {% endif %}
                {% if (master_final_raw | float(0)) > (master_max | float(30)) %}
                  {% set ns.items = ns.items + ['capped_by_max'] %}
                {% endif %}
                {% if ns.items | length == 0 %}
                  base
                {% else %}
                  {{ ns.items | join(',') }}
                {% endif %}
          - if:
              - condition: template
                value_template: "{{ intent_layer_enabled_effective | bool(false) }}"
            then:
              - action: input_number.set_value
                target:
                  entity_id: "{{ inputs.master_intent_target_helper }}"
                data:
                  value: "{{ master_final_target | float(0) }}"
