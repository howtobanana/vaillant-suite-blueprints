    id: master_window_open_30s
  - trigger: template
    value_template: >
      {{ (tv_master_window | string not in ['', 'sensor.none', 'none']) and is_state(tv_master_window, 'off') }}
    id: master_window_closed

  # ============================================
  # HELPER INPUT TRIGGERS (IMMEDIATE REACTION)
  # trigger: event avoids HA schema validation of entity_id at load time,
  # so empty "" defaults no longer crash the automation on startup.
  # An empty event_data.entity_id simply never matches any real event.
  # ============================================
  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input eco_temp_input
    id: eco_temp_input_change
  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input away_temp_input
    id: away_temp_input_change
  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input master_comfort_input
    id: master_comfort_input_change
  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input room2_comfort_input
    id: room2_comfort_input_change
  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input room3_comfort_input
    id: room3_comfort_input_change
  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input room4_comfort_input
    id: room4_comfort_input_change
  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input room5_comfort_input
    id: room5_comfort_input_change
  - trigger: template
    value_template: >
      {% set helpers = tv_away_mode_boolean | default([], true) | reject('in', ['', 'sensor.none', 'none']) | list %}
      {{ (helpers | length > 0) and ((expand(helpers) | selectattr('state', 'eq', 'on') | list | length) > 0) }}
    id: away_mode_on
  - trigger: template
    value_template: >
      {% set helpers = tv_away_mode_boolean | default([], true) | reject('in', ['', 'sensor.none', 'none']) | list %}
      {% set on_count = expand(helpers) | selectattr('state', 'eq', 'on') | list | length %}
      {% set off_count = expand(helpers) | selectattr('state', 'eq', 'off') | list | length %}
      {{ (helpers | length > 0) and ((on_count + off_count) == (helpers | length)) and (on_count == 0) }}
    id: away_mode_off

  # ============================================
  # PRESENCE HELPER TRIGGERS
  # Same trigger: event pattern – avoids entity_id schema validation crash.
  # ============================================
  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input master_presence_helper
    id: master_presence_helper_change
  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input room2_presence_helper
    id: room2_presence_helper_change
  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input room3_presence_helper
    id: room3_presence_helper_change
  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input room4_presence_helper
    id: room4_presence_helper_change
  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input room5_presence_helper
    id: room5_presence_helper_change

  # ============================================
  # SCHEDULED TRIGGER (for temp logic)
  # ============================================
  - trigger: time_pattern
    minutes: "/3"
    id: scheduled

  # ============================================
  # HA START TRIGGER (immediate evaluation on restart)
  # ============================================
  - trigger: homeassistant
    event: start
    id: ha_start

conditions: []

actions:
  # ============================================
  # PRESENCE STATE MANAGEMENT
  # ============================================
  - variables:
      presence_activation_delay: !input presence_activation_delay
      presence_deactivation_delay: !input presence_deactivation_delay
      enable_leitstand_normal: !input enable_leitstand_normal
      enable_leitstand_expert: !input enable_leitstand_expert
  - choose:
      - conditions:
          - condition: trigger
            id: master_presence_on
        sequence:
          - variables:
              presence_helper_entity: !input master_presence_helper
          - condition: template
            value_template: "{{ (presence_helper_entity | string not in ['', 'sensor.none', 'none']) and (presence_helper_entity | string | length > 5) }}"
          - action: input_boolean.turn_on
            target:
              entity_id: "{{ presence_helper_entity }}"
          - if:
              - condition: template
                value_template: "{{ (enable_leitstand_normal | default(false) | bool(false)) or (enable_leitstand_expert | default(false) | bool(false)) }}"
            then:
              - action: system_log.write
                data:
                  message: "Vaillant Blueprint: Master Presence ACTIVATED (sensor ON >{{ presence_activation_delay }}min)"
                  level: info
          - stop: ""
      - conditions:
          - condition: trigger
            id: master_presence_off
        sequence:
          - variables:
              presence_helper_entity: !input master_presence_helper
          - condition: template
            value_template: "{{ (presence_helper_entity | string not in ['', 'sensor.none', 'none']) and (presence_helper_entity | string | length > 5) }}"
          - action: input_boolean.turn_off
            target:
              entity_id: "{{ presence_helper_entity }}"
          - if:
              - condition: template
                value_template: "{{ (enable_leitstand_normal | default(false) | bool(false)) or (enable_leitstand_expert | default(false) | bool(false)) }}"
            then:
              - action: system_log.write
                data:
                  message: "Vaillant Blueprint: Master Presence DEACTIVATED (sensor OFF >{{ presence_deactivation_delay }}min)"
                  level: info
          - stop: ""
      - conditions:
          - condition: trigger
            id: room2_presence_on
        sequence:
          - variables:
              presence_helper_entity: !input room2_presence_helper
          - condition: template
            value_template: "{{ (presence_helper_entity | string not in ['', 'sensor.none', 'none']) and (presence_helper_entity | string | length > 5) }}"
          - action: input_boolean.turn_on
            target:
              entity_id: "{{ presence_helper_entity }}"
          - if:
              - condition: template
