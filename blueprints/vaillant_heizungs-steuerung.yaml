            TRV/Thermostat für Raum 5.

          default: ""
          selector:
            entity:
              domain: climate
        room5_comfort_input:
          name: "🌡️ Komfort Helper (opt)"
          description: |

            Optionaler Helper für die Komfort-Solltemperatur in Raum 5.
            Erforderlicher Helfer-Typ: **Schieberegler** (input_number).

          default: ""
          selector:
            entity:
              domain: input_number
        room5_comfort_fixed:
          name: "🌡️ Komfort Fix (°C)"
          description: |

            Fallback-Komforttemperatur in Raum 5 ohne Helper.

          default: 21.0
          selector:
            number:
              min: 18
              max: 24
              step: 0.5
              unit_of_measurement: "°C"
        room5_schedule:
          name: "🗓️ Zeitplan"
          description: |

            Optionaler Zeitplan für Komfortbetrieb in Raum 5.

          default: ""
          selector:
            entity:
              domain: schedule
        room5_presence_sensors:
          name: "👀 Präsenz"
          description: |

            Optionale Präsenzsensoren für Komfortfreigabe in Raum 5.

          default: []
          selector:
            entity:
              domain: binary_sensor
              device_class: occupancy
              multiple: true
        room5_presence_helper:
          name: "Room5 Presence Helper Entity"
          description: |

            Input boolean for room5 presence state. Create manually: Settings -> Helpers -> Toggle -> Name: 'Heating: Room5 Presence Active'

          default: ""
          selector:
            entity:
              domain: input_boolean
        room5_pre_heat_helper:
          name: "🔥 Pre-Heat Helper (opt)"
          description: |

            Optionaler Toggle zum Vorheizen auf Comfort, auch bei inaktivem Zeitplan/Präsenz.
            Auto-OFF bei: Präsenz ON, Zeitplan aktiv, oder Timeout.

          default: ""
          selector:
            entity:
              domain: input_boolean
        room5_window:
          name: "🪟 Fenster"
          description: |

            Fensterkontakt in Raum 5 für Sicherheitsabsenkung.

          default: ""
          selector:
            entity:
              domain: binary_sensor
              device_class: window
        room5_temp_sensor:
          name: "🌡️ Temperatursensor"
          description: |

            Optionaler externer Temperatursensor für Raum 5.

          default: ""
          selector:
            entity:
              domain: sensor
              device_class: temperature


    section_smart_functions:
      name: "🧠 Smarte Funktionen"
      description: |
        Optionale Zusatzmodule für Sommerbetrieb, Gebäude-Kompensation und Komfort.
        Alle Funktionen hier sind optional und additiv zur Basisregelung.
      collapsed: true
      input:
        enable_weather_compensation:
          name: "🌦️ Gebäude-Kompensation aktiv"
          description: |
            Aktiviert den dynamischen Aufschlag auf den Master-Sollwert an sehr kalten oder windigen Tagen.
          default: false
          selector:
            boolean:
        weather_compensation_sensor:
          name: "🌦️ Kompensations-Sensor (Plan A: Template)"
          description: |
            Plan A (empfohlen): Nutze einen Sensor, der direkt den Aufschlag auf den Master-Sollwert in °C liefert.
            Plan B (Fallback): Wenn leer oder ungültig, wird der Basis-Außensensor genutzt und über Zone 1-3 geregelt.
            Plan B quantisiert den Außentemperatur-Pfad auf 0,5°C Schritte, um Jitter zu reduzieren.
          default: ""
          selector:
            entity:
              domain: sensor
        outdoor_temp_sensor:
          name: "☀️ Außentemperatur (Basis-Sensor, opt)"
          description: |
            Basis-Außensensor für Sommerlogik und Plan-B-Fallback der Gebäude-Kompensation.
          default: ""
          selector:
            entity:
              domain: sensor
        weather_boost_zone1:
          name: "❄️ Kompensation Zone 1 (unter -10°C)"
          description: |
            Aufschlag auf den Master-Sollwert bei extremer Kälte (<= -10°C).
          default: 0.0
          selector:
            number:
              min: 0.0
              max: 5.0
              step: 0.5
              unit_of_measurement: "°C"
        weather_boost_zone2:
          name: "🥶 Kompensation Zone 2 (-10°C bis 0°C)"
          description: |
            Aufschlag auf den Master-Sollwert bei Frost (<= 0°C).
          default: 0.0
          selector:
            number:
              min: 0.0
              max: 5.0
              step: 0.5
              unit_of_measurement: "°C"
        weather_boost_zone3:
          name: "🧥 Kompensation Zone 3 (0°C bis +10°C)"
          description: |
            Aufschlag auf den Master-Sollwert an kühlen Tagen (<= +10°C). Über 10°C ist der Aufschlag 0°C (Zone 4).
          default: 0.0
          selector:
            number:
              min: 0.0
              max: 5.0
              step: 0.5
              unit_of_measurement: "°C"
        enable_room_boost:
          name: "🚀 Boost aktiv"
          description: |
            Erlaubt es Räumen, temporär über ihr normales Ziel hinauszuschießen, um schneller warm zu werden.
          default: true
          selector:
            boolean:
        room_boost_activation_threshold:
          name: "🚀 Boost-Aktivierung ab Differenz (°C)"
          description: |
            Wie viel Grad muss die Raumtemperatur UNTER dem Ziel liegen, damit Boost greift?
          default: 1.0
          selector:
            number:
              min: 0.5
              max: 3.0
              step: 0.5
              unit_of_measurement: "°C"
        room_boost_amount:
          name: "🚀 Boost Höhe (°C)"
          description: |
            Wie viel Grad extra feuert die Heizung im Boost-Modus?
          default: 2.0
          selector:
            number:
              min: 0.5
              max: 3.0
              step: 0.5
              unit_of_measurement: "°C"
        summer_threshold:
          name: "☀️ Sommer-Grenzwert (°C)"
          description: |
            Ab diesem Wert wird Sommerbetrieb aktiv.
          default: 18
          selector:
            number:
              min: 15
              max: 22
              step: 0.5
              unit_of_measurement: "°C"
        summer_hysteresis:
          name: "☀️ Sommer-Hysterese (°C)"
          description: |
            Abschaltpunkt liegt bei (Sommer-Grenzwert - Hysterese), um Takten zu vermeiden.
          default: 1.0
          selector:
            number:
              min: 0.5
              max: 3.0
              step: 0.5
              unit_of_measurement: "°C"
        summer_mode_helper:
          name: "☀️ Sommer-Modus Helper (opt)"
          description: |
            Speichert den Sommerzustand (input_boolean) systemweit. Nur erforderlich wenn Sommerbetrieb aktiviert ist.
          default: ""
          selector:
            entity:
              domain: input_boolean
        enable_humidity_compensation:
          name: "🔘 Feuchte-Kompensation aktiv"
          description: |
            Reduziert die Heizleistung, wenn die Luftfeuchtigkeit im Master-Raum > 60% liegt.
          default: false
          selector:
            boolean:
        humidity_drop_amount:
          name: "🔘 Feuchte-Kompensation Absenkung (°C)"
          description: |
            Um wie viel Grad soll das Target bei hoher Feuchtigkeit gedrosselt werden?
          default: 0.5
          selector:
            number:
              min: 0.5
              max: 2.0
              step: 0.5
              unit_of_measurement: "°C"

    section_debug:
      name: "🛠️ System & Debugging"
      description: |
        Leitstand und Administrator-Tools.
        ⚠️ Kritische Alerts (Master offline, NOT-AUS, TRV offline, API-Budget erschöpft) werden **immer** automatisch als Notification gefeuert und löschen sich selbst, sobald das Problem behoben ist.
      collapsed: true
      input:
        quiet_schedule:
          name: "🌙 Ruhezeit-Zeitplan"
          description: |
            Optionaler Zeitplan (schedule-Helfer) für Ruhezeiten.
            Wenn aktiv (on), werden alle Benachrichtigungen unterdrückt.
            Leer lassen = keine Ruhezeit-Blockierung.
          default: ""
          selector:
            entity:
              domain: schedule
        enable_leitstand_normal:
          name: "📣 Leitstand Normal"
          description: |
            Kompakte Übersicht als Push-Notification.
            Feuert nur bei Events/Writes (nicht bei Routine-Läufen).
            Überschreibt sich selbst (Dashboard).
          default: false
          selector:
            boolean:
        enable_leitstand_expert:
          name: "📣 Leitstand Expert (Verlauf)"
          description: |
            Volle Diagnose-Details bei jedem Lauf (alle 3 Min).
            Jede Notification bleibt erhalten (History).
          default: false
          selector:
            boolean:
        notify_devices:
          name: "📱 Mobile Push (opt)"
          description: |
            Mobile-App Gerät(e) für Push-Notifications aufs Handy.
            Wird für **Normal-Leitstand** und **Kritische Alerts** genutzt.
            Expert-Verlauf wird NICHT aufs Handy gepusht (zu häufig).
          default: []
          selector:
            device:
              filter:
                integration: mobile_app
              multiple: true

