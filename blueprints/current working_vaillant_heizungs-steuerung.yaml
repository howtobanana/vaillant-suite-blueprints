          name: "🚀 Raum-Boost (Alle Räume & Master)"
          description: |

            Aktiviert die +2°C Boost-Funktion bei großer Temperaturdifferenz.

          default: true
          selector:
            boolean:
        room_boost_activation_threshold:
          name: "🚀 Boost-Aktivierung ab Differenz (°C)"
          description: |

            Mindestdifferenz zwischen Ziel- und Ist-Temperatur für Boost-Aktivierung.
            Dient als Aktivierungsschwelle der Hysterese.

          default: 1.0
          selector:
            number:
              min: 1.0
              max: 3.0
              step: 0.5
              unit_of_measurement: "°C"
        min_trv_temp:
          name: "♨️ TRV Minimum (°C)"
          description: |

            Mindest-Solltemperatur für Frostschutz und Sicherheitsabsenkung.

          default: 12
          selector:
            number:
              min: 5
              max: 15
              step: 0.5
              unit_of_measurement: "°C"
        window_heat_delay:
          name: "⏱️ Fenster-Delay (s)"
          description: |

            Verzögerung für Open-Window-Mode in Sekunden.
            Erst wenn ein Fenster so lange durchgehend offen ist, wird abgesenkt.

          default: 30
          selector:
            number:
              min: 10
              max: 300
              step: 5
              unit_of_measurement: "s"
        smart_drop_threshold:
          name: "📉 Smart-Drop Schwelle (°C)"
          description: |

            Temperatursturz-Erkennung. Schaltet Heizung ab, wenn Ist-Wert um X °C unter dem Eco-Anker liegt.

          default: 2.0
          selector:
            number:
              min: 0.0
              max: 5.0
              step: 0.5
              unit_of_measurement: "°C"
        hysteresis:
          name: "⚙️ Hysterese (°C)"
          description: |

            Mindestabweichung zwischen aktuellem und neuem Sollwert vor Schreibvorgang.

          default: 0.6
          selector:
            number:
              min: 0.1
              max: 1.0
              step: 0.1
              unit_of_measurement: "°C"
        enable_weather_compensation:
          name: "🌦️ Wetter-Kompensation aktiv"
          description: |

            Aktiviert lineare Sollwertanhebung bei niedriger Außentemperatur.

          default: false
          selector:
            boolean:
        enable_humidity_compensation:
          name: "🔘 Feuchte-Kompensation"
          description: |

            Aktiviert Sollwertabsenkung bei hoher Luftfeuchte im Master-Raum.

          default: false
          selector:
            boolean:
        enable_debug_notifications:
          name: "📣 Debug-Benachrichtigungen aktivieren"
          description: |

            Erstellt bei aktivem Schalter persistente Debug-Benachrichtigungen mit Master- und Raumstatus.

          default: false
          selector:
            boolean:
        helper_input_settle_seconds:
          name: "⏳ Debounce für Helper-Änderungen (s)"
          description: |

            Verzögerung nach Helper-Änderungen, bevor neue Sollwerte verarbeitet werden.
            Reduziert Flattern bei schnell aufeinanderfolgenden Eingabe-Updates.

          default: 30
          selector:
            number:
              min: 5
              max: 120
              step: 5
              unit_of_measurement: "s"

