              master_min: "{{ state_attr(inputs.master_climate, 'min_temp') | float(inputs.min_trv_temp | float(12)) }}"
              master_max: "{{ state_attr(inputs.master_climate, 'max_temp') | float(30) }}"
              master_required_target: >
                {% set hi = [master_required_target_raw | float(0), master_max | float(30)] | min %}
                {{ [hi, master_min | float(inputs.min_trv_temp | float(12))] | max }}
              # Room boost detection with anti-overshoot hysteresis
              room_boost_enabled_effective: >
                {{ (inputs.enable_room_boost | bool(false)) and (inputs.room_boost_amount | float(0) > 0) and (not (master_forced_min_active | bool(false))) and (not (away_mode_active_effective | bool(false))) }}
              master_boost_participates: >
                {{ (master_schedule_active | bool(false)) or (master_presence_detected | bool(false)) or (master_is_manual | bool(false)) }}
              room2_boost_participates: >
                {{ (inputs.room2_enabled | bool(false)) and ((room2_schedule_active_for_demand | bool(false)) or (room2_presence_for_demand | bool(false)) or (room2_is_manual | bool(false))) }}
              room3_boost_participates: >
                {{ (inputs.room3_enabled | bool(false)) and ((room3_schedule_active_for_demand | bool(false)) or (room3_presence_for_demand | bool(false)) or (room3_is_manual | bool(false))) }}
              room4_boost_participates: >
                {{ (inputs.room4_enabled | bool(false)) and ((room4_schedule_active_for_demand | bool(false)) or (room4_presence_for_demand | bool(false)) or (room4_is_manual | bool(false))) }}
              room5_boost_participates: >
                {{ (inputs.room5_enabled | bool(false)) and ((room5_schedule_active_for_demand | bool(false)) or (room5_presence_for_demand | bool(false)) or (room5_is_manual | bool(false))) }}
              master_needs_boost: >
                {% if room_boost_enabled_effective | bool(false) and (master_boost_participates | bool(false)) %}
                  {% if inputs.master_climate | string != '' %}
                    {% set fallback_current = state_attr(inputs.master_climate, 'current_temperature') | float(21) %}
                  {% else %}
                    {% set fallback_current = 21 %}
                  {% endif %}
