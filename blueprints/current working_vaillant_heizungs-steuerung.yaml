  tv_room2_window: !input room2_window
  tv_room3_window: !input room3_window
  tv_room4_window: !input room4_window
  tv_room5_window: !input room5_window
  tv_follower1_window: !input follower1_window
  tv_follower2_window: !input follower2_window

trigger:
  # ============================================
  # PRESENCE TRIGGERS
  # ============================================
  - platform: state
    entity_id: !input master_presence_sensors
    to: "on"
    for:
      minutes: !input presence_activation_delay
    id: master_presence_on
  - platform: state
    entity_id: !input master_presence_sensors
    to: "off"
    for:
      minutes: !input presence_deactivation_delay
    id: master_presence_off
  - platform: state
    entity_id: !input room2_presence_sensors
    to: "on"
    for:
      minutes: !input presence_activation_delay
    id: room2_presence_on
  - platform: state
    entity_id: !input room2_presence_sensors
    to: "off"
    for:
      minutes: !input presence_deactivation_delay
    id: room2_presence_off
  - platform: state
    entity_id: !input room3_presence_sensors
    to: "on"
    for:
      minutes: !input presence_activation_delay
