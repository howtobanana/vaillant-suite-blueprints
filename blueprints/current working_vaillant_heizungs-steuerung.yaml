        master_last_write_helper:
          name: "📝 Master Last Write Tracker"
          description: |
            **Pflicht-Helper für API-Cooldown-Tracking.**

            **Typ:** `input_datetime` (mit Datum + Uhrzeit).

            Dieser Helper speichert den Zeitstempel des letzten erfolgreichen API-Writes an den Master-Thermostat.

            ⚠️ **NICHT manuell ändern!** Wird automatisch vom Blueprint verwaltet.

            **Erstellen in Home Assistant:**
            Einstellungen → Geräte & Dienste → Helfer → Helfer erstellen → Datum und/oder Uhrzeit → Name: "Vaillant Master Last Write" → Datum UND Uhrzeit aktivieren.
          selector:
            entity:
              domain: input_datetime
        master_comfort_input:
          name: "🌡️ Master Komfort Helper (opt)"
          description: |

            Optionaler Helper für die Komfort-Solltemperatur des Master-Raums.
            Erforderlicher Helfer-Typ: **Schieberegler** (input_number).

          default: "sensor.none"
          selector:
            entity:
              domain: input_number
        master_comfort_fixed:
