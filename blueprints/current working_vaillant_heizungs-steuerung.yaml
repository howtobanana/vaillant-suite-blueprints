              room3_boost_deactivate: >
                {% if room_boost_enabled_effective | bool(false) and (room3_boost_participates | bool(false)) and inputs.room3_temp_sensor | string != '' %}
                  {% set room_raw = states(inputs.room3_temp_sensor) %}
                  {% if room_raw | string not in ['unknown', 'unavailable', 'none', ''] %}
                    {% set room_current = room_raw | float(0) %}
                    {% set room_target = room3_demand | float(0) %}
                    {% set delta = room_target - room_current %}
                    {{ delta < 0.5 }}
                  {% else %}
                    {{ true }}
                  {% endif %}
                {% else %}
                  {{ true }}
                {% endif %}
              room4_needs_boost: >
                {% if room_boost_enabled_effective | bool(false) and (room4_boost_participates | bool(false)) and inputs.room4_temp_sensor | string != '' %}
                  {% set room_raw = states(inputs.room4_temp_sensor) %}
                  {% if room_raw | string not in ['unknown', 'unavailable', 'none', ''] %}
                    {% set room_current = room_raw | float(0) %}
                    {% set room_target = room4_demand | float(0) %}
                    {% set threshold = inputs.room_boost_activation_threshold | float(1.0) %}
                    {% set delta = room_target - room_current %}
                    {{ delta >= threshold }}
                  {% else %}
                    {{ false }}
                  {% endif %}
                {% else %}
                  {{ false }}
                {% endif %}
              room4_boost_deactivate: >
                {% if room_boost_enabled_effective | bool(false) and (room4_boost_participates | bool(false)) and inputs.room4_temp_sensor | string != '' %}
                  {% set room_raw = states(inputs.room4_temp_sensor) %}
                  {% if room_raw | string not in ['unknown', 'unavailable', 'none', ''] %}
                    {% set room_current = room_raw | float(0) %}
                    {% set room_target = room4_demand | float(0) %}
                    {% set delta = room_target - room_current %}
                    {{ delta < 0.5 }}
                  {% else %}
                    {{ true }}
                  {% endif %}
                {% else %}
                  {{ true }}
                {% endif %}
              room5_needs_boost: >
                {% if room_boost_enabled_effective | bool(false) and (room5_boost_participates | bool(false)) and inputs.room5_temp_sensor | string != '' %}
                  {% set room_raw = states(inputs.room5_temp_sensor) %}
                  {% if room_raw | string not in ['unknown', 'unavailable', 'none', ''] %}
                    {% set room_current = room_raw | float(0) %}
                    {% set room_target = room5_demand | float(0) %}
                    {% set threshold = inputs.room_boost_activation_threshold | float(1.0) %}
                    {% set delta = room_target - room_current %}
                    {{ delta >= threshold }}
                  {% else %}
                    {{ false }}
                  {% endif %}
                {% else %}
                  {{ false }}
                {% endif %}
              room5_boost_deactivate: >
                {% if room_boost_enabled_effective | bool(false) and (room5_boost_participates | bool(false)) and inputs.room5_temp_sensor | string != '' %}
                  {% set room_raw = states(inputs.room5_temp_sensor) %}
                  {% if room_raw | string not in ['unknown', 'unavailable', 'none', ''] %}
                    {% set room_current = room_raw | float(0) %}
                    {% set room_target = room5_demand | float(0) %}
                    {% set delta = room_target - room_current %}
                    {{ delta < 0.5 }}
                  {% else %}
                    {{ true }}
                  {% endif %}
                {% else %}
                  {{ true }}
                {% endif %}
              any_room_needs_boost: >
                {{
                  (master_needs_boost | bool(false)) or
                  (room2_needs_boost | bool(false)) or
                  (room3_needs_boost | bool(false)) or
                  (room4_needs_boost | bool(false)) or
                  (room5_needs_boost | bool(false))
                }}
              all_rooms_boost_deactivate: >
                {{
                  (master_boost_deactivate | bool(true)) and
                  (room2_boost_deactivate | bool(true)) and
                  (room3_boost_deactivate | bool(true)) and
                  (room4_boost_deactivate | bool(true)) and
                  (room5_boost_deactivate | bool(true))
                }}
              master_set_now: "{{ state_attr(inputs.master_climate, 'temperature') | float(0) }}"
              master_boost_active: >
                {{ (any_room_needs_boost | bool(false)) and not (all_rooms_boost_deactivate | bool(false)) }}
              master_boost_amount: >
                {% if master_boost_active | bool(false) %}
                  {{ inputs.room_boost_amount | float(2.0) }}
                {% else %}
                  {{ 0.0 }}
                {% endif %}
              master_required_target_with_boost: >
                {% set base = master_required_target | float(20) %}
                {% set boost = master_boost_amount | float(0) %}
                {{ base + boost }}
              master_pure_target: >
                {% if master_forced_min_active | bool(false) %}
                  {% set pure_required = inputs.min_trv_temp | float(12) %}
                {% else %}
                  {% set humidity_reset = 0.5 if (humidity_compensation_active | bool(false)) else 0.0 %}
                  {% set pure_raw = [((master_base_required_target | float(0)) + (humidity_reset | float(0))), (master_safety_floor | float(12))] | max %}
                  {% set pure_hi = [pure_raw | float(0), master_max | float(30)] | min %}
                  {% set pure_required = [pure_hi, master_min | float(inputs.min_trv_temp | float(12))] | max %}
                {% endif %}
                {% set pure_boost = master_boost_amount | float(0) %}
                {{ (pure_required | float(0)) + pure_boost }}
              master_target_delta_abs: "{{ ((master_pure_target | float(0)) - (master_set_now | float(0))) | abs }}"
              master_needs_global_boost: >
                {{ (not (away_mode_active_effective | bool(false))) and ((master_set_now | float(0)) < ((global_max_demand | float(0)) - 0.1)) }}
              master_needs_global_drop: >
                {{ (not (away_mode_active_effective | bool(false))) and ((master_set_now | float(0)) > ((master_pure_target | float(0)) + 0.1)) }}
              master_significant_drop: >
                {{ ((master_set_now | float(0)) - (master_pure_target | float(0))) > 2.0 }}
              effective_max_changes_per_hour: "{{ [inputs.max_changes_per_hour | float(3), 2] | max }}"
              # API Write Tracking: Letzter erfolgreicher Write an Master-Thermostat
              master_last_update_age_step55: >
                {% set helper = inputs.master_last_write_helper %}
                {% if helper | string != '' and states(helper) | string not in ['unavailable', 'unknown', ''] %}
                  {% set last_write_str = states(helper) %}
                  {% set last_write_ts = as_timestamp(strptime(last_write_str, '%Y-%m-%d %H:%M:%S')) | float(0) %}
                  {% set now_ts = as_timestamp(now()) | float(0) %}
                  {{ now_ts - last_write_ts }}
                {% else %}
                  {{ 999999 }}
                {% endif %}
              master_change_cooldown_ok_step55: >
                {{ (master_last_update_age_step55 | float(999999)) >= (3600 / (effective_max_changes_per_hour | float(3))) }}
              master_needs_raise: >
                {{ (master_pure_target | float(0)) > ((master_set_now | float(0)) + (inputs.hysteresis | float(0.6))) }}
              master_stuck_protection_active: >
                {{ (master_needs_raise | bool(false)) and ((master_last_update_age_step55 | float(0)) >= 1800) }}
              master_raise_allowed: >
                {{ (master_needs_raise | bool(false)) and ((master_change_cooldown_ok_step55 | bool(false)) or ((master_target_delta_abs | float(0)) > 3.0) or (master_stuck_protection_active | bool(false))) }}
              master_drop_allowed: >
                {{ (master_needs_global_drop | bool(false)) and (master_change_cooldown_ok_step55 | bool(false)) }}
              master_write_allowed: >
                {{ (not (master_forced_min_active | bool(false))) and ((master_raise_allowed | bool(false)) or (master_drop_allowed | bool(false))) }}
          # ════════════════════════════════════════════════════════════
          # DEBUG LOG 3: Boost Logic
          # ════════════════════════════════════════════════════════════
          - if:
              - condition: template
                value_template: "{{ inputs.enable_debug_notifications | bool(false) }}"
