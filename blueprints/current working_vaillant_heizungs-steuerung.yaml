          description: |

            Fallback-Komforttemperatur des Master-Raums ohne Helper.

          default: 20.5
          selector:
            number:
              min: 19
              max: 24
              step: 0.5
              unit_of_measurement: "°C"
        master_schedule:
          name: "🗓️ Master Zeitplan"
          description: |

            Optionaler Zeitplan für den Komfortbetrieb im Master-Raum.

          default: ""
          selector:
            entity:
              domain: schedule
        master_presence_sensors:
          name: "👀 Master Präsenz"
          description: |

            Optionale Präsenzsensoren für bedarfsgeführten Komfortbetrieb im Master-Raum.

          default: []
          selector:
            entity:
              domain: binary_sensor
              device_class: occupancy
              multiple: true
        master_presence_helper:
          name: "Master Presence Helper Entity"
          description: |

            Input boolean to store master presence state. Create manually: Settings -> Helpers -> Toggle -> Name: 'Heating: Master Presence Active'

          default: "sensor.none"
