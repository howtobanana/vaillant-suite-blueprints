                    🚀 BOOST LOGIC | Room3: needs_boost={{ room3_needs_boost | bool(false) }} current={{ room3_current_temp | float(0) }}°C target={{ room3_demand | float(0) }}°C delta={{ (room3_demand | float(0)) - (room3_current_temp | float(0)) }}°C | Boost: active={{ master_boost_active | bool(false) }} amount={{ inputs.room_boost_amount | float(0) }}°C threshold={{ inputs.room_boost_activation_threshold | float(0) }}°C
                  level: info
          - choose:
