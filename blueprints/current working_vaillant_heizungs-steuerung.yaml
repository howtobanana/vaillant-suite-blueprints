blueprint:
  name: "(Vaillant) Heizungssteuerung"
  description: |
    **Zentrale Heizungslogik für Vaillant-Systeme**

    Dieses Modul bildet das Herzstück der Heizungssteuerung. Es koordiniert den Master-Thermostat und die Heizkörperventile (TRVs) basierend auf physikalischem Bedarf, Wetterdaten und Sicherheitslogik.

    **Kern-Funktionen:**
    *   🛡️ **Dynamic Safety:** Unterscheidet zwischen Kälteeinbruch (Not-Aus) und Luftaustausch (Weiterheizen).
    *   🔗 **Smart Follower:** Dynamische Offset-Steuerung für Nebenräume (folgen dem Master).
    *   ⚡ **Echtzeit-Reaktion:** Sofortige Anpassung bei Statusänderungen ohne Latenz.
    *   🧠 **Fail-Safe:** Mehrstufige Sicherheitslogik (Debounce, Frostschutz, 60min Time-Guard).

    **Das Ökosystem:**
    Entwickelt für den Betrieb im Verbund mit:
    *   📍 `(Vaillant) Geofencing` (Anwesenheit & Eco).
    *   💨 `(Vaillant) Lüftungs-Steuerung` (Luftaustausch & Feuchtigkeit).
    *   ❤️ `(Vaillant) System-Diagnose` (Wartung & Batterien).

    **Voraussetzungen:**
    Erfordert die **myVaillant** Integration (HACS). Besonderer Dank an die Entwickler dieser Integration für die Bereitstellung der Schnittstelle.

    **Haftungsausschluss:**
    Dies ist ein privates Projekt. Der Autor ist kein zertifizierter Installateur. Die Nutzung erfolgt auf eigene Gefahr. Für Schäden an der Anlage oder durch Fehlkonfiguration wird keine Haftung übernommen.

    **Version:** 1.0 (Refactor) | **Autor:** BananaPower

  domain: automation
  source_url: https://raw.githubusercontent.com/howtobanana/vaillant-suite-blueprints/main/blueprints/vaillant_heizungs-steuerung.yaml
  author: "bananapower"

  input:
    section_global:
      name: "🌍 Basisparameter"
      description: |

        Grundlegende Einstellungen für Wetterfühler, Sommer-Logik, Abwesenheitsstatus und API-Limits.
        Diese Parameter definieren globale Grenzen und Fallback-Werte der Regelung.

      collapsed: false
      input:
        outdoor_temp_sensor:
          name: "🌡️ Außentemperatur"
          description: |

            Optionaler Außentemperatursensor für Sommermodus, Frostlogik und Wetterkompensation.

          default: ""
          selector:
            entity:
              domain: sensor
              device_class: temperature
        presence_activation_delay:
          name: "⏱️ Präsenz Aktivierung (min)"
          description: |

            Globale Verzögerung bis Präsenz als aktiv bewertet wird (gilt für alle Räume).
            Sensor muss diese Zeit durchgehend ON sein bevor Komfort aktiviert wird.

          default: 2
          selector:
            number:
              min: 0
              max: 10
              step: 1
              unit_of_measurement: "min"
        presence_deactivation_delay:
          name: "⏱️ Präsenz Nachlauf (min)"
          description: |

            Globale Nachlaufzeit bis Rückfall auf Eco nach letzter Präsenz (gilt für alle Räume).
            Nach dieser Zeit ohne Erkennung wird Eco aktiviert.

          default: 30
          selector:
            number:
              min: 15
              max: 120
              step: 5
              unit_of_measurement: "min"
        summer_threshold:
          name: "🌡️ Sommer-Grenzwert (°C)"
          description: |

            Schwellwert für den Sommer-Modus. Oberhalb dieses Werts wird Heizbetrieb reduziert.

          default: 18
          selector:
            number:
              min: 15
              max: 22
              step: 1
              unit_of_measurement: "°C"
        summer_hysteresis:
          name: "↕️ Sommer-Hysterese (°C)"
          description: |

            Verhindert schnelles Takten im Grenzbereich. Hysterese für den Sommer-Modus.

          default: 1.0
          selector:
            number:
              min: 0.5
              max: 3.0
              step: 0.5
              unit_of_measurement: "°C"
        summer_mode_helper:
          name: "Sommer-Modus Helper (Pflicht)"
          description: |

            Erforderlicher Helfer-Typ: Umschalter (input_boolean). Speichert den Sommerzustand inkl. Hysterese.

          selector:
            entity:
              domain: input_boolean
        panic_mode_enabled:
          name: "🚨 Panic Mode Helper (opt)"
          description: |

            Globaler Notfall-Schalter. Erzwingt Komfort-Temperatur bei Sensor-Ausfall.
            Erforderlicher Helfer-Typ: **Umschalter** (input_boolean).

          default: ""
          selector:
            entity:
              domain: input_boolean
        eco_temp_input:
          name: "🌡️ Eco-Temp Helper (opt)"
          description: |

            Optionaler Helper für die Eco-Solltemperatur. Überschreibt den Fixwert.
            Erforderlicher Helfer-Typ: **Schieberegler** (input_number).

          default: "sensor.none"
          selector:
            entity:
              domain: input_number
        eco_temp_fixed:
          name: "🌡️ Eco-Temp Fix (°C)"
          description: |

            Fallback-Solltemperatur für Eco-Betrieb ohne Helper.

          default: 19
          selector:
            number:
              min: 17
              max: 21
              step: 0.5
              unit_of_measurement: "°C"
        away_temp_input:
          name: "🌡️ Away-Temp Helper (opt)"
          description: |

            Optionaler Helper für die Away-Solltemperatur. Überschreibt den Fixwert.
            Erforderlicher Helfer-Typ: **Schieberegler** (input_number).

          default: "sensor.none"
          selector:
            entity:
              domain: input_number
        away_temp_fixed:
          name: "🌡️ Away-Temp Fix (°C)"
          description: |

            Fallback-Solltemperatur für Abwesenheitsbetrieb ohne Helper.

          default: 16
          selector:
            number:
              min: 14
              max: 18
              step: 0.5
              unit_of_measurement: "°C"

        away_mode_boolean:
          name: "Away-Mode Helper (input_boolean)"
          description: |

            Globaler Abwesenheits-Schalter. Aktiviert sofort den Away-Sollwert. Mehrere Entitys werden als ODER ausgewertet.
            Erforderlicher Helfer-Typ: **Umschalter** (input_boolean).

          default: []
          selector:
            entity:
              domain: input_boolean
              multiple: true
        max_changes_per_hour:
          name: "🔧 Max Änderungen/h"
          description: |

            Maximale Anzahl Master-Schreibvorgänge pro Stunde.
            Hohe Werte erlauben bei netzbetriebenen Geräten nahezu sofortige Aktualisierungen.

          default: 10
          selector:
