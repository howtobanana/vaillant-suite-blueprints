  - variables:
      # ===== GROUP 1: INPUTS & HELPERS =====
      inputs:
        outdoor_temp_sensor: !input outdoor_temp_sensor
        summer_threshold: !input summer_threshold
        summer_hysteresis: !input summer_hysteresis
