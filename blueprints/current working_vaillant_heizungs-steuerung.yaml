              max: 20
              step: 1

    section_master:
      name: "🏠 Master-Raum"
      description: |

        Parameter für den führenden Master-Raum und die zentrale Sollwertstrategie.
        Der Master-Thermostat ist die primäre Schnittstelle zur Heizungsanlage.

      collapsed: false
