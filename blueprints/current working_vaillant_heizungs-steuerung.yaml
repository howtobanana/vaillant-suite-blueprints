  - platform: state
    entity_id: !input room4_comfort_input
    id: room4_comfort_input_change
  - platform: state
    entity_id: !input room5_comfort_input
    id: room5_comfort_input_change
  - platform: state
    entity_id: !input away_mode_boolean
    id: away_mode_change

  # ============================================
  # PRESENCE HELPER TRIGGERS
  # ============================================
  - platform: state
    entity_id: !input master_presence_helper
    id: master_presence_helper_change
  - platform: state
    entity_id: !input room2_presence_helper
    id: room2_presence_helper_change
  - platform: state
    entity_id: !input room3_presence_helper
    id: room3_presence_helper_change
  - platform: state
    entity_id: !input room4_presence_helper
    id: room4_presence_helper_change
  - platform: state
    entity_id: !input room5_presence_helper
    id: room5_presence_helper_change

  # ============================================
  # SCHEDULED TRIGGER (for temp logic)
  # ============================================
  - platform: time_pattern
    minutes: "/5"
    id: scheduled

