                    {% set master_raw = states(inputs.master_temp_sensor) %}
                    {% set master_current = master_raw | float(fallback_current) %}
                  {% else %}
                    {% set master_current = fallback_current %}
                  {% endif %}
                  {% set master_target = master_target_final | float(0) %}
                  {% set threshold = inputs.room_boost_activation_threshold | float(1.0) %}
                  {% set delta = master_target - (master_current | float(0)) %}
                  {{ delta >= threshold }}
                {% else %}
                  {{ false }}
                {% endif %}
              master_boost_deactivate: >
                {% if room_boost_enabled_effective | bool(false) and (master_boost_participates | bool(false)) %}
                  {% if inputs.master_climate | string != '' %}
                    {% set fallback_current = state_attr(inputs.master_climate, 'current_temperature') | float(21) %}
                  {% else %}
                    {% set fallback_current = 21 %}
                  {% endif %}
                  {% if inputs.master_temp_sensor | string != '' %}
                    {% set master_raw = states(inputs.master_temp_sensor) %}
                    {% set master_current = master_raw | float(fallback_current) %}
                  {% else %}
                    {% set master_current = fallback_current %}
                  {% endif %}
                  {% set master_target = master_target_final | float(0) %}
                  {% set delta = master_target - (master_current | float(0)) %}
                  {{ delta < 0.5 }}
                {% else %}
                  {{ true }}
                {% endif %}
              room2_needs_boost: >
                {% if room_boost_enabled_effective | bool(false) and (room2_boost_participates | bool(false)) and inputs.room2_temp_sensor | string != '' %}
                  {% set room_raw = states(inputs.room2_temp_sensor) %}
                  {% if room_raw | string not in ['unknown', 'unavailable', 'none', ''] %}
                    {% set room_current = room_raw | float(0) %}
                    {% set room_target = room2_demand | float(0) %}
                    {% set threshold = inputs.room_boost_activation_threshold | float(1.0) %}
                    {% set delta = room_target - room_current %}
                    {{ delta >= threshold }}
                  {% else %}
                    {{ false }}
                  {% endif %}
                {% else %}
                  {{ false }}
                {% endif %}
              room2_boost_deactivate: >
                {% if room_boost_enabled_effective | bool(false) and (room2_boost_participates | bool(false)) and inputs.room2_temp_sensor | string != '' %}
                  {% set room_raw = states(inputs.room2_temp_sensor) %}
                  {% if room_raw | string not in ['unknown', 'unavailable', 'none', ''] %}
                    {% set room_current = room_raw | float(0) %}
                    {% set room_target = room2_demand | float(0) %}
                    {% set delta = room_target - room_current %}
                    {{ delta < 0.5 }}
                  {% else %}
                    {{ true }}
                  {% endif %}
                {% else %}
                  {{ true }}
                {% endif %}
              room3_needs_boost: >
                {# USE ROBUST CHECK to match room3_demand logic #}
                {% if room_boost_enabled_effective | bool(false) and (room3_boost_participates | bool(false)) and inputs.room3_temp_sensor | string != '' %}
                  {% set room_raw = states(inputs.room3_temp_sensor) %}
                  {% if room_raw | string not in ['unknown', 'unavailable', 'none', ''] %}
                    {% set room_current = room_raw | float(0) %}
                    {% set room_target = room3_demand | float(0) %}
                    {% set threshold = inputs.room_boost_activation_threshold | float(1.0) %}
                    {% set delta = room_target - room_current %}
                    {{ delta >= threshold }}
                  {% else %}
                    {{ false }}
                  {% endif %}
                {% else %}
                  {{ false }}
