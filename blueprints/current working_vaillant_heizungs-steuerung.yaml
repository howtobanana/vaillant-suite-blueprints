    id: follower1_window_closed
  - platform: template
    value_template: >
      {{ tv_follower2_window | string != '' and is_state(tv_follower2_window, 'on') }}
    for:
      seconds: !input window_heat_delay
    id: follower2_window_open_30s
  - platform: template
    value_template: >
      {{ tv_follower2_window | string != '' and is_state(tv_follower2_window, 'off') }}
    id: follower2_window_closed

